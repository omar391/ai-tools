document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow-stepwise
  version: 1.0.4
  summary: "Pure non-device stepwise wrapper over the shared OpenAI auth state machine."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        codex_bin:
          default: codex
        auth_url: {}
        callback_url: {}
        callback_port: {}
        codex_session_dir: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        email: {}
        account_login_locator:
          type: object
          format: secret-locator
        full_name:
          default: "Dev Astronlab"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - email
do:
  - run_shared_non_device_flow:
      metadata:
        description: "Run the shared OpenAI auth state machine in pure non-device mode."
      call: workflow.workspace.web.auth-openai-com.codex-rotate-account-flow-shared
      with:
        version: 1.0.0
        input:
          enabled: "${inputs.enabled}"
          mode: "codex_login"
          codex_bin: "${inputs.codex_bin}"
          auth_url: "${inputs.auth_url}"
          callback_url: "${inputs.callback_url}"
          callback_port: "${inputs.callback_port}"
          codex_session_dir: "${inputs.codex_session_dir}"
          codex_login_pid: "${inputs.codex_login_pid}"
          codex_login_stdout_path: "${inputs.codex_login_stdout_path}"
          codex_login_stderr_path: "${inputs.codex_login_stderr_path}"
          codex_login_exit_path: "${inputs.codex_login_exit_path}"
          email: "${inputs.email}"
          account_login_locator: "${inputs.account_login_locator}"
          full_name: "${inputs.full_name}"
          birth_month: "${inputs.birth_month}"
          birth_day: "${inputs.birth_day}"
          birth_year: "${inputs.birth_year}"
          prefer_signup_recovery: "${inputs.prefer_signup_recovery}"
  - finalize_selected_flow:
      metadata:
        description: "Return the shared non-device result while preserving the stepwise wrapper identity."
      run:
        script:
          language: javascript
          code: |
            const result =
              state.steps.run_shared_non_device_flow?.action?.result?.output || {};
            return {
              ...(result && typeof result === "object" ? result : {}),
              selected_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-stepwise",
              leaf_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-shared",
              wrapper_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-stepwise",
              selection_strategy: "non-device-stepwise-wrapper-over-shared-flow",
            };
output:
  as: "${state.steps.finalize_selected_flow?.action?.value || {}}"
