                stage = "oauth_consent";
              } else if (aboutYou) {
                stage = "about_you";
              } else if (needsEmailVerification) {
                stage = "email_verification";
              } else if (/\/log-in(?:\/|$)/i.test(path) && passwordInput) {
                stage = "login_password";
              } else if (/\/create-account(?:\/|$)/i.test(path) && passwordInput) {
                stage = "signup_password";
              } else if (passwordInput || verificationInput) {
                stage = "auth_prompt";
              }
              return {
                stage,
                current_url: location.href,
                headline: bodyText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
              };
            });

            const fieldSelectors = [
              'input[name="name"]',
              'input[name*="name" i]',
              'input[autocomplete="name"]',
              'input[placeholder*="name" i]',
              'select[name*="month" i]',
              'select[name*="day" i]',
              'select[name*="year" i]',
              'select',
            ];
            let field = null;
            for (const selector of fieldSelectors) {
              const candidate = page.locator(selector).first();
              if (!(await candidate.count().catch(() => 0))) {
                continue;
              }
              if (!(await candidate.isVisible().catch(() => false))) {
                continue;
              }
              field = candidate;
              break;
            }
            if (!field) {
              throw new Error("about-you-submit-fields-not-found");
            }

            const allowedStages = new Set([
              "add_phone",
              "oauth_consent",
              "email_verification",
              "security_verification",
              "retryable_timeout",
              "rate_limit",
              "session_ended",
              "callback_complete",
            ]);

            const clickVisibleContinue = async () => {
              const result = await field.evaluate((node) => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const isVisible = (candidate) => {
                  if (!(candidate instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(candidate);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = candidate.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const readLabel = (candidate) => {
                  if (!(candidate instanceof Element)) {
                    return "";
                  }
                  if (candidate instanceof HTMLInputElement) {
                    return normalize(candidate.value || candidate.getAttribute("aria-label") || "");
                  }
                  return normalize(candidate.innerText || candidate.textContent || candidate.getAttribute("aria-label") || "");
                };
                const form = node instanceof Element ? node.closest("form") : null;
                const scope = form || document;
                const candidates = Array.from(scope.querySelectorAll("button, input[type='submit'], [role='button']"))
                  .filter((candidate) => isVisible(candidate) && candidate.getAttribute("aria-disabled") !== "true" && !candidate.hasAttribute("disabled"));
                const preferred = candidates.find((candidate) => {
                  const label = readLabel(candidate);
                  const isSubmitNode = (candidate instanceof HTMLButtonElement && candidate.type === "submit")
                    || (candidate instanceof HTMLInputElement && candidate.type === "submit");
                  return isSubmitNode && /continue|next|finish creating account|submit|verify|allow|authorize|accept/i.test(label);
                }) || candidates.find((candidate) => /continue|next|finish creating account|submit|verify|allow|authorize|accept/i.test(readLabel(candidate)));
                if (preferred instanceof HTMLElement) {
                  preferred.click();
                  return {
                    ok: true,
                    strategy: "form-dom-click",
                    label: readLabel(preferred) || null,
                  };
                }
                if (form instanceof HTMLFormElement) {
                  form.requestSubmit();
                  return {
                    ok: true,
                    strategy: "form-request-submit",
                    label: null,
                  };
                }
                return null;
              }).catch(() => null);
              return result;
            };

            const attempts = [
              async () => clickVisibleContinue(),
              async () => {
                await field.press("Enter").catch(() => {});
                return { strategy: "press-enter", label: null };
              },
              async () => {
                await field.evaluate((node) => {
                  if (node instanceof HTMLElement) {
                    node.blur();
                  }
                  const form = node instanceof Element ? node.closest("form") : null;
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                  }
                }).catch(() => {});
                return { strategy: "request-submit", label: null };
              },
            ];

            const waitForTransition = async (sameStage, timeoutMs = 8000) => {
              const startedAt = Date.now();
              let latest = await detectStage();
              while (Date.now() - startedAt < timeoutMs) {
                if (allowedStages.has(latest.stage) && latest.stage !== sameStage) {
                  return latest;
                }
                await page.waitForTimeout(500).catch(() => {});
                latest = await detectStage();
              }
              return latest;
            };

            const transitions = [];
            for (const attempt of attempts) {
              const performed = await attempt();
              if (!performed) {
                continue;
              }
              const after = await waitForTransition("about_you");
              transitions.push({ ...performed, ...after });
              if (allowedStages.has(after.stage) && after.stage !== "about_you") {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
            }

            const finalState = await detectStage();
            throw new Error("about-you-submit-stuck:" + String(finalState.stage || "unknown") + ":" + String(finalState.current_url || page.url()));
do:
  - start_codex_login_session:
      if: "${String(inputs.mode || 'codex_login') === 'codex_login' && !String(inputs.auth_url || '').trim()}"
      metadata:
        description: "Start a detached codex login session on the host and capture its stdout/stderr paths."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const path = await import("node:path");
            const { spawn } = await import("node:child_process");

            const shell = process.env.SHELL || "/bin/sh";
            const codexBin = String(args.codex_bin || "codex").trim() || "codex";
            const sessionRoot = path.join(env.projectArtifactsRoot, "codex-login-sessions");
            fs.mkdirSync(sessionRoot, { recursive: true });
            const sessionDir = fs.mkdtempSync(path.join(sessionRoot, String(env.workflowRunStamp || "run") + "-"));
            const stdoutPath = path.join(sessionDir, "stdout.log");
            const stderrPath = path.join(sessionDir, "stderr.log");
            const exitPath = path.join(sessionDir, "exit.code");
            const quote = (value) => "'" + String(value).replace(/'/g, "'\"'\"'") + "'";
            const command = quote(codexBin)
              + " login >"
              + quote(stdoutPath)
              + " 2>"
              + quote(stderrPath)
              + "; printf '%s' \"$?\" >"
              + quote(exitPath);

            const child = spawn(shell, ["-lc", command], {
              cwd: env.workspaceRoot,
              env: process.env,
              detached: true,
              stdio: "ignore",
            });
            child.unref();

            return {
              ok: true,
              started: true,
              codex_bin: codexBin,
              session_dir: sessionDir,
              pid: child.pid ?? null,
              stdout_path: stdoutPath,
              stderr_path: stderrPath,
              exit_path: exitPath,
            };
  - capture_codex_login_url:
      if: "${String(inputs.mode || 'codex_login') === 'codex_login'}"
      metadata:
        description: "Capture or normalize the Codex auth URL and callback session details for this workflow run."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const { setTimeout: delay } = await import("node:timers/promises");

            const explicitAuthUrl = String(args.auth_url || "").trim();
            const stdoutPath = String(
              args.codex_login_stdout_path
              || state.steps.start_codex_login_session?.action?.value?.stdout_path
              || ""
            ).trim();
            const stderrPath = String(
              args.codex_login_stderr_path
              || state.steps.start_codex_login_session?.action?.value?.stderr_path
              || ""
            ).trim();
            const exitPath = String(
              args.codex_login_exit_path
              || state.steps.start_codex_login_session?.action?.value?.exit_path
              || ""
            ).trim();
            const sessionDir = String(
              args.codex_session_dir
              || state.steps.start_codex_login_session?.action?.value?.session_dir
              || ""
            ).trim() || null;
            const pidValue = Number(
              args.codex_login_pid
              || state.steps.start_codex_login_session?.action?.value?.pid
              || 0
            );

            const extractAuthUrl = (raw) => {
              const match = String(raw || "").match(/https:\/\/auth\.openai\.com\/oauth\/authorize\?[^\s"'<>]+/);
              return match ? match[0] : null;
            };
            const parseCapture = (authUrl) => {
              const parsedAuthUrl = new URL(authUrl);
              const callbackUrl = parsedAuthUrl.searchParams.get("redirect_uri") || "";
              if (!callbackUrl) {
                throw new Error("captured-auth-url-missing-redirect-uri");
              }
              const callbackPort = Number.parseInt(new URL(callbackUrl).port, 10);
              if (!Number.isInteger(callbackPort)) {
                throw new Error("captured-auth-url-invalid-callback-port:" + callbackUrl);
              }
              return {
                auth_url: authUrl,
                callback_url: callbackUrl,
                callback_port: callbackPort,
              };
            };
            const readText = (filePath) => {
              if (!filePath || !fs.existsSync(filePath)) {
                return "";
              }
              return fs.readFileSync(filePath, "utf8");
            };
            const tail = (filePath, maxChars = 1200) => {
              const text = readText(filePath);
              return text.length > maxChars ? text.slice(-maxChars) : text;
            };

            if (explicitAuthUrl) {
              return {
                ok: true,
                reused: true,
                ...parseCapture(explicitAuthUrl),
                session_dir: sessionDir,
                pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                stdout_path: stdoutPath || null,
                stderr_path: stderrPath || null,
                exit_path: exitPath || null,
              };
            }

            const timeoutMs = 45000;
            const startedAt = Date.now();
            while (Date.now() - startedAt < timeoutMs) {
              const combined = readText(stdoutPath) + "\n" + readText(stderrPath);
              const authUrl = extractAuthUrl(combined);
              if (authUrl) {
                return {
                  ok: true,
                  reused: false,
                  ...parseCapture(authUrl),
                  session_dir: sessionDir,
                  pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                  stdout_path: stdoutPath || null,
                  stderr_path: stderrPath || null,
                  exit_path: exitPath || null,
                };
              }
              if (exitPath && fs.existsSync(exitPath)) {
                const exitCodeRaw = readText(exitPath).trim();
                throw new Error("codex-login-exited-before-auth-url:" + (exitCodeRaw || "unknown") + ":" + (tail(stderrPath) || tail(stdoutPath) || "no-output"));
              }
              await delay(250);
            }

            throw new Error("codex-login-auth-url-timeout:" + (tail(stderrPath) || tail(stdoutPath) || "no-output"));
  - cache_codex_login_session:
      if: "${state.steps.capture_codex_login_url?.action?.ok === true}"
      metadata:
        description: "Cache the current Codex login session metadata for later replay and exit handling."
      set:
        codex_login: "${state.steps.capture_codex_login_url?.action?.value || {}}"
  - open_codex_login_entry:
      if: "${String(inputs.mode || 'codex_login') !== 'prepare_device_auth'}"
      metadata:
        templateRef: replay_captured_auth_url
        description: "Open the captured Codex auth URL on the managed browser profile."
        browser:
          clearSiteDataForOrigins:
            - "https://auth.openai.com"
            - "https://chatgpt.com"
  - reset_openai_login_entry_navigation_base:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth'}"
      metadata:
        description: "Reset the current managed browser document before loading the public ChatGPT auth entry."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "about:blank"
  - open_openai_login_entry:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth'}"
      metadata:
        description: "Open the public ChatGPT shell on the managed browser profile when preparing device authorization without a pre-captured Codex callback session."
        browser:
          clearSiteDataForOrigins:
            - "https://auth.openai.com"
            - "https://chatgpt.com"
      call: afn.driver.browser.navigate
      with:
        body:
          url: "https://chatgpt.com/?codex_rotate_public_entry=1"
  - stabilize_entry_surface:
      metadata:
        templateRef: wait_for_openai_surface_ready
        description: "Wait for the initial managed Codex auth page to render before classifying it."
  - classify_entry_state:
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the initial managed Codex auth landing page."
  - clear_entry_security_gate:
      if: "${state.steps.classify_entry_state?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any initial OpenAI or Cloudflare security gate on the managed auth entry."
  - classify_entry_ready:
      metadata:
        templateRef: classify_openai_surface
        description: "Refresh the entry state after any initial security gate handling."
  - recover_entry_session_ended:
      if: "${state.steps.classify_entry_ready?.action?.stage === 'session_ended'}"
      metadata:
        templateRef: click_primary_continue
        description: "Advance past the OpenAI session-ended shell when preparing a fresh managed signup/login session."
  - wait_after_entry_session_recovery:
      if: "${state.steps.recover_entry_session_ended?.action?.ok === true && state.steps.recover_entry_session_ended?.action?.skipped !== true}"
      metadata:
        description: "Allow the recovered OpenAI entry shell to settle before classifying it again."
      wait:
        milliseconds: 900
  - classify_entry_after_session_recovery:
      if: "${state.steps.recover_entry_session_ended?.action?.ok === true && state.steps.recover_entry_session_ended?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Reclassify the OpenAI entry page after clearing the session-ended shell."
  - cache_effective_entry_state:
      metadata:
        description: "Cache the effective entry-state classification after any initial recovery."
      set:
        effective_entry_state: "${state.steps.classify_entry_after_session_recovery?.action?.ok === true ? state.steps.classify_entry_after_session_recovery?.action : (state.steps.classify_entry_ready?.action || {})}"
  - open_device_auth_security_settings_for_logout:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && (state.vars.effective_entry_state?.account_ready === true || state.vars.effective_entry_state?.stage === 'app_shell' || (String(state.vars.effective_entry_state?.current_url || '').includes('chatgpt.com') && state.vars.effective_entry_state?.login_cta_visible !== true && state.vars.effective_entry_state?.email_input !== true && state.vars.effective_entry_state?.password_input !== true && state.vars.effective_entry_state?.verification_input !== true))}"
      metadata:
        description: "Open ChatGPT security settings so the current managed session can be logged out before preparing device authorization for the target account."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "https://chatgpt.com/#settings/Security"
  - logout_current_chatgpt_session:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && (state.vars.effective_entry_state?.account_ready === true || state.vars.effective_entry_state?.stage === 'app_shell' || (String(state.vars.effective_entry_state?.current_url || '').includes('chatgpt.com') && state.vars.effective_entry_state?.login_cta_visible !== true && state.vars.effective_entry_state?.email_input !== true && state.vars.effective_entry_state?.password_input !== true && state.vars.effective_entry_state?.verification_input !== true))}"
      metadata:
        description: "Log out the current ChatGPT device session so device-auth preparation starts from a clean public auth entry."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const result = await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const logoutButton = Array.from(document.querySelectorAll("button, [role='button'], input[type='submit']"))
                .filter((node) => isVisible(node))
                .find((node) => normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || "")) === "Log out");
              if (!(logoutButton instanceof HTMLElement)) {
                return { ok: false, error: "logout-button-not-found" };
              }
              logoutButton.click();
              return { ok: true, clicked_text: "Log out" };
            }).catch((error) => ({
              ok: false,
              error: String(error?.message || error || "logout-click-failed"),
            }));
            if (result.ok) {
              await page.waitForTimeout(1800).catch(() => {});
            }
            return { ...result, current_url: page.url() };
  - reopen_public_chatgpt_entry_after_logout:
      if: "${state.steps.logout_current_chatgpt_session?.action?.ok === true && state.steps.logout_current_chatgpt_session?.action?.skipped !== true}"
      metadata:
        description: "Return to the public ChatGPT landing page after logging out the current managed session."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "https://chatgpt.com/?codex_rotate_public_entry=after_logout"
  - classify_after_forced_logout:
      if: "${state.steps.logout_current_chatgpt_session?.action?.ok === true && state.steps.logout_current_chatgpt_session?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Reclassify the public ChatGPT entry after logging out the previous managed session."
  - refresh_effective_entry_state_after_forced_logout:
      if: "${state.steps.logout_current_chatgpt_session?.action?.ok === true && state.steps.logout_current_chatgpt_session?.action?.skipped !== true}"
      metadata:
        description: "Update the effective entry-state cache after forcing the managed profile back to the public ChatGPT entry."
      set:
        effective_entry_state: "${state.steps.classify_after_forced_logout?.action || (state.vars.effective_entry_state || {})}"
  - choose_login_shell_branch:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && state.vars.effective_entry_state?.stage === 'unknown' && state.vars.effective_entry_state?.signup_cta_visible !== true && state.vars.effective_entry_state?.login_cta_visible === true}"
      metadata:
        templateRef: click_login_button
        description: "Enter the OpenAI auth shell from the public ChatGPT landing page when no direct signup CTA is visible."
  - classify_after_choose_login_shell:
      if: "${state.steps.choose_login_shell_branch?.action?.ok === true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after entering the login shell from the public ChatGPT landing page."
  - cache_signup_entry_state:
      metadata:
        description: "Cache the entry-state classification that should drive the signup branch selection."
      set:
        signup_entry_state: "${state.steps.classify_after_choose_login_shell?.action?.ok === true ? state.steps.classify_after_choose_login_shell?.action : (state.vars.effective_entry_state || {})}"
  - choose_signup_branch:
      if: "${((state.vars.signup_entry_state?.stage === 'login_email' || state.vars.signup_entry_state?.stage === 'unknown') && state.vars.signup_entry_state?.signup_cta_visible === true) && String(inputs.prefer_signup_recovery ?? 'true') !== 'false'}"
      metadata:
        templateRef: click_signup_button
        description: "Switch from the login shell to the signup page."
  - classify_after_choose_signup:
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after selecting signup."
  - fill_prepare_login_email:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && state.steps.classify_after_choose_signup?.action?.stage === 'login_email'}"
      metadata:
        templateRef: fill_openai_email_field
        description: "Fill the target account email on the public OpenAI login page while preparing device authorization."
        browser:
          validation:
            pre:
              kind: playwright
              op: exists
              selector: 'input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]'
            post:
              kind: js
              expression: "const fields = Array.from(document.querySelectorAll('input[type=\"email\"], input[name=\"email\"], input[autocomplete=\"email\"], input[autocomplete=\"username\"]'));\nconst values = fields.map((field) => field.value || '');\nreturn {\n  ok: values.some((value) => value === String(args.email || '')),\n  values,\n};\n"
  - submit_prepare_login_email:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && state.steps.classify_after_choose_signup?.action?.stage === 'login_email' && state.steps.fill_prepare_login_email?.action?.ok === true}"
      metadata:
        templateRef: submit_login_email_form
        description: "Submit the public OpenAI login email step while preparing device authorization."
  - wait_after_prepare_login_email_submit:
      if: "${state.steps.submit_prepare_login_email?.action?.ok === true && state.steps.submit_prepare_login_email?.action?.skipped !== true}"
      metadata:
        description: "Allow the public OpenAI login email submission to settle before classifying the next page."
      wait:
        milliseconds: 900
  - classify_after_prepare_login_email:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && (state.steps.classify_after_choose_signup?.action?.stage === 'login_email' || state.steps.submit_prepare_login_email?.action?.ok === true)}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after submitting the public login email."
  - clear_prepare_login_email_security_gate:
      if: "${state.steps.classify_after_prepare_login_email?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any security gate encountered after submitting the public login email."
  - classify_after_prepare_login_email_gate:
      if: "${String(inputs.mode || 'codex_login') === 'prepare_device_auth' && (state.steps.classify_after_prepare_login_email?.action?.ok === true || state.steps.clear_prepare_login_email_security_gate?.action?.ok === true)}"
      metadata:
        templateRef: classify_openai_surface
        description: "Refresh the public login state after email-step security handling."
  - fill_prepare_login_password:
      if: "${state.steps.classify_after_prepare_login_email_gate?.action?.stage === 'login_password' && inputs.account_login_locator != null}"
      metadata:
        templateRef: fill_openai_password_field
        description: "Fill the target account password on the public OpenAI login page while preparing device authorization."
        browser:
          validation:
            pre:
              kind: playwright
              op: exists
              selector: 'input[type="password"], input[name="password"], input[autocomplete="current-password"]'
            post:
              kind: js
              expression: "const fields = Array.from(document.querySelectorAll('input[type=\"password\"], input[name=\"password\"], input[autocomplete=\"current-password\"]'));\nconst values = fields.map((field) => String(field.value || ''));\nconst submit = Array.from(document.querySelectorAll('button[type=\"submit\"], input[type=\"submit\"], button, [role=\"button\"]')).find((node) => {\n  if (!(node instanceof Element)) {\n    return false;\n  }\n  const style = window.getComputedStyle(node);\n  if (!style || style.display === 'none' || style.visibility === 'hidden') {\n    return false;\n  }\n  const rect = node.getBoundingClientRect();\n  if (!(rect.width > 0 && rect.height > 0)) {\n    return false;\n  }\n  const label = String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || '')).replace(/\\s+/g, ' ').trim();\n  return /continue|next|log in|sign in|submit|verify/i.test(label);\n});\nconst submitDisabled = submit instanceof Element ? (submit.hasAttribute('disabled') || submit.getAttribute('aria-disabled') === 'true') : null;\nconst hasValue = values.some((value) => value.length > 0);\nreturn {\n  ok: hasValue && submitDisabled === false,\n  has_value: hasValue,\n  value_lengths: values.map((value) => value.length),\n  submit_disabled: submitDisabled,\n};\n"
  - submit_prepare_login_password:
      if: "${state.steps.classify_after_prepare_login_email_gate?.action?.stage === 'login_password' && inputs.account_login_locator != null && state.steps.fill_prepare_login_password?.action?.ok === true}"
      metadata:
        templateRef: submit_openai_password_form
        description: "Submit the public OpenAI login password step while preparing device authorization."
  - wait_after_prepare_login_password_submit:
      if: "${state.steps.submit_prepare_login_password?.action?.ok === true && state.steps.submit_prepare_login_password?.action?.skipped !== true}"
      metadata:
        description: "Allow the public OpenAI login password submission to settle before classifying the next page."
      wait:
