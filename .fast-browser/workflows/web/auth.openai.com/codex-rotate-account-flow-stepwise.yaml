    fill_openai_about_you_form:
      metadata:
        description: "Fill the OpenAI about-you form and verify that its primary submit control becomes enabled."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const fullName = String(args.full_name || "Dev Astronlab").trim();
            const month = String(args.birth_month || "1").trim();
            const day = String(args.birth_day || "24").trim();
            const year = String(args.birth_year || "1990").trim();
            const monthNames = {
              "1": ["1", "01", "jan", "january"],
              "2": ["2", "02", "feb", "february"],
              "3": ["3", "03", "mar", "march"],
              "4": ["4", "04", "apr", "april"],
              "5": ["5", "05", "may"],
              "6": ["6", "06", "jun", "june"],
              "7": ["7", "07", "jul", "july"],
              "8": ["8", "08", "aug", "august"],
              "9": ["9", "09", "sep", "sept", "september"],
              "10": ["10", "oct", "october"],
              "11": ["11", "nov", "november"],
              "12": ["12", "dec", "december"],
            };
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const monthTokens = (monthNames[month] || [month]).map((value) => normalize(value).toLowerCase());
            const dayTokens = [day, day.padStart(2, "0")].map((value) => normalize(value));
            const findVisible = async (selectors) => {
              for (const selector of selectors) {
                const locator = page.locator(selector).first();
                if (!(await locator.count().catch(() => 0))) {
                  continue;
                }
                if (!(await locator.isVisible().catch(() => false))) {
                  continue;
                }
                return locator;
              }
              return null;
            };
            const readInputValue = async (locator) => {
              return await locator.inputValue().catch(() => null);
            };
            const readSelectValue = async (locator) => {
              return await locator.evaluate((node) => {
                if (!(node instanceof HTMLSelectElement)) {
                  return null;
                }
                const selected = node.selectedOptions?.[0];
                return {
                  value: String(node.value || ""),
                  label: String(selected?.label || selected?.textContent || node.value || ""),
                };
              }).catch(() => null);
            };
            const visibleSelects = [];
            const selectCount = await page.locator("select").count().catch(() => 0);
            for (let index = 0; index < selectCount; index += 1) {
              const locator = page.locator("select").nth(index);
              if (await locator.isVisible().catch(() => false)) {
                visibleSelects.push(locator);
              }
            }
            const nameField = await findVisible([
              'input[name="name"]',
              'input[name*="name" i]',
              'input[autocomplete="name"]',
              'input[placeholder*="name" i]',
            ]);
            const monthField = await findVisible([
              'select[name*="month" i]',
              'select[aria-label*="month" i]',
            ]) || visibleSelects[0] || null;
            const dayField = await findVisible([
              'select[name*="day" i]',
              'select[aria-label*="day" i]',
            ]) || visibleSelects[1] || null;
            const yearField = await findVisible([
              'select[name*="year" i]',
              'select[aria-label*="year" i]',
            ]) || visibleSelects[2] || null;
            if (!nameField || !monthField || !dayField || !yearField) {
              throw new Error("about-you-fields-not-found");
            }
            await nameField.scrollIntoViewIfNeeded().catch(() => {});
            await nameField.click().catch(() => {});
            await nameField.fill(fullName).catch(() => {});
            const selectValue = async (locator, targetValue, acceptedTokens = []) => {
              const options = await locator.evaluate((node) => {
                if (!(node instanceof HTMLSelectElement)) {
                  return [];
                }
                return Array.from(node.options || []).map((option) => ({
                  value: String(option.value || ""),
                  label: String(option.label || option.textContent || ""),
                }));
              }).catch(() => []);
              const normalizedTarget = normalize(targetValue).toLowerCase();
              const normalizedAccepted = acceptedTokens.map((value) => normalize(value).toLowerCase());
              const chosen = options.find((option) => {
                const value = normalize(option.value).toLowerCase();
                const label = normalize(option.label).toLowerCase();
                return value === normalizedTarget
                  || label === normalizedTarget
                  || normalizedAccepted.includes(value)
                  || normalizedAccepted.includes(label);
              });
              if (!chosen) {
                throw new Error("about-you-option-not-found:" + String(targetValue));
              }
              await locator.selectOption({ value: chosen.value }).catch(async () => {
                await locator.selectOption({ label: chosen.label }).catch(() => {});
              });
            };
            await selectValue(monthField, month, monthTokens);
            await selectValue(dayField, day, dayTokens);
            await selectValue(yearField, year, [year]);
            await page.locator("body").click({ position: { x: 8, y: 8 } }).catch(() => {});
            await page.waitForTimeout(250).catch(() => {});
            const nameActual = normalize(await readInputValue(nameField));
            const monthActual = await readSelectValue(monthField);
            const dayActual = await readSelectValue(dayField);
            const yearActual = await readSelectValue(yearField);
            const submit = page.locator('button[type="submit"], input[type="submit"], button, [role="button"]')
              .filter({ hasText: /continue|next|finish creating account|submit|verify/i })
              .first();
            const submitFound = (await submit.count().catch(() => 0)) > 0;
            const submitDisabled = submitFound ? await submit.isDisabled().catch(() => null) : null;
            const submitText = submitFound
              ? await submit.evaluate((node) => String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || "")).replace(/\s+/g, " ").trim()).catch(() => null)
              : null;
            const monthMatches = monthTokens.includes(normalize(monthActual?.label || monthActual?.value || "").toLowerCase());
            const dayMatches = dayTokens.includes(normalize(dayActual?.label || dayActual?.value || ""));
            const yearMatches = normalize(yearActual?.label || yearActual?.value || "") === normalize(year);
            const result = {
              ok: nameActual === normalize(fullName) && monthMatches && dayMatches && yearMatches && submitDisabled === false,
              name_value: nameActual || null,
              month_value: normalize(monthActual?.label || monthActual?.value || "") || null,
              day_value: normalize(dayActual?.label || dayActual?.value || "") || null,
              year_value: normalize(yearActual?.label || yearActual?.value || "") || null,
              submit_disabled: submitDisabled,
              submit_text: normalize(submitText || "") || null,
              error: null,
            };
            if (!result.ok) {
              result.error = "about-you-form-not-ready";
            }
            if (!result.ok) {
              throw new Error("about-you-fill-failed:" + JSON.stringify(result));
            }
            return {
              ...result,
              current_url: page.url(),
            };
    submit_openai_password_form:
      metadata:
        description: "Submit the current OpenAI password form and verify that the flow leaves the password stage."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const readStateInPage = () => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              });
              const bodyText = normalize(document.body ? (document.body.innerText || document.body.textContent || "") : "");
              const title = normalize(document.title || "");
              const path = location.pathname;
              const host = location.hostname;
              const emailInput = hasVisible('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]');
              const passwordInput = hasVisible('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]');
              const verificationInput = hasVisible('input[name*="code" i], input[autocomplete="one-time-code"], input[inputmode="numeric"]');
              const antiBotGate = /just a moment/i.test(title)
                || /performing security verification|verify you are not a bot|verifying you are human|verify you are human/i.test(bodyText)
                || hasVisible('input[name="cf-turnstile-response"], iframe[src*="challenge"], iframe[title*="Widget containing"]');
              const retryableTimeout = /oops, an error occurred|operation timed out|try again/i.test(bodyText);
              const sessionEnded = /your session has ended/i.test(bodyText);
              const rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(bodyText);
              const addPhonePrompt = /add-phone/i.test(path)
                || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(bodyText);
              const aboutYou = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(bodyText)
                || /about-you/i.test(path);
              const resetPasswordPrompt = /reset-password/i.test(path) || /\breset password\b/i.test(bodyText);
              const existingAccountPrompt = /an account for this email address already exists|this email address already exists|account already exists|already registered/i.test(bodyText);
              const usernameNotFound = /username_not_found|username not found/i.test(bodyText);
              const invalidCredentials = /incorrect email address or password|incorrect password|wrong password|invalid email or password/i.test(bodyText);
              const oauthConsentCopy = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(bodyText)
                || /sign in to codex/i.test(title);
              const oauthContinueVisible = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']")).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                if (!(rect.width > 0 && rect.height > 0)) {
                  return false;
                }
                const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || ""));
                return /continue to codex|continue to openai|authorize|allow|accept/i.test(text)
                  || (oauthConsentCopy && /^continue$/i.test(text));
              });
              const needsEmailVerification = (!oauthConsentCopy && verificationInput)
                || (!oauthConsentCopy && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))
                || (!oauthConsentCopy && /email-verification/i.test(path));
              let stage = "unknown";
              if (/^(localhost|127\.0\.0\.1)$/i.test(host)) {
                stage = "callback_complete";
              } else if (antiBotGate) {
                stage = "security_verification";
              } else if (rateLimitExceeded) {
                stage = "rate_limit";
              } else if (sessionEnded) {
                stage = "session_ended";
              } else if (retryableTimeout) {
                stage = "retryable_timeout";
              } else if (addPhonePrompt) {
                stage = "add_phone";
              } else if (oauthConsentCopy && oauthContinueVisible) {
                stage = "oauth_consent";
              } else if (aboutYou) {
                stage = "about_you";
              } else if (needsEmailVerification) {
                stage = "email_verification";
              } else if (existingAccountPrompt) {
                stage = "existing_account_prompt";
              } else if (invalidCredentials) {
                stage = "invalid_credentials";
              } else if (/\/create-account(?:\/|$)/i.test(path) && passwordInput) {
                stage = "signup_password";
              } else if (/\/create-account(?:\/|$)/i.test(path) && emailInput) {
                stage = "signup_email";
              } else if (/\/log-in(?:\/|$)/i.test(path) && passwordInput) {
                stage = "login_password";
              } else if (/\/log-in(?:\/|$)/i.test(path) && emailInput) {
                stage = "login_email";
              } else if (emailInput || passwordInput || verificationInput) {
                stage = "auth_prompt";
              }
              return {
                stage,
                current_url: location.href,
                headline: bodyText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
                invalid_credentials: invalidCredentials,
                reset_password_prompt: resetPasswordPrompt,
                username_not_found: usernameNotFound,
                add_phone_prompt: addPhonePrompt,
                needs_email_verification: needsEmailVerification,
                follow_up_step: aboutYou,
                oauth_continue_visible: oauthContinueVisible,
                anti_bot_gate: antiBotGate,
                retryable_timeout: retryableTimeout,
                rate_limit_exceeded: rateLimitExceeded,
                session_ended: sessionEnded,
                existing_account_prompt: existingAccountPrompt,
                callback_complete: /^(localhost|127\.0\.0\.1)$/i.test(host),
              };
            };
            const detectState = async () => {
              for (let attempt = 0; attempt < 3; attempt += 1) {
                try {
                  return await page.evaluate(readStateInPage);
                } catch (error) {
                  const message = String(error?.message || error || "");
                  if (!/Execution context was destroyed|Cannot find context|Target closed|Frame was detached/i.test(message) || attempt === 2) {
                    return {
                      stage: "unknown",
                      current_url: page.url(),
                      headline: null,
                      invalid_credentials: false,
                      reset_password_prompt: false,
                      username_not_found: false,
                      add_phone_prompt: /auth\.openai\.com\/add-phone(?:\/|$)?/i.test(page.url()),
                      needs_email_verification: /auth\.openai\.com\/email-verification(?:\/|$)?/i.test(page.url()),
                      follow_up_step: /auth\.openai\.com\/about-you(?:\/|$)?/i.test(page.url()),
                      oauth_continue_visible: false,
                      anti_bot_gate: false,
                      retryable_timeout: false,
                      rate_limit_exceeded: false,
                      session_ended: false,
                      existing_account_prompt: false,
                      callback_complete: /^(http:\/\/localhost|http:\/\/127\.0\.0\.1)/i.test(page.url()),
                    };
                  }
                  await page.waitForLoadState("domcontentloaded").catch(() => {});
                  await page.waitForTimeout(250).catch(() => {});
