                    }
                    return normalize(node.innerText || node.textContent || node.getAttribute("aria-label") || "");
                  };
                  const form = field instanceof Element ? field.closest("form") : null;
                  const scope = form || document;
                  const candidates = Array.from(scope.querySelectorAll("button, input[type='submit'], [role='button']"))
                    .filter((node) => isVisible(node) && node.getAttribute("aria-disabled") !== "true" && !node.hasAttribute("disabled"));
                  const preferred = candidates.find((node) => {
                    const label = readLabel(node);
                    const isSubmitNode = (node instanceof HTMLButtonElement && node.type === "submit")
                      || (node instanceof HTMLInputElement && node.type === "submit");
                    return isSubmitNode && /continue|next|create account|sign up|log in|sign in|submit|verify|authorize|allow|accept/i.test(label);
                  }) || candidates.find((node) => /continue|next|create account|sign up|log in|sign in|submit|verify|authorize|allow|accept/i.test(readLabel(node)));
                  if (preferred instanceof HTMLElement) {
                    preferred.click();
                    return {
                      ok: true,
                      strategy: "form-dom-click",
                      label: readLabel(preferred) || null,
                    };
                  }
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                    return {
                      ok: true,
                      strategy: "form-request-submit",
                      label: null,
                    };
                  }
                  return null;
                });
                return result;
              } catch (error) {
                const message = String(error?.message || error || "");
                if (/Execution context was destroyed|Cannot find context|Target closed|Frame was detached/i.test(message)) {
                  return {
                    ok: true,
                    strategy: "form-dom-click-navigation",
                    label: null,
                  };
                }
                throw error;
              }
            };

            const attempts = [
              async () => clickVisibleContinue(),
              async () => submitFormFromField(),
              async () => {
                await passwordField.press("Enter").catch(() => {});
                return { strategy: "press-enter", label: null };
              },
              async () => {
                await passwordField.evaluate((field) => {
                  if (field instanceof HTMLElement) {
                    field.blur();
                  }
                  const form = field instanceof Element ? field.closest("form") : null;
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                  }
                }).catch(() => {});
                return { strategy: "request-submit", label: null };
              },
            ];

            const transitions = [];
            for (const attempt of attempts) {
              const performed = await attempt();
              if (!performed) {
                continue;
              }
              await page.waitForTimeout(1200).catch(() => {});
              const after = await detectState();
              transitions.push({ ...performed, ...after });
              const progressed = after.stage !== initial.stage
                || after.current_url !== initial.current_url
                || after.needs_email_verification
                || after.follow_up_step
                || after.add_phone_prompt
                || after.existing_account_prompt
                || after.invalid_credentials
                || after.reset_password_prompt
                || after.username_not_found
                || after.oauth_continue_visible
                || after.anti_bot_gate
                || after.retryable_timeout
                || after.rate_limit_exceeded
                || after.session_ended
                || after.callback_complete;
              if (progressed && after.stage !== initial.stage) {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  clicked_text: performed.label || null,
                  initial_stage: initial.stage,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
              if (progressed && after.stage !== "signup_password" && after.stage !== "login_password") {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  clicked_text: performed.label || null,
                  initial_stage: initial.stage,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
            }

            const finalState = await detectState();
            throw new Error("password-submit-stuck:" + String(finalState.stage || "unknown") + ":" + String(finalState.current_url || page.url()));
