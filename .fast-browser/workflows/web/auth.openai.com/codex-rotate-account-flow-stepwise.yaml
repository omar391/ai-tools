            await input.waitFor({ state: "visible", timeout: 8000 }).catch(() => {});
            if ((await input.count().catch(() => 0)) === 0 || !(await input.isVisible().catch(() => false))) {
              const before = await detectStage();
              throw new Error("login-verification-input-not-ready:" + String(before.stage || "unknown") + ":" + String(before.current_url || page.url()));
            }

            await input.click().catch(() => {});
            await input.press("Meta+A").catch(() => {});
            await input.press("Control+A").catch(() => {});
            await input.press("Backspace").catch(() => {});
            await input.pressSequentially(code, { delay: 45 }).catch(() => {});
            await page.waitForTimeout(150).catch(() => {});

            const value = String(await input.inputValue().catch(() => "")).replace(/\D+/g, "").slice(0, 6);
            if (value.length < 6 || value !== code) {
              throw new Error("login-verification-input-mismatch:" + (value || "empty"));
            }

            const allowedStages = new Set([
              "about_you",
              "add_phone",
              "oauth_consent",
              "security_verification",
              "retryable_timeout",
              "rate_limit",
              "session_ended",
              "callback_complete",
            ]);

            const clickVisibleContinue = async () => {
              const result = await input.evaluate((field) => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const readLabel = (node) => {
                  if (!(node instanceof Element)) {
                    return "";
                  }
                  if (node instanceof HTMLInputElement) {
                    return normalize(node.value || node.getAttribute("aria-label") || "");
                  }
                  return normalize(node.innerText || node.textContent || node.getAttribute("aria-label") || "");
                };
                const form = field instanceof Element ? field.closest("form") : null;
                const scope = form || document;
                const candidates = Array.from(scope.querySelectorAll("button, input[type='submit'], [role='button']"))
                  .filter((node) => isVisible(node) && node.getAttribute("aria-disabled") !== "true" && !node.hasAttribute("disabled"));
                const preferred = candidates.find((node) => {
                  const label = readLabel(node);
                  const isSubmitNode = (node instanceof HTMLButtonElement && node.type === "submit")
                    || (node instanceof HTMLInputElement && node.type === "submit");
                  return isSubmitNode && /continue|next|verify|submit|authorize|allow|accept/i.test(label);
                }) || candidates.find((node) => /continue|next|verify|submit|authorize|allow|accept/i.test(readLabel(node)));
                if (preferred instanceof HTMLElement) {
                  preferred.click();
                  return {
                    ok: true,
                    strategy: "form-dom-click",
                    label: readLabel(preferred) || null,
                  };
                }
                if (form instanceof HTMLFormElement) {
                  form.requestSubmit();
                  return {
                    ok: true,
                    strategy: "form-request-submit",
                    label: null,
                  };
                }
                return null;
              }).catch(() => null);
              return result;
            };

            const attempts = [
              async () => clickVisibleContinue(),
              async () => {
                await input.press("Enter").catch(() => {});
                return { strategy: "press-enter", label: null };
              },
              async () => {
                await input.evaluate((field) => {
                  if (field instanceof HTMLElement) {
                    field.blur();
                  }
                  const form = field instanceof Element ? field.closest("form") : null;
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                  }
                }).catch(() => {});
                return { strategy: "request-submit", label: null };
              },
            ];

            const transitions = [];
            for (const attempt of attempts) {
              const performed = await attempt();
              if (!performed) {
                continue;
              }
              await page.waitForTimeout(1200).catch(() => {});
              const after = await detectStage();
              transitions.push({ ...performed, ...after });
              if (allowedStages.has(after.stage) && after.stage !== "email_verification") {
                return {
                  ok: true,
                  code,
                  strategy: performed.strategy,
                  clicked_text: performed.label || null,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
            }

            const finalState = await detectStage();
            if (finalState.incorrect_code) {
              throw new Error("login-verification-code-rejected:" + String(finalState.current_url || page.url()));
            }
            throw new Error("login-verification-submit-stuck:" + String(finalState.stage || "unknown") + ":" + String(finalState.current_url || page.url()));
  - classify_after_login_verification:
      if: "${state.steps.submit_login_verification_code?.action?.ok === true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after submitting the replayed-login OTP."
  - clear_login_verification_security_gate:
      if: "${state.steps.classify_after_login_verification?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any security gate encountered after submitting the replayed-login OTP."
  - classify_after_login_verification_gate:
      if: "${state.steps.submit_login_verification_code?.action?.ok === true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Refresh the replayed login state after verification-step security handling."
  - fill_login_about_you:
      if: "${state.steps.classify_after_login_verification_gate?.action?.follow_up_step === true}"
      metadata:
        templateRef: fill_openai_about_you_form
        description: "Fill the about-you form if OpenAI requests it again during the replayed login."
        mode: headless_ok
        targetRef: primary
        browser:
          validation:
            pre:
              kind: playwright
              op: exists
              selector: 'input[name*="name" i], input[autocomplete="name"], input[placeholder*="name" i]'
  - submit_login_about_you:
      if: "${state.steps.classify_after_login_verification_gate?.action?.follow_up_step === true && state.steps.fill_login_about_you?.action?.ok === true}"
      metadata:
        templateRef: submit_openai_about_you_form
        description: "Submit the about-you form if it appears again during the replayed login."
  - wait_after_login_about_you_submit:
      if: "${state.steps.submit_login_about_you?.action?.ok === true && state.steps.submit_login_about_you?.action?.skipped !== true}"
      metadata:
        description: "Allow the replayed about-you submission to settle before classifying the next page."
      wait:
        milliseconds: 900
  - classify_after_login_about_you:
      if: "${state.steps.submit_login_about_you?.action?.ok === true && state.steps.submit_login_about_you?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after submitting the replayed about-you form."
  - clear_login_about_you_security_gate:
      if: "${state.steps.classify_after_login_about_you?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any security gate encountered after submitting the replayed about-you form."
  - classify_before_consent:
      if: "${(state.steps.reopen_existing_account_auth_url?.action?.ok === true && state.steps.reopen_existing_account_auth_url?.action?.skipped !== true) || (state.steps.reopen_captured_auth_url?.action?.ok === true && state.steps.reopen_captured_auth_url?.action?.skipped !== true)}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the final OpenAI/Codex callback state before any consent click."
  - accept_oauth_consent:
      if: "${state.steps.classify_before_consent?.action?.oauth_continue_visible === true && state.steps.classify_before_consent?.action?.callback_complete !== true}"
      metadata:
        templateRef: click_oauth_consent_continue
        description: "Accept the final OpenAI consent step for the Codex callback."
  - classify_after_oauth_consent:
      if: "${(state.steps.reopen_existing_account_auth_url?.action?.ok === true && state.steps.reopen_existing_account_auth_url?.action?.skipped !== true) || (state.steps.reopen_captured_auth_url?.action?.ok === true && state.steps.reopen_captured_auth_url?.action?.skipped !== true)}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the callback state after any final consent click."
  - clear_post_consent_security_gate:
      if: "${((state.steps.reopen_existing_account_auth_url?.action?.ok === true && state.steps.reopen_existing_account_auth_url?.action?.skipped !== true) || (state.steps.reopen_captured_auth_url?.action?.ok === true && state.steps.reopen_captured_auth_url?.action?.skipped !== true)) && state.steps.classify_after_oauth_consent?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any final security gate that appears after the consent step."
  - complete_login_or_consent:
      if: "${(state.steps.reopen_existing_account_auth_url?.action?.ok === true && state.steps.reopen_existing_account_auth_url?.action?.skipped !== true) || (state.steps.reopen_captured_auth_url?.action?.ok === true && state.steps.reopen_captured_auth_url?.action?.skipped !== true)}"
      metadata:
        templateRef: classify_openai_surface
        description: "Flatten the final OpenAI/Codex callback state for codex-rotate."
  - wait_for_codex_login_exit:
      if: "${(state.steps.complete_login_or_consent?.action?.callback_complete === true || state.steps.complete_login_or_consent?.action?.success === true) && (state.vars.codex_login?.exit_path || inputs.codex_login_exit_path)}"
      metadata:
        description: "Wait for the detached codex login process to exit after the callback completes."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const { setTimeout: delay } = await import("node:timers/promises");

            const exitPath = String(state.vars?.codex_login?.exit_path || args.codex_login_exit_path || "").trim();
            const stdoutPath = String(state.vars?.codex_login?.stdout_path || args.codex_login_stdout_path || "").trim();
            const stderrPath = String(state.vars?.codex_login?.stderr_path || args.codex_login_stderr_path || "").trim();

            if (!exitPath) {
              return {
                ok: true,
                skipped: true,
              };
            }

            const readText = (filePath) => {
              if (!filePath || !fs.existsSync(filePath)) {
                return "";
              }
              return fs.readFileSync(filePath, "utf8");
            };
            const tail = (filePath, maxChars = 1200) => {
              const text = readText(filePath);
              return text.length > maxChars ? text.slice(-maxChars) : text;
            };

            const timeoutMs = 15000;
            const startedAt = Date.now();
            while (Date.now() - startedAt < timeoutMs) {
              if (fs.existsSync(exitPath)) {
                const raw = readText(exitPath).trim();
                const parsed = raw === "" ? null : Number.parseInt(raw, 10);
                const exitCode = Number.isInteger(parsed) ? parsed : null;
                return {
                  ok: exitCode === 0,
                  exit_code: exitCode,
                  stdout_tail: tail(stdoutPath) || null,
                  stderr_tail: tail(stderrPath) || null,
                };
              }
              await delay(250);
            }

            return {
              ok: false,
              timeout: true,
              exit_code: null,
              stdout_tail: tail(stdoutPath) || null,
              stderr_tail: tail(stderrPath) || null,
            };
  - finalize_flow_summary:
      metadata:
        description: "Build the final codex-rotate auth summary from workflow state and detached session metadata."
      run:
        script:
          language: javascript
          code: |
            const mode = String(args.mode || "codex_login");
            const prepareDeviceAuth = mode !== "codex_login";
            const final = prepareDeviceAuth
              ? (state.steps.classify_after_login_about_you?.action
                || state.steps.classify_after_login_verification_gate?.action
                || state.steps.classify_after_prepare_login_recovery_gate?.action
                || state.steps.classify_after_prepare_login_recovery_choice?.action
                || state.steps.classify_after_prepare_login_password_gate?.action
                || state.steps.classify_after_prepare_login_email_gate?.action
                || state.steps.classify_after_choose_signup?.action
                || {})
              : (state.steps.complete_login_or_consent?.action || {});
            const signupGate = state.steps.classify_after_signup_password_gate?.action || {};
            const signupAfter = state.steps.classify_after_signup_password?.action || {};
            const signupComplete = state.steps.classify_signup_complete?.action || {};
            const exitResult = state.steps.wait_for_codex_login_exit?.action?.value || {};
            const session = state.vars?.codex_login && typeof state.vars.codex_login === "object" && !Array.isArray(state.vars.codex_login)
              ? state.vars.codex_login
              : {};

            const stage = final.stage || signupGate.stage || signupAfter.stage || signupComplete.stage || null;
            const currentUrl = final.current_url || signupGate.current_url || signupAfter.current_url || signupComplete.current_url || null;
            const headline = final.headline || signupGate.headline || signupAfter.headline || signupComplete.headline || null;

            const callbackComplete = prepareDeviceAuth ? false : final.callback_complete === true;
            const success = prepareDeviceAuth
              ? (final.account_ready === true || final.success === true || signupComplete.account_ready === true || signupComplete.success === true)
              : final.success === true;
            const accountReady = prepareDeviceAuth
              ? (final.account_ready === true || final.success === true || signupComplete.account_ready === true || signupComplete.success === true)
              : final.account_ready === true;
            const needsEmailVerification = final.needs_email_verification === true || stage === "email_verification";
            const followUpStep = final.follow_up_step === true || stage === "about_you";
            const addPhonePrompt = final.add_phone_prompt === true || stage === "add_phone" || signupComplete.stage === "add_phone";
            const retryableTimeout = final.retryable_timeout === true || stage === "retryable_timeout";
            const sessionEnded = final.session_ended === true || stage === "session_ended";
            const existingAccountPrompt = final.existing_account_prompt === true
              || signupGate.existing_account_prompt === true
              || signupAfter.existing_account_prompt === true
              || stage === "existing_account_prompt";
            const usernameNotFound = final.username_not_found === true;
            const invalidCredentials = final.invalid_credentials === true || stage === "invalid_credentials";
            const rateLimitExceeded = final.rate_limit_exceeded === true || stage === "rate_limit";
            const antiBotGate = final.anti_bot_gate === true
              || state.steps.classify_before_consent?.action?.anti_bot_gate === true
              || state.steps.classify_after_oauth_consent?.action?.anti_bot_gate === true;
            const authPrompt = final.auth_prompt === true
              || stage === "auth_prompt"
              || stage === "login_email"
              || stage === "login_password"
              || stage === "signup_email"
              || stage === "signup_password";

            let nextAction = "fail_terminal";
            let replayReason = null;
            let retryReason = null;
            let errorMessage = null;
            if (callbackComplete || success) {
              nextAction = "complete";
            } else if (invalidCredentials) {
              nextAction = "fail_invalid_credentials";
              errorMessage = "OpenAI rejected the stored password for " + String(args.email || "the account") + ".";
            } else if (rateLimitExceeded || retryableTimeout) {
              nextAction = "retry_attempt";
              retryReason = rateLimitExceeded ? "rate_limit" : "retryable_timeout";
              errorMessage = rateLimitExceeded
                ? "OpenAI rate-limited the Codex login."
                : "OpenAI timed out before completing the Codex login.";
            } else if (needsEmailVerification || followUpStep || addPhonePrompt || authPrompt) {
              if (prepareDeviceAuth) {
                nextAction = "fail_terminal";
                errorMessage = addPhonePrompt
                  ? "OpenAI still requires phone setup before device authorization can start."
                  : (needsEmailVerification
                      ? "OpenAI still requires email verification before device authorization can start."
                      : (followUpStep
                          ? "OpenAI still requires account setup before device authorization can start."
                          : "OpenAI remained on an auth prompt instead of reaching an authenticated session for device authorization."));
              } else {
                nextAction = "replay_auth_url";
                replayReason = addPhonePrompt
                  ? "add_phone"
                  : (needsEmailVerification
                      ? "email_verification"
                      : (followUpStep ? "about_you" : "auth_prompt"));
                errorMessage = addPhonePrompt
                  ? "OpenAI still requires phone setup before the Codex callback can complete."
                  : (needsEmailVerification
                      ? "OpenAI still requires email verification before the Codex callback can complete."
                      : (followUpStep
                          ? "OpenAI still requires account setup before the Codex callback can complete."
                          : "OpenAI remained on an auth prompt instead of reaching the Codex callback."));
              }
            } else if (existingAccountPrompt) {
              if (prepareDeviceAuth) {
                nextAction = "fail_terminal";
                errorMessage = "OpenAI redirected signup into an existing-account prompt while preparing device authorization.";
              } else {
                nextAction = "replay_auth_url";
                replayReason = "existing_account_prompt";
                errorMessage = "OpenAI redirected signup into an existing-account prompt instead of completing the Codex callback.";
              }
            } else if (usernameNotFound) {
              nextAction = "fail_terminal";
              errorMessage = "OpenAI reported that the username was not found during recovery.";
            } else if (sessionEnded) {
              nextAction = "retry_attempt";
              retryReason = "session_ended";
              errorMessage = "OpenAI ended the auth session before the Codex callback completed.";
            } else if (antiBotGate) {
              nextAction = "retry_attempt";
              retryReason = "anti_bot_gate";
              errorMessage = prepareDeviceAuth
                ? "OpenAI remained behind a security gate before device authorization could start."
                : "OpenAI remained behind a security gate before the Codex callback completed.";
            } else {
              errorMessage = prepareDeviceAuth
                ? "OpenAI account setup did not reach an authenticated session for device authorization."
                : "Codex browser login did not reach the callback.";
            }

            return {
              stage,
              current_url: currentUrl,
              headline,
              callback_complete: callbackComplete,
              success,
              account_ready: accountReady,
              needs_email_verification: needsEmailVerification,
              follow_up_step: followUpStep,
              add_phone_prompt: addPhonePrompt,
              retryable_timeout: retryableTimeout,
              session_ended: sessionEnded,
              existing_account_prompt: existingAccountPrompt,
              username_not_found: usernameNotFound,
              invalid_credentials: invalidCredentials,
              rate_limit_exceeded: rateLimitExceeded,
              anti_bot_gate: antiBotGate,
              auth_prompt: authPrompt,
              next_action: nextAction,
              replay_reason: replayReason,
              retry_reason: retryReason,
              error_message: errorMessage,
              codex_session: {
                auth_url: session.auth_url || null,
                callback_url: session.callback_url || null,
                callback_port: session.callback_port ?? null,
                session_dir: session.session_dir || null,
                pid: session.pid ?? null,
                stdout_path: session.stdout_path || null,
                stderr_path: session.stderr_path || null,
                exit_path: session.exit_path || null,
              },
              codex_login_exit_ok: exitResult.ok === true,
              codex_login_exit_code: exitResult.exit_code ?? null,
              codex_login_stdout_tail: exitResult.stdout_tail || null,
              codex_login_stderr_tail: exitResult.stderr_tail || null,
            };
output:
  as: "${state.steps.finalize_flow_summary?.action?.value || {}}"
