                }
                const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || ""));
                return /continue to codex|continue to openai|authorize|allow|accept/i.test(text)
                  || (oauthConsentCopy && /^continue$/i.test(text));
