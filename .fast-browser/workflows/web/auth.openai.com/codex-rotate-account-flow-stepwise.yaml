              }
              return {
                stage: "unknown",
                current_url: page.url(),
                headline: null,
                invalid_credentials: false,
                reset_password_prompt: false,
                username_not_found: false,
                add_phone_prompt: false,
                needs_email_verification: false,
                follow_up_step: false,
                oauth_continue_visible: false,
                anti_bot_gate: false,
                retryable_timeout: false,
                rate_limit_exceeded: false,
                session_ended: false,
                existing_account_prompt: false,
                callback_complete: false,
              };
            };

            const initial = await detectState();
            const clickVisibleContinue = async () => {
              const submit = page.locator('button[type="submit"], input[type="submit"], button, [role="button"]')
                .filter({ hasText: /continue|next|create account|sign up|log in|sign in|submit|verify|authorize|allow|accept/i })
                .first();
              if ((await submit.count().catch(() => 0)) === 0) {
                return null;
              }
              const label = await submit.evaluate((node) => String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || "")).replace(/\s+/g, " ").trim()).catch(() => null);
              await submit.scrollIntoViewIfNeeded().catch(() => {});
