document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: openai-signup-probe
  version: 1.0.0
  summary: "Minimal local debug probe for OpenAI signup surfaces using the shared auth leaf in a temporary OpenAI runtime."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        email: {}
        password: {}
do:
  - open_create_account:
      metadata:
        description: "Open the OpenAI create-account page in a fresh temporary profile."
        mode: headless_ok
        targetRef: primary
        browser:
          profile:
            kind: temporary
            key: openai-account-runtime
      call: afn.driver.browser.navigate
      with:
        body:
          url: https://auth.openai.com/create-account
  - classify_initial:
      metadata:
        description: "Classify the initial OpenAI create-account surface without mutating it."
        targetRef: primary
        browser:
          profile:
            kind: temporary
            key: openai-account-runtime
        ref:
          digest: sha256:5cd8be1ed09eaf4e2763489bee144633fb72f8113cdf6227835d79df02e78670
      call: workflow.sys.web-auth-openai-com.advance-auth-page
      with:
        version: 1.0.0
        input:
          enabled: false
          fallback_url: https://auth.openai.com/create-account
  - advance_once:
      metadata:
        description: "Run one shared OpenAI auth/setup advance pass in the temp runtime."
        targetRef: primary
        browser:
          profile:
            kind: temporary
            key: openai-account-runtime
        ref:
          digest: sha256:5cd8be1ed09eaf4e2763489bee144633fb72f8113cdf6227835d79df02e78670
      call: workflow.sys.web-auth-openai-com.advance-auth-page
      with:
        version: 1.0.0
        input:
          enabled: "${inputs.enabled}"
          email: "${inputs.email}"
          password: "${inputs.password}"
          allow_password_reset: false
          fallback_url: https://auth.openai.com/create-account
  - classify_after:
      metadata:
        description: "Flatten the latest nested classification after the advance pass."
      call: afn.js_repl
      with:
        body:
          script: |
            const latest = state.steps.advance_once?.action?.result?.state?.steps?.classify_auth_state?.action || {};
            return {
              ok: true,
              current_url: latest.current_url || null,
              host: latest.host || null,
              callback_complete: latest.callback_complete === true,
              success: latest.success === true,
              account_ready: latest.account_ready === true,
              needs_email_verification: latest.needs_email_verification === true,
              follow_up_step: latest.follow_up_step === true,
              reset_password_prompt: latest.reset_password_prompt === true,
              retryable_timeout: latest.retryable_timeout === true,
              session_ended: latest.session_ended === true,
              existing_account_prompt: latest.existing_account_prompt === true,
              username_not_found: latest.username_not_found === true,
              invalid_credentials: latest.invalid_credentials === true,
              rate_limit_exceeded: latest.rate_limit_exceeded === true,
              anti_bot_gate: latest.anti_bot_gate === true,
              create_account_failed: latest.create_account_failed === true,
              auth_prompt: latest.auth_prompt === true,
            };
