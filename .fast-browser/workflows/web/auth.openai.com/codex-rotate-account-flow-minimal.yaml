      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const readSixDigitCode = (value) => {\n  const match = String(value || \"\").match(/(?:^|\\D)(\\d{6})(?:\\D|$)/);\n  return match?.[1] || null;\n};\nconst extractVerificationCode = (action) => {\n  const outputs = [\n    action?.result?.result?.output,\n    action?.result?.output,\n    action?.output,\n  ].filter((value) => value && typeof value === \"object\");\n  for (const output of outputs) {\n    const directCode =\n      readSixDigitCode(output.code)\n      || readSixDigitCode(output.verification_code)\n      || readSixDigitCode(output.otp)\n      || readSixDigitCode(output.one_time_code);\n    if (directCode) {\n      return directCode;\n    }\n  }\n  for (const output of outputs) {\n    const derivedCode =\n      readSixDigitCode(output.message_subject)\n      || readSixDigitCode(output.message_preview)\n      || readSixDigitCode(output.verification_link_text);\n    if (derivedCode) {\n      return derivedCode;\n    }\n  }\n  return readSixDigitCode(\n    action?.result?.result?.state?.steps?.collect_verification_artifact?.action?.code\n    || action?.result?.state?.steps?.collect_verification_artifact?.action?.code\n    || \"\"\n  );\n};\nconst code = String(\n  extractVerificationCode(state.steps.collect_signup_verification_artifact?.action)\n  || \"\"\n).replace(/\\D+/g, \"\").slice(0, 6);\nif (code.length < 6) {\n  throw new Error(\"signup-verification-code-missing\");\n}\nconst verificationSelector = 'input[name*=\"code\" i], input[name*=\"otp\" i], input[autocomplete=\"one-time-code\"], input[aria-label*=\"code\" i], input[aria-label*=\"otp\" i], input[placeholder*=\"code\" i], input[placeholder*=\"otp\" i], input[inputmode=\"numeric\"][maxlength=\"1\"], input[inputmode=\"numeric\"][maxlength=\"6\"]';\nconst detectStage = async () => await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some(