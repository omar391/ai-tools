document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow-minimal
  version: 1.0.1
  summary: "Minimal candidate temporarily converged onto the green explicit flow so reductions can be reintroduced from a working baseline."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        mode:
          default: codex_login
        codex_bin:
          default: codex
        auth_url: {}
        callback_url: {}
        callback_port: {}
        codex_session_dir: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        email: {}
        account_login_locator:
          type: object
          format: secret-locator
        full_name:
          default: "Dev Astronlab"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - mode
        - email
use:
  functions:
    classify_openai_surface:
      metadata:
        description: "Classify the current OpenAI auth surface."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const readVisibleAuthText = async () => {
              return await page.evaluate(() => {
                const selectors = [
                  "h1",
                  "h2",
                  "h3",
                  "h4",
                  "p",
                  "button",
                  "a",
                  "label",
                  "legend",
                  "li",
                  '[role="button"]',
                  '[role="alert"]',
                  '[role="status"]',
                  "[aria-live]",
                  "input[placeholder]",
                  "input[aria-label]",
                ];
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  if (node.closest('script,style,noscript,template,[hidden],[aria-hidden="true"]')) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const texts = [];
                const seen = new Set();
                for (const selector of selectors) {
                  for (const node of document.querySelectorAll(selector)) {
                    if (!isVisible(node)) {
                      continue;
                    }
                    const value = node instanceof HTMLInputElement
                      ? (node.getAttribute("aria-label") || node.getAttribute("placeholder") || "")
                      : (node.innerText || node.textContent || "");
                    const normalized = String(value || "").replace(/\s+/g, " ").trim();
                    if (!normalized || seen.has(normalized)) {
                      continue;
                    }
                    seen.add(normalized);
                    texts.push(normalized);
                  }
                }
                const combined = texts.join("\n");
                if (combined.trim()) {
                  return combined;
                }
                const body = document.body;
                return body ? String(body.innerText || body.textContent || "") : "";
              }).catch(() => "");
            };
            const extractVisibleButtons = async () => {
              return await page.evaluate(() => {
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  if (node.closest('script,style,noscript,template,[hidden],[aria-hidden="true"]')) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                return Array.from(document.querySelectorAll('button,a,[role="button"],input[type="submit"]'))
                  .filter((node) => isVisible(node))
                  .map((node) => {
                    const raw = node instanceof HTMLInputElement
                      ? (node.value || "")
                      : (node.innerText || node.textContent || "");
                    return String(raw || "").replace(/\s+/g, " ").trim();
                  })
                  .filter(Boolean)
                  .slice(0, 12);
              }).catch(() => []);
            };
            const href = page.url();
            const title = await page.title().catch(() => "");
            let host = "";
            let path = "";
            try {
              const parsed = new URL(href);
              host = parsed.hostname;
              path = parsed.pathname;
            } catch {}
            const bodyText = await readVisibleAuthText();
            const visibleButtons = await extractVisibleButtons();
            const authPath = /^\/(?:auth|api\/auth)\b/.test(path);
            const hasTurnstile = await page.locator('input[name="cf-turnstile-response"], iframe[src*="challenge"], iframe[title*="Widget containing"]').count().catch(() => 0) > 0;
            const callbackComplete = /^(localhost|127\.0\.0\.1)$/i.test(host);
            const success = /you can close this window|signed in|success/i.test(bodyText);
            const verificationInput = await page.locator('input[name*="code" i], input[name*="otp" i], input[autocomplete="one-time-code"], input[aria-label*="code" i], input[aria-label*="otp" i], input[placeholder*="code" i], input[placeholder*="otp" i], input[inputmode="numeric"][maxlength="1"], input[inputmode="numeric"][maxlength="6"]').count().catch(() => 0) > 0;
            const followUpStep = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(bodyText)
              || /about-you/i.test(path);
            const resetPasswordPrompt = /reset-password/i.test(path)
              || /\breset password\b/i.test(bodyText);
            const addPhonePrompt = /add-phone/i.test(path)
              || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(bodyText);
            const retryableTimeout = /oops, an error occurred|operation timed out|try again/i.test(bodyText);
            const sessionEnded = /your session has ended/i.test(bodyText);
            const existingAccountPrompt = /an account for this email address already exists|this email address already exists|account already exists|already registered/i.test(bodyText);
            const usernameNotFound = /username_not_found|username not found/i.test(bodyText);
            const invalidCredentials = /incorrect email address or password|incorrect password|wrong password|invalid email or password/i.test(bodyText);
            const rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(bodyText);
            const antiBotGate = hasTurnstile
              || /just a moment/i.test(title)
              || /performing security verification|security service to protect against malicious bots|verifies you are not a bot|verify you are not a bot|verifying you are human|verify you are human/i.test(bodyText);
            const createAccountFailed = /failed to create account\.?\s*please try again/i.test(bodyText);
            const appShell = /\bNew chat\b|\bProjects\b|\bLog out\b|\bUpgrade plan\b|\bExplore GPTs\b/i.test(bodyText);
            const accountReady = ((/chatgpt\.com|chat\.openai\.com/i.test(host) && !authPath && !hasTurnstile) || appShell);
            const emailInput = await page.locator('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]').count().catch(() => 0) > 0;
            const currentPasswordInput = await page.locator('input[type="password"], input[name="password"], input[autocomplete="current-password"]').count().catch(() => 0) > 0;
            const newPasswordInput = await page.locator('input[name="new-password"], input[autocomplete="new-password"]').count().catch(() => 0) > 0;
            const passwordInput = currentPasswordInput || newPasswordInput;
            const signupCtaVisible = visibleButtons.some((text) => /^sign up$/i.test(text) || /create account/i.test(text));
            const loginCtaVisible = visibleButtons.some((text) => /^log in$/i.test(text) || /^sign in$/i.test(text));
            const oneTimeCodeOption = visibleButtons.some((text) => /one-time code|one time code/i.test(text));
            const oauthConsentCopy = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(bodyText)
              || /sign in to codex/i.test(title);
            const oauthContinueVisible = visibleButtons.some((text) => /continue to codex|continue to openai|authorize|allow|accept/i.test(text))
              || (oauthConsentCopy && visibleButtons.some((text) => /^continue$/i.test(text)));
            const continueButtonVisible = visibleButtons.some((text) => /continue|next|verify|submit|finish creating account|log in|sign in/i.test(text));
            const needsEmailVerification = (!oauthConsentCopy && verificationInput)
              || (!oauthConsentCopy && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))
              || (!oauthConsentCopy && /email-verification/i.test(path));
            let stage = "unknown";
            if (callbackComplete) {
              stage = "callback_complete";
            } else if (antiBotGate) {
              stage = "security_verification";
            } else if (rateLimitExceeded) {
              stage = "rate_limit";
            } else if (sessionEnded) {
              stage = "session_ended";
            } else if (retryableTimeout) {
              stage = "retryable_timeout";
            } else if (addPhonePrompt) {
              stage = "add_phone";
            } else if (oauthConsentCopy && oauthContinueVisible) {
              stage = "oauth_consent";
            } else if (followUpStep) {
              stage = "about_you";
            } else if (needsEmailVerification) {
              stage = "email_verification";
            } else if (existingAccountPrompt) {
              stage = "existing_account_prompt";
            } else if (invalidCredentials) {
              stage = "invalid_credentials";
            } else if (/\/create-account(?:\/|$)/i.test(path) && passwordInput) {
              stage = "signup_password";
            } else if (/\/create-account(?:\/|$)/i.test(path) && emailInput) {
              stage = "signup_email";
            } else if (/\/log-in(?:\/|$)/i.test(path) && passwordInput) {
              stage = "login_password";
            } else if (/\/log-in(?:\/|$)/i.test(path) && emailInput) {
              stage = "login_email";
            } else if (oauthContinueVisible) {
              stage = "oauth_consent";
            } else if (success) {
              stage = "success";
            } else if (emailInput || passwordInput || verificationInput) {
              stage = "auth_prompt";
            }
            const headline = String(bodyText || "").split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null;
            return {
              ok: true,
              stage,
              current_url: href || null,
              host: host || null,
              path: path || null,
              title: title || null,
              headline,
              callback_complete: callbackComplete,
              success,
              account_ready: accountReady,
              needs_email_verification: needsEmailVerification,
              follow_up_step: followUpStep,
              add_phone_prompt: addPhonePrompt,
              reset_password_prompt: resetPasswordPrompt,
              retryable_timeout: retryableTimeout,
              session_ended: sessionEnded,
              existing_account_prompt: existingAccountPrompt,
              username_not_found: usernameNotFound,
              invalid_credentials: invalidCredentials,
              rate_limit_exceeded: rateLimitExceeded,
              anti_bot_gate: antiBotGate,
              create_account_failed: createAccountFailed,
              auth_prompt: emailInput || passwordInput || verificationInput,
              email_input: emailInput,
              password_input: passwordInput,
              current_password_input: currentPasswordInput,
              new_password_input: newPasswordInput,
              verification_input: verificationInput,
              signup_cta_visible: signupCtaVisible,
              login_cta_visible: loginCtaVisible,
              one_time_code_option: oneTimeCodeOption,
              oauth_continue_visible: oauthContinueVisible,
              continue_button_visible: continueButtonVisible,
              visible_buttons: visibleButtons,
            };
    clear_openai_security_gate:
      metadata:
        description: "Pause for HIL when OpenAI or Cloudflare requires human verification."
        mode: hil
        targetRef: primary
        pause:
          responder: human
          verifyPersistence: false
          restorePreferredMode: false
        browser:
          screenshot: true
          validation:
            post:
              kind: js
              expression: "const bodyText = document.body ? document.body.innerText : '';\nconst title = document.title || '';\nconst hasTurnstile = !!document.querySelector('input[name=\"cf-turnstile-response\"], iframe[src*=\"challenge\"], iframe[title*=\"Widget containing\"]');\nconst stillBlocked = hasTurnstile\n  || /just a moment/i.test(title)\n  || /performing security verification|security verification|verify you are human|verifying you are human|verify you are not a bot/i.test(bodyText);\nreturn {\n  ok: !stillBlocked,\n  current_url: location.href,\n  still_blocked: stillBlocked,\n};\n"
      call: afn.request_input
      with:
        body:
          hilMode: page
          message: "If OpenAI or Cloudflare shows a human-verification page or checkbox, complete it in the HIL viewer and wait until the normal auth page is visible."
          source: "const title = await page.title().catch(() => '');\nconst bodyText = await page.locator('body').innerText().catch(() => '');\nconst hasTurnstile = await page.locator('input[name=\"cf-turnstile-response\"], iframe[src*=\"challenge\"], iframe[title*=\"Widget containing\"]').count().catch(() => 0) > 0;\nconst blocked = hasTurnstile\n  || /just a moment/i.test(title)\n  || /performing security verification|security verification|verify you are human|verifying you are human|verify you are not a bot/i.test(bodyText);\nreturn {\n  ok: true,\n  blocked,\n  current_url: page.url(),\n  skipped: !blocked,\n};\n"
    click_signup_button:
      metadata:
        description: "Click the Sign up CTA from the OpenAI login shell."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const clicked = await page.evaluate(() => {\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const candidates = Array.from(document.querySelectorAll(\"a[href*='create-account'], button, a, [role='button']\"))\n    .filter((node) => isVisible(node));\n  const target = candidates.find((node) => {\n    const href = node.getAttribute(\"href\") || \"\";\n    const text = String(node.innerText || node.textContent || \"\").replace(/\\s+/g, \" \").trim();\n    return /create-account/i.test(href) || /^sign up$/i.test(text) || /create account/i.test(text);\n  });\n  if (!target) {\n    return { ok: false, error: \"sign-up-button-not-found\" };\n  }\n  target.click();\n  return {\n    ok: true,\n    clicked_text: String(target.innerText || target.textContent || \"\").replace(/\\s+/g, \" \").trim() || null,\n    clicked_href: target.getAttribute(\"href\") || null,\n  };\n});\nif (clicked.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn {\n  ...clicked,\n  current_url: page.url(),\n};\n"
    click_primary_continue:
      metadata:
        description: "Click the primary visible submit or continue control for the current OpenAI form."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const result = await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const readLabel = (node) => {\n    if (!(node instanceof Element)) {\n      return \"\";\n    }\n    if (node instanceof HTMLInputElement) {\n      return normalize(node.value || node.getAttribute(\"aria-label\") || node.getAttribute(\"title\") || \"\");\n    }\n    return normalize(\n      node.innerText\n      || node.textContent\n      || node.getAttribute(\"aria-label\")\n      || node.getAttribute(\"title\")\n      || \"\"\n    );\n  };\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const isDisabled = (node) => node.hasAttribute(\"disabled\") || node.getAttribute(\"aria-disabled\") === \"true\";\n  const isExplicitSubmit = (node) => {\n    if (node instanceof HTMLInputElement) {\n      return node.type === \"submit\";\n    }\n    if (node instanceof HTMLButtonElement) {\n      return node.type === \"submit\";\n    }\n    return false;\n  };\n  const clickNode = (node) => {\n    if (!(node instanceof HTMLElement)) {\n      return false;\n    }\n    node.click();\n    return true;\n  };\n  const selectors = [\n    \"input[type='email']\",\n    \"input[name='email']\",\n    \"input[autocomplete='email']\",\n    \"input[autocomplete='username']\",\n    \"input[type='password']\",\n    \"input[autocomplete='current-password']\",\n    \"input[autocomplete='new-password']\",\n    \"input[autocomplete='one-time-code']\",\n    \"input[name*='code']\",\n    \"input[inputmode='numeric']\",\n    \"input[name*='name']\",\n    \"input[autocomplete='name']\",\n    \"select\",\n  ];\n  const activeForm = document.activeElement instanceof Element ? document.activeElement.closest(\"form\") : null;\n  const candidateForms = [];\n  if (activeForm) {\n    candidateForms.push(activeForm);\n  }\n  for (const selector of selectors) {\n    const field = document.querySelector(selector);\n    if (field instanceof Element) {\n      const form = field.closest(\"form\");\n      if (form && !candidateForms.includes(form)) {\n        candidateForms.push(form);\n      }\n    }\n  }\n  const buttonMatchers = /continue|next|verify|submit|finish creating account|log in|sign in|continue to codex|continue to openai|authorize|allow|accept/i;\n  const formControls = candidateForms\n    .flatMap((form) => Array.from(form.querySelectorAll(\"button, input[type='submit'], [role='button']\")))\n    .filter((node) => isVisible(node) && !isDisabled(node));\n  const preferredFormControl = formControls.find((node) => isExplicitSubmit(node) && buttonMatchers.test(readLabel(node)))\n    || formControls.find((node) => buttonMatchers.test(readLabel(node)))\n    || formControls.find((node) => isExplicitSubmit(node));\n  if (preferredFormControl && clickNode(preferredFormControl)) {\n    return {\n      ok: true,\n      strategy: \"form-submit\",\n      clicked_text: readLabel(preferredFormControl) || null,\n    };\n  }\n  const fallback = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\"))\n    .filter((node) => isVisible(node) && !isDisabled(node))\n    .find((node) => buttonMatchers.test(readLabel(node)));\n  if (fallback && clickNode(fallback)) {\n    return {\n      ok: true,\n      strategy: \"text-match\",\n      clicked_text: readLabel(fallback) || null,\n    };\n  }\n  if (activeForm instanceof HTMLFormElement) {\n    activeForm.requestSubmit();\n    return {\n      ok: true,\n      strategy: \"request-submit\",\n      clicked_text: null,\n    };\n  }\n  return {\n    ok: false,\n    error: \"primary-continue-not-found\",\n  };\n});\nif (result.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn {\n  ...result,\n  current_url: page.url(),\n};\n"
    click_retryable_try_again:
      metadata:
        description: "Click the visible Try again control on a retryable OpenAI error page."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const result = await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const candidates = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\"))\n    .filter((node) => isVisible(node));\n  const target = candidates.find((node) => {\n    const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || \"\"));\n    return /^try again$/i.test(text) || /try again/i.test(text);\n  });\n  if (!target) {\n    return { ok: false, error: \"retryable-try-again-not-found\" };\n  }\n  target.click();\n  return {\n    ok: true,\n    clicked_text: normalize(target instanceof HTMLInputElement ? target.value : (target.innerText || target.textContent || \"\")) || null,\n  };\n});\nif (result.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn {\n  ...result,\n  current_url: page.url(),\n};\n"
    click_one_time_code_button:
      metadata:
        description: "Choose the OpenAI one-time-code recovery path when password login fails."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const detectStage = async () => await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              });
              const bodyText = normalize(document.body ? (document.body.innerText || document.body.textContent || "") : "");
              const title = normalize(document.title || "");
              const path = location.pathname;
              const host = location.hostname;
              const emailInput = hasVisible('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]');
              const passwordInput = hasVisible('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]');
              const verificationInput = hasVisible('input[name*="code" i], input[name*="otp" i], input[autocomplete="one-time-code"], input[aria-label*="code" i], input[aria-label*="otp" i], input[placeholder*="code" i], input[placeholder*="otp" i], input[inputmode="numeric"][maxlength="1"], input[inputmode="numeric"][maxlength="6"]');
              const oauthConsentCopy = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(bodyText)
                || /sign in to codex/i.test(title);
              const oauthContinueVisible = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']")).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                if (!(rect.width > 0 && rect.height > 0)) {
                  return false;
                }
                const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || ""));
                return /continue to codex|continue to openai|authorize|allow|accept/i.test(text)
                  || (oauthConsentCopy && /^continue$/i.test(text));
              });
              const incorrectCredentials = /incorrect email address or password|incorrect password|wrong password|invalid email or password/i.test(bodyText);
              const needsEmailVerification = (!oauthConsentCopy && verificationInput)
                || (!oauthConsentCopy && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))
                || (!oauthConsentCopy && /email-verification/i.test(path));
              let stage = "unknown";
              if (/^(localhost|127\.0\.0\.1)$/i.test(host)) {
                stage = "callback_complete";
              } else if (oauthConsentCopy && oauthContinueVisible) {
                stage = "oauth_consent";
              } else if (needsEmailVerification) {
                stage = "email_verification";
              } else if (/\/log-in(?:\/|$)/i.test(path) && passwordInput) {
                stage = "login_password";
              } else if (/\/log-in(?:\/|$)/i.test(path) && emailInput) {
                stage = "login_email";
              }
              return {
                stage,
                current_url: location.href,
                incorrect_credentials: incorrectCredentials,
              };
            });
            const controls = page.locator("button, a, [role='button'], input[type='submit']");
            const count = await controls.count().catch(() => 0);
            let target = null;
            let clickedText = null;
            for (let index = 0; index < count; index += 1) {
              const locator = controls.nth(index);
              if (!(await locator.isVisible().catch(() => false))) {
                continue;
              }
              const label = normalize(await locator.evaluate((node) => {
                if (node instanceof HTMLInputElement) {
                  return node.value || node.getAttribute("aria-label") || "";
                }
                if (!(node instanceof Element)) {
                  return "";
                }
                return node.innerText || node.textContent || node.getAttribute("aria-label") || "";
              }).catch(() => ""));
              if (!/log in with a one-time code|login with a one-time code|one-time code|one time code/i.test(label)) {
                continue;
              }
              target = locator;
              clickedText = label || null;
              break;
            }
            if (!target) {
              return { ok: false, error: "one-time-code-button-not-found", current_url: page.url() };
            }
            await target.scrollIntoViewIfNeeded().catch(() => {});
            await target.click({ timeout: 5000 }).catch(async () => {
              await target.click({ force: true }).catch(() => {});
            });
            await page.waitForTimeout(1200).catch(() => {});
            let after = await detectStage();
            if ((after.stage === "login_password" && after.incorrect_credentials) || after.stage === "unknown") {
              await target.click({ timeout: 5000 }).catch(async () => {
                await target.click({ force: true }).catch(() => {});
              });
              await page.waitForTimeout(1200).catch(() => {});
              after = await detectStage();
              return {
                ok: true,
                clicked_text: clickedText,
                retried: true,
                stage: after.stage,
                current_url: after.current_url,
              };
            }
            return {
              ok: true,
              clicked_text: clickedText,
              retried: false,
              stage: after.stage,
              current_url: after.current_url,
            };
    wait_for_openai_surface_ready:
      metadata:
        description: "Wait for the OpenAI auth surface to render a stable visible shell before classifying it."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const ready = await page.waitForFunction(() => {\n  const bodyText = document.body ? String(document.body.innerText || document.body.textContent || \"\") : \"\";\n  const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    if (node.closest(\"script,style,noscript,template,[hidden],[aria-hidden=\\\"true\\\"]\")) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  });\n  const emailInput = hasVisible(\"input[type='email'], input[name='email'], input[autocomplete='email'], input[autocomplete='username']\");\n  const passwordInput = hasVisible(\"input[type='password'], input[name='password'], input[name='new-password'], input[autocomplete='current-password'], input[autocomplete='new-password']\");\n  const codeInput = hasVisible(\"input[name*='code' i], input[autocomplete='one-time-code'], input[inputmode='numeric']\");\n  const actionableButton = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\")).some((node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    if (!(rect.width > 0 && rect.height > 0)) {\n      return false;\n    }\n    const text = String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || \"\")).replace(/\\s+/g, \" \").trim();\n    return /sign up|create account|log in|sign in|continue|verify|allow|authorize|accept|one-time code/i.test(text);\n  });\n  const meaningfulText = /welcome back|create an account|create a password|verify your email|check your inbox|about you|add your phone number|security verification|your session has ended/i.test(bodyText);\n  return emailInput || passwordInput || codeInput || actionableButton || meaningfulText;\n}, { timeout: 8000 }).then(() => true).catch(() => false);\nreturn {\n  ok: ready,\n  current_url: page.url(),\n};\n"
    replay_captured_auth_url:
      metadata:
        description: "Replay the captured Codex auth URL and tolerate redirect-driven navigation aborts when the browser lands on a real auth or callback page."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const targetUrl = String(
              args.auth_url
              || state.vars?.codex_login?.auth_url
              || state.steps.capture_codex_login_url?.action?.value?.auth_url
              || ""
            ).trim();
            if (!targetUrl) {
              throw new Error("captured-auth-url-missing");
            }
            const priorUrl = page.url();
            const isSuccessfulLanding = (href) => {
              if (!href) {
                return false;
              }
              return /auth\.openai\.com|localhost|127\.0\.0\.1/i.test(href);
            };
            const captureState = async () => ({
              current_url: page.url(),
              title: await page.title().catch(() => null),
            });
            const settleAfterAbort = async (reason) => {
              await page.waitForTimeout(1200).catch(() => {});
              const state = await captureState();
              if (isSuccessfulLanding(state.current_url) && state.current_url !== priorUrl) {
                return {
                  ok: true,
                  strategy: reason,
                  prior_url: priorUrl,
                  ...state,
                };
              }
              return null;
            };
            if (priorUrl && priorUrl !== "about:blank") {
              await page.goto("about:blank", { waitUntil: "domcontentloaded", timeout: 5000 }).catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
            }
            try {
              await page.goto(targetUrl, { waitUntil: "domcontentloaded", timeout: 30000 });
              return {
                ok: true,
                strategy: "goto",
                prior_url: priorUrl,
                ...(await captureState()),
              };
            } catch (error) {
              const message = String(error?.message || error || "");
              if (/ERR_ABORTED/i.test(message)) {
                const abortedLanding = await settleAfterAbort("goto-err-aborted");
                if (abortedLanding) {
                  return abortedLanding;
                }
              }
              await page.evaluate((url) => {
                window.location.assign(url);
              }, targetUrl).catch(() => {});
              const assignedLanding = await settleAfterAbort("location-assign");
              if (assignedLanding) {
                return assignedLanding;
              }
              throw error;
            }
    fill_openai_email_field:
      metadata:
        description: "Fill the OpenAI email field and dispatch the events needed to enable the primary submit action."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const nextEmail = String(args.email || \"\").trim();\nconst selectors = [\n  \"input[type=\\\"email\\\"]\",\n  \"input[name=\\\"email\\\"]\",\n  \"input[autocomplete=\\\"email\\\"]\",\n  \"input[autocomplete=\\\"username\\\"]\",\n];\nconst submitSelectors = [\n  \"button[type=\\\"submit\\\"]\",\n  \"input[type=\\\"submit\\\"]\",\n  \"button\",\n  \"[role=\\\"button\\\"]\",\n];\nconst readValue = async (field) => await field.inputValue().catch(() => null);\nconst dispatchEvents = async (field) => {\n  await field.evaluate((input) => {\n    if (!(input instanceof HTMLInputElement)) {\n      return;\n    }\n    input.dispatchEvent(new Event(\"input\", { bubbles: true }));\n    input.dispatchEvent(new Event(\"change\", { bubbles: true }));\n    input.dispatchEvent(new Event(\"blur\", { bubbles: true }));\n  }).catch(() => {});\n};\nconst submitState = async () => {\n  const submit = page.locator(submitSelectors.join(\", \")).filter({ hasText: /continue|next|log in|sign in|create account|sign up|submit/i }).first();\n  if (!(await submit.count().catch(() => 0))) {\n    return { found: false, disabled: null, text: null };\n  }\n  return {\n    found: true,\n    disabled: await submit.isDisabled().catch(() => null),\n    text: await submit.innerText().catch(() => submit.inputValue?.().catch(() => null) || null),\n  };\n};\nfor (const selector of selectors) {\n  const field = page.locator(selector).first();\n  if (!(await field.count().catch(() => 0))) {\n    continue;\n  }\n  await field.scrollIntoViewIfNeeded().catch(() => {});\n  await field.click().catch(() => {});\n  await page.keyboard.press(\"Meta+A\").catch(() => {});\n  await page.keyboard.press(\"Control+A\").catch(() => {});\n  await page.keyboard.press(\"Backspace\").catch(() => {});\n  await field.pressSequentially(nextEmail, { delay: 45 }).catch(() => {});\n  await page.keyboard.press(\"Tab\").catch(() => {});\n  await page.waitForTimeout(200).catch(() => {});\n  await dispatchEvents(field);\n  const value = await readValue(field);\n  if (typeof value === \"string\" && value.trim().toLowerCase() === nextEmail.toLowerCase()) {\n    const submit = await submitState();\n    return {\n      ok: true,\n      selector,\n      value,\n      submit_found: submit.found,\n      submit_disabled: submit.disabled,\n      current_url: page.url(),\n    };\n  }\n}\nreturn {\n  ok: false,\n  error: \"email-field-not-filled\",\n  current_url: page.url(),\n};\n"
    submit_signup_email_form:
      metadata:
        description: "Submit the signup email form and verify that OpenAI advances to a valid next state."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const expectedEmail = String(args.email || "").trim().toLowerCase();
            const detectStage = async () => await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              });
              const bodyText = normalize(document.body ? (document.body.innerText || document.body.textContent || "") : "");
              const title = normalize(document.title || "");
              const path = location.pathname;
              const host = location.hostname;
              const emailInput = hasVisible('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]');
              const passwordInput = hasVisible('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]');
              const verificationInput = hasVisible('input[name*="code" i], input[autocomplete="one-time-code"], input[inputmode="numeric"]');
              const antiBotGate = /just a moment/i.test(title)
                || /performing security verification|verify you are not a bot|verifying you are human|verify you are human/i.test(bodyText)
                || hasVisible('input[name="cf-turnstile-response"], iframe[src*="challenge"], iframe[title*="Widget containing"]');
              const retryableTimeout = /oops, an error occurred|operation timed out|try again/i.test(bodyText);
              const sessionEnded = /your session has ended/i.test(bodyText);
              const rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(bodyText);
              const addPhonePrompt = /add-phone/i.test(path)
                || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(bodyText);
              const aboutYou = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(bodyText)
                || /about-you/i.test(path);
              const needsEmailVerification = verificationInput
                || /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText)
                || /email-verification/i.test(path);
              const existingAccountPrompt = /an account for this email address already exists|this email address already exists|account already exists|already registered/i.test(bodyText);
              let stage = "unknown";
              if (/^(localhost|127\.0\.0\.1)$/i.test(host)) {
                stage = "callback_complete";
              } else if (antiBotGate) {
                stage = "security_verification";
              } else if (rateLimitExceeded) {
                stage = "rate_limit";
              } else if (sessionEnded) {
                stage = "session_ended";
              } else if (retryableTimeout) {
                stage = "retryable_timeout";
              } else if (addPhonePrompt) {
                stage = "add_phone";
              } else if (aboutYou) {
                stage = "about_you";
              } else if (needsEmailVerification) {
                stage = "email_verification";
              } else if (existingAccountPrompt) {
                stage = "existing_account_prompt";
              } else if (/\/create-account(?:\/|$)/i.test(path) && passwordInput) {
                stage = "signup_password";
              } else if (/\/create-account(?:\/|$)/i.test(path) && emailInput) {
                stage = "signup_email";
              } else if (emailInput || passwordInput || verificationInput) {
                stage = "auth_prompt";
              }
              return {
                stage,
                current_url: location.href,
                headline: bodyText.split("\\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
              };
            });

            const fieldSelectors = [
              'input[type="email"]',
              'input[name="email"]',
              'input[autocomplete="email"]',
              'input[autocomplete="username"]',
            ];
            let field = null;
            for (const selector of fieldSelectors) {
              const candidate = page.locator(selector).first();
              if (!(await candidate.count().catch(() => 0))) {
                continue;
              }
              if (!(await candidate.isVisible().catch(() => false))) {
                continue;
              }
              field = candidate;
              break;
            }
            if (!field) {
              throw new Error("signup-email-field-not-found");
            }
            const value = String(await field.inputValue().catch(() => "")).trim().toLowerCase();
            if (!value || value !== expectedEmail) {
              throw new Error("signup-email-not-filled:" + (value || "empty"));
            }

            const allowedStages = new Set([
              "signup_password",
              "email_verification",
              "about_you",
              "add_phone",
              "existing_account_prompt",
              "security_verification",
              "retryable_timeout",
              "rate_limit",
              "session_ended",
              "callback_complete",
            ]);

            const clickVisibleContinue = async () => {
              const result = await field.evaluate((input) => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const readLabel = (node) => {
                  if (!(node instanceof Element)) {
                    return "";
                  }
                  if (node instanceof HTMLInputElement) {
                    return normalize(node.value || node.getAttribute("aria-label") || "");
                  }
                  return normalize(node.innerText || node.textContent || node.getAttribute("aria-label") || "");
                };
                const form = input instanceof Element ? input.closest("form") : null;
                const scope = form || document;
                const candidates = Array.from(scope.querySelectorAll("button, input[type='submit'], [role='button']"))
                  .filter((node) => isVisible(node) && node.getAttribute("aria-disabled") !== "true" && !node.hasAttribute("disabled"));
                const preferred = candidates.find((node) => {
                  const label = readLabel(node);
                  const isSubmitNode = (node instanceof HTMLButtonElement && node.type === "submit")
                    || (node instanceof HTMLInputElement && node.type === "submit");
                  return isSubmitNode && /continue|next|sign up|create account|submit|verify/i.test(label);
                }) || candidates.find((node) => /continue|next|sign up|create account|submit|verify/i.test(readLabel(node)));
                if (preferred instanceof HTMLElement) {
                  preferred.click();
                  return {
                    ok: true,
                    strategy: "form-dom-click",
                    label: readLabel(preferred) || null,
                  };
                }
                if (form instanceof HTMLFormElement) {
                  form.requestSubmit();
                  return {
                    ok: true,
                    strategy: "form-request-submit",
                    label: null,
                  };
                }
                return null;
              }).catch(() => null);
              return result;
            };

            const attempts = [
              async () => clickVisibleContinue(),
              async () => {
                await field.press("Enter").catch(() => {});
                return { strategy: "press-enter", label: null };
              },
              async () => {
                await field.evaluate((input) => {
                  if (input instanceof HTMLElement) {
                    input.blur();
                  }
                  const form = input instanceof Element ? input.closest("form") : null;
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                  }
                }).catch(() => {});
                return { strategy: "request-submit", label: null };
              },
            ];

            const waitForTransition = async (sameStage, timeoutMs = 6500) => {
              const startedAt = Date.now();
              let latest = await detectStage();
              while (Date.now() - startedAt < timeoutMs) {
                if (allowedStages.has(latest.stage) && latest.stage !== sameStage) {
                  return latest;
                }
                await page.waitForTimeout(500).catch(() => {});
                latest = await detectStage();
              }
              return latest;
            };

            const transitions = [];
            for (const attempt of attempts) {
              const performed = await attempt();
              if (!performed) {
                continue;
              }
              const after = await waitForTransition("signup_email");
              transitions.push({ ...performed, ...after });
              if (allowedStages.has(after.stage) && after.stage !== "signup_email") {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
            }

            const finalState = await detectStage();
            throw new Error("signup-email-submit-stuck:" + String(finalState.stage || "unknown") + ":" + String(finalState.current_url || page.url()));

