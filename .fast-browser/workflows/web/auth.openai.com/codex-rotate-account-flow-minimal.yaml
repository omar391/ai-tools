                return { strategy: "request-submit", label: null };
              },
            ];

            const transitions = [];
            for (const attempt of attempts) {
              const performed = await attempt();
              if (!performed) {
                continue;
              }
              await page.waitForTimeout(1200).catch(() => {});
              const after = await detectState();
              transitions.push({ ...performed, ...after });
              const progressed = after.stage !== initial.stage
                || after.current_url !== initial.current_url
                || after.needs_email_verification
                || after.follow_up_step
                || after.add_phone_prompt
                || after.existing_account_prompt
                || after.invalid_credentials
                || after.reset_password_prompt
                || after.username_not_found
                || after.oauth_continue_visible
                || after.anti_bot_gate
                || after.retryable_timeout
                || after.rate_limit_exceeded
                || after.session_ended
                || after.callback_complete;
              if (progressed && after.stage !== initial.stage) {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  clicked_text: performed.label || null,
                  initial_stage: initial.stage,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
              if (progressed && after.stage !== "signup_password" && after.stage !== "login_password") {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  clicked_text: performed.label || null,
                  initial_stage: initial.stage,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
