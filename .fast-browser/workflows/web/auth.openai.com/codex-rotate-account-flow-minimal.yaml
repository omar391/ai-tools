            };
            const passwordField = page.locator('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]').first();
            const submitFormFromField = async () => {
              try {
                const result = await passwordField.evaluate((field) => {
                  const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                  const isVisible = (node) => {
                    if (!(node instanceof Element)) {
                      return false;
                    }
                    const style = window.getComputedStyle(node);
                    if (!style || style.display === "none" || style.visibility === "hidden") {
                      return false;
                    }
                    const rect = node.getBoundingClientRect();
