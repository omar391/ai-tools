do:
  - start_codex_login_session:
      if: "${String(inputs.mode || 'codex_login') === 'codex_login' && !String(inputs.auth_url || '').trim()}"
      metadata:
        description: "Start a detached codex login session on the host and capture its stdout/stderr paths."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const path = await import("node:path");
            const { spawn } = await import("node:child_process");

            const shell = process.env.SHELL || "/bin/sh";
            const codexBin = String(args.codex_bin || "codex").trim() || "codex";
            const sessionRoot = path.join(env.projectArtifactsRoot, "codex-login-sessions");
            fs.mkdirSync(sessionRoot, { recursive: true });
            const sessionDir = fs.mkdtempSync(path.join(sessionRoot, String(env.workflowRunStamp || "run") + "-"));
            const stdoutPath = path.join(sessionDir, "stdout.log");
            const stderrPath = path.join(sessionDir, "stderr.log");
            const exitPath = path.join(sessionDir, "exit.code");
            const quote = (value) => "'" + String(value).replace(/'/g, "'\"'\"'") + "'";
            const command = quote(codexBin)
              + " login >"
              + quote(stdoutPath)
              + " 2>"
              + quote(stderrPath)
              + "; printf '%s' \"$?\" >"
              + quote(exitPath);

            const child = spawn(shell, ["-lc", command], {
              cwd: env.workspaceRoot,
              env: process.env,
              detached: true,
              stdio: "ignore",
            });
            child.unref();

            return {
              ok: true,
              started: true,
              codex_bin: codexBin,
              session_dir: sessionDir,
              pid: child.pid ?? null,
              stdout_path: stdoutPath,
              stderr_path: stderrPath,
              exit_path: exitPath,
            };
  - capture_codex_login_url:
      if: "${String(inputs.mode || 'codex_login') === 'codex_login'}"
      metadata:
        description: "Capture or normalize the Codex auth URL and callback session details for this workflow run."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const { setTimeout: delay } = await import("node:timers/promises");

            const explicitAuthUrl = String(args.auth_url || "").trim();
            const stdoutPath = String(
              args.codex_login_stdout_path
              || state.steps.start_codex_login_session?.action?.value?.stdout_path
              || ""
            ).trim();
            const stderrPath = String(
              args.codex_login_stderr_path
              || state.steps.start_codex_login_session?.action?.value?.stderr_path
              || ""
            ).trim();
            const exitPath = String(
              args.codex_login_exit_path
              || state.steps.start_codex_login_session?.action?.value?.exit_path
              || ""
            ).trim();
            const sessionDir = String(
              args.codex_session_dir
              || state.steps.start_codex_login_session?.action?.value?.session_dir
              || ""
            ).trim() || null;
            const pidValue = Number(
              args.codex_login_pid
              || state.steps.start_codex_login_session?.action?.value?.pid
              || 0
            );

            const extractAuthUrl = (raw) => {
              const match = String(raw || "").match(/https:\/\/auth\.openai\.com\/oauth\/authorize\?[^\s"'<>]+/);
              return match ? match[0] : null;
            };
            const parseCapture = (authUrl) => {
              const parsedAuthUrl = new URL(authUrl);
              const callbackUrl = parsedAuthUrl.searchParams.get("redirect_uri") || "";
              if (!callbackUrl) {
                throw new Error("captured-auth-url-missing-redirect-uri");
              }
              const callbackPort = Number.parseInt(new URL(callbackUrl).port, 10);
              if (!Number.isInteger(callbackPort)) {
                throw new Error("captured-auth-url-invalid-callback-port:" + callbackUrl);
              }
              return {
                auth_url: authUrl,
                callback_url: callbackUrl,
                callback_port: callbackPort,
              };
            };
            const readText = (filePath) => {
              if (!filePath || !fs.existsSync(filePath)) {
                return "";
              }
              return fs.readFileSync(filePath, "utf8");
            };
            const tail = (filePath, maxChars = 1200) => {
              const text = readText(filePath);
              return text.length > maxChars ? text.slice(-maxChars) : text;
            };

            if (explicitAuthUrl) {
              return {
                ok: true,
                reused: true,
                ...parseCapture(explicitAuthUrl),
                session_dir: sessionDir,
                pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                stdout_path: stdoutPath || null,
                stderr_path: stderrPath || null,
                exit_path: exitPath || null,
              };
            }

            const timeoutMs = 45000;
            const startedAt = Date.now();
            while (Date.now() - startedAt < timeoutMs) {
              const combined = readText(stdoutPath) + "\n" + readText(stderrPath);
              const authUrl = extractAuthUrl(combined);
              if (authUrl) {
                return {
                  ok: true,
                  reused: false,
                  ...parseCapture(authUrl),
                  session_dir: sessionDir,
                  pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                  stdout_path: stdoutPath || null,
                  stderr_path: stderrPath || null,
                  exit_path: exitPath || null,
                };
              }
              if (exitPath && fs.existsSync(exitPath)) {
                const exitCodeRaw = readText(exitPath).trim();
                throw new Error("codex-login-exited-before-auth-url:" + (exitCodeRaw || "unknown") + ":" + (tail(stderrPath) || tail(stdoutPath) || "no-output"));
