                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
            }

            const finalState = await detectStage();
            throw new Error("login-email-submit-stuck:" + String(finalState.stage || "unknown") + ":" + String(finalState.current_url || page.url()));

    fill_openai_password_field:
      metadata:
        description: "Fill the OpenAI password field from the runtime-resolved login locator."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.type
      with:
        body:
          selector: 'input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]'
          dispatch_events_after_fill: true
          blur_after_fill: true
          click_away_after_fill: true
          settle_ms: 250
          value_from:
            secret_locator_input:
              name: account_login_locator
    fill_openai_about_you_form:
      metadata:
        description: "Fill the OpenAI about-you form and verify that its primary submit control becomes enabled."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const digitsOnly = (value) => String(value || "").replace(/\D+/g, "");
            const fullName = normalize(args.full_name || "Dev Astronlab");
            const month = normalize(args.birth_month || "1");
            const day = normalize(args.birth_day || "24");
            const year = normalize(args.birth_year || "1990");
            const birthdayValue = month.padStart(2, "0") + "/" + day.padStart(2, "0") + "/" + year;
            const birthdayDigits = digitsOnly(birthdayValue);
            const monthNumber = Math.max(1, Math.min(12, Number.parseInt(month, 10) || 1));
            const dayNumber = Math.max(1, Math.min(31, Number.parseInt(day, 10) || 1));
            const yearNumber = Math.max(1900, Number.parseInt(year, 10) || 1990);
            const today = new Date();
            let ageYears = today.getFullYear() - yearNumber;
            const birthdayPassedThisYear = (today.getMonth() + 1) > monthNumber
              || ((today.getMonth() + 1) === monthNumber && today.getDate() >= dayNumber);
            if (!birthdayPassedThisYear) {
              ageYears -= 1;
            }
            ageYears = Math.max(18, ageYears);
            const ageValue = String(ageYears);
            const ageDigits = digitsOnly(ageValue);
            const monthNames = {
              "1": ["1", "01", "jan", "january"],
              "2": ["2", "02", "feb", "february"],
              "3": ["3", "03", "mar", "march"],
              "4": ["4", "04", "apr", "april"],
              "5": ["5", "05", "may"],
              "6": ["6", "06", "jun", "june"],
              "7": ["7", "07", "jul", "july"],
              "8": ["8", "08", "aug", "august"],
              "9": ["9", "09", "sep", "sept", "september"],
              "10": ["10", "oct", "october"],
              "11": ["11", "nov", "november"],
              "12": ["12", "dec", "december"],
            };
            const monthTokens = (monthNames[month] || [month]).map((value) => normalize(value).toLowerCase());
            const dayTokens = [day, day.padStart(2, "0")].map((value) => normalize(value));
            const findVisible = async (selectors) => {
              for (const selector of selectors) {
                const locator = page.locator(selector).first();
                if (!(await locator.count().catch(() => 0))) {
                  continue;
                }
                if (!(await locator.isVisible().catch(() => false))) {
                  continue;
                }
                return locator;
              }
              return null;
            };
            const readInputValue = async (locator) => {
              return await locator.inputValue().catch(() => null);
            };
            const valuesMatch = (actualValue, expectedValue) => {
              return normalize(actualValue) === normalize(expectedValue)
                || digitsOnly(actualValue) === digitsOnly(expectedValue);
            };
            const setInputValue = async (locator, value) => {
              await locator.evaluate((node, nextValue) => {
                if (!(node instanceof HTMLInputElement || node instanceof HTMLTextAreaElement)) {
                  return;
                }
                const proto = node instanceof HTMLTextAreaElement
                  ? window.HTMLTextAreaElement.prototype
                  : window.HTMLInputElement.prototype;
                const descriptor = Object.getOwnPropertyDescriptor(proto, "value");
                if (descriptor && typeof descriptor.set === "function") {
                  descriptor.set.call(node, nextValue);
                } else {
                  node.value = nextValue;
                }
                node.dispatchEvent(new InputEvent("input", {
                  bubbles: true,
                  data: String(nextValue || ""),
                  inputType: "insertText",
                }));
                node.dispatchEvent(new Event("change", { bubbles: true }));
                node.blur();
              }, value).catch(() => {});
            };
            const describeInput = async (locator) => {
              return await locator.evaluate((node) => {
                if (!(node instanceof HTMLInputElement)) {
                  return null;
                }
                const labeledByText = String(node.getAttribute("aria-labelledby") || "")
                  .split(/\s+/)
                  .filter(Boolean)
                  .map((id) => document.getElementById(id)?.textContent || "")
                  .join(" ");
                const labelText = node.id
                  ? document.querySelector('label[for="' + CSS.escape(node.id) + '"]')?.textContent || ""
                  : "";
                return {
                  name: String(node.getAttribute("name") || ""),
                  placeholder: String(node.getAttribute("placeholder") || ""),
                  ariaLabel: String(node.getAttribute("aria-label") || ""),
                  labeledBy: String(labeledByText || ""),
                  label: String(labelText || ""),
                  type: String(node.getAttribute("type") || ""),
                  inputMode: String(node.getAttribute("inputmode") || ""),
                  value: String(node.value || ""),
                };
              }).catch(() => null);
            };
            const readSelectValue = async (locator) => {
              return await locator.evaluate((node) => {
                if (!(node instanceof HTMLSelectElement)) {
                  return null;
                }
                const selected = node.selectedOptions?.[0];
                return {
                  value: String(node.value || ""),
                  label: String(selected?.label || selected?.textContent || node.value || ""),
                };
              }).catch(() => null);
            };
            const fillTextInput = async (locator, value) => {
              await locator.scrollIntoViewIfNeeded().catch(() => {});
              await locator.click({ timeout: 1500 }).catch(() => {});
              await locator.fill("").catch(() => {});
              await locator.fill(value).catch(async () => {
                await locator.press("Meta+A").catch(() => {});
                await locator.press("Control+A").catch(() => {});
                await locator.press("Backspace").catch(() => {});
                await locator.type(value, { delay: 20 }).catch(() => {});
              });
              await locator.evaluate((node) => {
                if (!(node instanceof HTMLInputElement)) {
                  return;
                }
                node.dispatchEvent(new Event("input", { bubbles: true }));
                node.dispatchEvent(new Event("change", { bubbles: true }));
                node.blur();
              }).catch(() => {});
              let currentValue = await readInputValue(locator);
              if (valuesMatch(currentValue, value)) {
                return;
              }
              await setInputValue(locator, value);
              currentValue = await readInputValue(locator);
              if (valuesMatch(currentValue, value)) {
                return;
              }
              await locator.click({ timeout: 1500 }).catch(() => {});
              await page.keyboard.press("Meta+A").catch(() => {});
              await page.keyboard.press("Control+A").catch(() => {});
              await page.keyboard.press("Backspace").catch(() => {});
              await page.keyboard.type(value, { delay: 20 }).catch(() => {});
              await locator.evaluate((node) => {
                if (node instanceof HTMLInputElement || node instanceof HTMLTextAreaElement) {
                  node.blur();
                }
              }).catch(() => {});
            };
            const fillBirthdayInput = async (locator) => {
              const birthdayDigitsValue = month.padStart(2, "0") + day.padStart(2, "0") + year;
              await locator.scrollIntoViewIfNeeded().catch(() => {});
              await locator.click({ timeout: 1500 }).catch(() => {});
              await page.keyboard.press("Meta+A").catch(() => {});
              await page.keyboard.press("Control+A").catch(() => {});
              await page.keyboard.press("Backspace").catch(() => {});
              await page.keyboard.type(birthdayDigitsValue, { delay: 20 }).catch(() => {});
              await locator.evaluate((node) => {
                if (node instanceof HTMLInputElement || node instanceof HTMLTextAreaElement) {
                  node.blur();
                }
              }).catch(() => {});
              let currentValue = await readInputValue(locator);
              if (digitsOnly(currentValue) === birthdayDigits) {
                return;
              }
              await setInputValue(locator, birthdayValue);
              currentValue = await readInputValue(locator);
              if (digitsOnly(currentValue) === birthdayDigits) {
                return;
              }
              await setInputValue(locator, birthdayDigitsValue);
            };
            const fillAgeInput = async (locator) => {
              await fillTextInput(locator, ageValue);
              let currentValue = await readInputValue(locator);
              if (digitsOnly(currentValue) === ageDigits) {
                return;
              }
              await setInputValue(locator, ageValue);
              currentValue = await readInputValue(locator);
              if (digitsOnly(currentValue) === ageDigits) {
                return;
              }
              await locator.click({ timeout: 1500 }).catch(() => {});
              await page.keyboard.press("Meta+A").catch(() => {});
              await page.keyboard.press("Control+A").catch(() => {});
              await page.keyboard.press("Backspace").catch(() => {});
              await page.keyboard.type(ageValue, { delay: 20 }).catch(() => {});
              await locator.evaluate((node) => {
                if (node instanceof HTMLInputElement || node instanceof HTMLTextAreaElement) {
                  node.blur();
                }
              }).catch(() => {});
            };
            const typeIntoFocusedField = async (value) => {
              await page.keyboard.press("Meta+A").catch(() => {});
              await page.keyboard.press("Control+A").catch(() => {});
              await page.keyboard.press("Backspace").catch(() => {});
              await page.keyboard.type(value, { delay: 20 }).catch(() => {});
            };
            const clickLabelField = async (patterns) => {
              for (const pattern of patterns) {
                const candidates = [
                  page.getByText(pattern, { exact: true }).first(),
                  page.locator("label, div, span, p").filter({ hasText: pattern }).first(),
                ];
                for (const candidate of candidates) {
                  if (!(await candidate.count().catch(() => 0))) {
                    continue;
                  }
                  if (!(await candidate.isVisible().catch(() => false))) {
                    continue;
                  }
                  await candidate.scrollIntoViewIfNeeded().catch(() => {});
                  if (await candidate.click({ timeout: 1000 }).then(() => true).catch(() => false)) {
                    return true;
                  }
                  const box = await candidate.boundingBox().catch(() => null);
                  if (box) {
                    const clickX = Math.max(box.x + Math.min(box.width * 0.5, 80), box.x + 8);
                    const clickY = box.y + box.height + 20;
                    await page.mouse.click(clickX, clickY).catch(() => {});
                    return true;
                  }
                }
              }
              return false;
            };
            const visibleSelects = [];
            const pageBodyText = normalize(await page.locator("body").innerText().catch(() => "")).toLowerCase();
            const prefersAgeField = /\bhow old are you\b/.test(pageBodyText)
              || (/\bage\b/.test(pageBodyText)
                && !/\bbirthday\b|\bdate of birth\b|\bbirth date\b/.test(pageBodyText));
            const selectCount = await page.locator("select").count().catch(() => 0);
            for (let index = 0; index < selectCount; index += 1) {
              const locator = page.locator("select").nth(index);
              if (await locator.isVisible().catch(() => false)) {
                visibleSelects.push(locator);
              }
            }
            let nameField = await findVisible([
              'input[name="name"]',
              'input[name*="name" i]',
              'input[autocomplete="name"]',
              'input[placeholder*="name" i]',
              'input[aria-label*="name" i]',
            ]);
            const monthField = await findVisible([
              'select[name*="month" i]',
              'select[aria-label*="month" i]',
            ]) || visibleSelects[0] || null;
            const dayField = await findVisible([
              'select[name*="day" i]',
              'select[aria-label*="day" i]',
            ]) || visibleSelects[1] || null;
            const yearField = await findVisible([
              'select[name*="year" i]',
              'select[aria-label*="year" i]',
            ]) || visibleSelects[2] || null;
            const selectValue = async (locator, targetValue, acceptedTokens = []) => {
              const options = await locator.evaluate((node) => {
                if (!(node instanceof HTMLSelectElement)) {
                  return [];
                }
                return Array.from(node.options || []).map((option) => ({
                  value: String(option.value || ""),
                  label: String(option.label || option.textContent || ""),
                }));
              }).catch(() => []);
              const normalizedTarget = normalize(targetValue).toLowerCase();
              const normalizedAccepted = acceptedTokens.map((value) => normalize(value).toLowerCase());
              const chosen = options.find((option) => {
                const value = normalize(option.value).toLowerCase();
                const label = normalize(option.label).toLowerCase();
                return value === normalizedTarget
                  || label === normalizedTarget
                  || normalizedAccepted.includes(value)
                  || normalizedAccepted.includes(label);
              });
              if (!chosen) {
                throw new Error("about-you-option-not-found:" + String(targetValue));
              }
              await locator.selectOption({ value: chosen.value }).catch(async () => {
                await locator.selectOption({ label: chosen.label }).catch(() => {});
              });
            };
            const submit = page.locator('button[type="submit"], input[type="submit"], button, [role="button"]')
              .filter({ hasText: /continue|next|finish creating account|submit|verify/i })
              .first();
            const readSubmitState = async () => {
              const submitFound = (await submit.count().catch(() => 0)) > 0;
              const submitDisabled = submitFound ? await submit.isDisabled().catch(() => null) : null;
              const submitText = submitFound
                ? await submit.evaluate((node) => String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || "")).replace(/\s+/g, " ").trim()).catch(() => null)
                : null;
              return {
                found: submitFound,
                disabled: submitDisabled,
                text: normalize(submitText || "") || null,
              };
            };
            const readVisibleBirthdayValue = async () => {
              const bodyText = normalize(await page.locator("body").innerText().catch(() => ""));
              const match = bodyText.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*\/\s*(\d{4})/);
              if (!match) {
                return null;
              }
              return match[1].padStart(2, "0") + "/" + match[2].padStart(2, "0") + "/" + match[3];
            };
            const tryFocusedAboutYouFallback = async () => {
              let typedSomething = false;
              const nameValueLocator = nameField || visibleInputs[0]?.locator || null;
              const aboutYouValueLocator = birthdayField || ageField || null;
              const aboutYouFieldKind = ageField ? "age" : (birthdayField ? "birthday" : null);
              if (nameValueLocator) {
                await fillTextInput(nameValueLocator, fullName);
                typedSomething = true;
              } else {
                const focusedName = await clickLabelField([/full name/i, /^name$/i]);
                if (focusedName) {
                  await typeIntoFocusedField(fullName);
                  typedSomething = true;
                }
              }
              const visibleBirthdayBefore = aboutYouFieldKind === "birthday"
                ? await readVisibleBirthdayValue()
                : null;
              if (!aboutYouValueLocator && typedSomething && visibleBirthdayBefore) {
                await page.locator("body").click({ position: { x: 8, y: 8 } }).catch(() => {});
                await page.waitForTimeout(250).catch(() => {});
                const submitState = await readSubmitState();
                const nameActual = nameValueLocator
                  ? normalize(await readInputValue(nameValueLocator))
                  : null;
                return {
                  ok: true,
                  name_value: nameActual || null,
                  month_value: null,
                  day_value: null,
                  year_value: null,
                  birthday_value: visibleBirthdayBefore,
                  age_value: null,
                  submit_disabled: submitState.disabled,
                  submit_text: submitState.text,
                  current_url: page.url(),
                };
              }
              if (!aboutYouValueLocator && typedSomething) {
                await page.keyboard.press("Tab").catch(() => {});
                await page.waitForTimeout(100).catch(() => {});
              }
              if (birthdayField) {
                await fillBirthdayInput(birthdayField);
                typedSomething = true;
              } else if (ageField) {
                await fillAgeInput(ageField);
                typedSomething = true;
              } else {
                const focusedValueField = prefersAgeField
                  ? await clickLabelField([/^age$/i, /how old are you/i, /your age/i])
                  : await clickLabelField([/birthday/i, /date of birth/i, /birth date/i]);
                if (focusedValueField) {
                  await typeIntoFocusedField(prefersAgeField ? ageValue : birthdayValue);
                  typedSomething = true;
                }
              }
              await page.locator("body").click({ position: { x: 8, y: 8 } }).catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
              const submitState = await readSubmitState();
              const visibleBirthdayAfter = await readVisibleBirthdayValue();
              const nameActual = nameValueLocator
                ? normalize(await readInputValue(nameValueLocator))
                : null;
              const ageActual = ageField
                ? normalize(await readInputValue(ageField))
                : null;
              if (typedSomething && (submitState.disabled === false || (nameActual === fullName && (visibleBirthdayAfter || visibleBirthdayBefore || digitsOnly(ageActual) === ageDigits)))) {
                return {
                  ok: true,
                  name_value: nameActual || null,
                  month_value: null,
                  day_value: null,
                  year_value: null,
                  birthday_value: visibleBirthdayAfter || visibleBirthdayBefore,
                  age_value: ageActual || null,
                  submit_disabled: submitState.disabled,
                  submit_text: submitState.text,
                  current_url: page.url(),
                };
              }
              return null;
            };
            if (nameField && monthField && dayField && yearField) {
              await fillTextInput(nameField, fullName);
              await selectValue(monthField, month, monthTokens);
              await selectValue(dayField, day, dayTokens);
              await selectValue(yearField, year, [year]);
              await page.locator("body").click({ position: { x: 8, y: 8 } }).catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
              const nameActual = normalize(await readInputValue(nameField));
              const monthActual = await readSelectValue(monthField);
              const dayActual = await readSelectValue(dayField);
              const yearActual = await readSelectValue(yearField);
              const submitState = await readSubmitState();
              const monthMatches = monthTokens.includes(normalize(monthActual?.label || monthActual?.value || "").toLowerCase());
              const dayMatches = dayTokens.includes(normalize(dayActual?.label || dayActual?.value || ""));
              const yearMatches = normalize(yearActual?.label || yearActual?.value || "") === normalize(year);
              const result = {
                ok: nameActual === fullName && monthMatches && dayMatches && yearMatches && submitState.disabled === false,
                name_value: nameActual || null,
                month_value: normalize(monthActual?.label || monthActual?.value || "") || null,
                day_value: normalize(dayActual?.label || dayActual?.value || "") || null,
                year_value: normalize(yearActual?.label || yearActual?.value || "") || null,
                birthday_value: null,
                submit_disabled: submitState.disabled,
                submit_text: submitState.text,
                error: null,
              };
              if (!result.ok) {
                result.error = "about-you-form-not-ready";
                throw new Error("about-you-fill-failed:" + JSON.stringify(result));
              }
              return {
                ...result,
                current_url: page.url(),
              };
            }
            const inputCount = await page.locator("input").count().catch(() => 0);
            const visibleInputs = [];
            let fallbackNameField = null;
            let birthdayField = null;
            let ageField = null;
            let fallbackBirthdayField = null;
            for (let index = 0; index < inputCount; index += 1) {
              const locator = page.locator("input").nth(index);
              if (!(await locator.isVisible().catch(() => false))) {
                continue;
              }
              const details = await describeInput(locator);
              if (!details) {
                continue;
              }
              visibleInputs.push({
                locator,
                details,
              });
              const hints = normalize(
                String(details.name || "")
                  + " "
                  + String(details.placeholder || "")
                  + " "
                  + String(details.ariaLabel || "")
                  + " "
                  + String(details.labeledBy || "")
                  + " "
                  + String(details.label || "")
              ).toLowerCase();
              const currentValue = normalize(details.value || "");
              const likelyName = hints.includes("full name")
                || hints === "name"
                || hints.startsWith("name ")
                || hints.endsWith(" name")
                || hints.includes(" name ");
              const likelyAge = hints === "age"
                || hints.startsWith("age ")
                || hints.endsWith(" age")
                || hints.includes(" age ")
                || hints.includes("how old are you");
              const likelyBirthday = hints.includes("birthday")
                || hints.includes("birth date")
                || hints.includes("date of birth")
                || normalize(details.placeholder || "").includes("/")
                || /^\d{2}\/\d{2}\/\d{4}$/.test(currentValue);
              if (likelyName && !fallbackNameField) {
                fallbackNameField = locator;
              }
              if (likelyAge && !ageField) {
                ageField = locator;
              }
              if (!hints.includes("name") && !likelyAge && !fallbackBirthdayField) {
                fallbackBirthdayField = locator;
              }
              if (likelyBirthday) {
                birthdayField = locator;
                break;
              }
            }
            if (!birthdayField) {
              birthdayField = fallbackBirthdayField;
            }
            if (!nameField) {
              nameField = fallbackNameField;
            }
            if (!birthdayField) {
              for (const entry of visibleInputs) {
                const currentValue = normalize(entry.details.value || "");
                if (/^\d{2}\/\d{2}\/\d{4}$/.test(currentValue)) {
                  birthdayField = entry.locator;
                  break;
                }
              }
            }
            if (!nameField) {
              for (const entry of visibleInputs) {
                if (birthdayField && entry.locator === birthdayField) {
                  continue;
                }
                const currentValue = normalize(entry.details.value || "");
                if (!/^\d{2}\/\d{2}\/\d{4}$/.test(currentValue)) {
                  nameField = entry.locator;
                  break;
                }
              }
            }
            if ((!nameField || (!birthdayField && !ageField)) && visibleInputs.length >= 2) {
              nameField = nameField || visibleInputs[0]?.locator || null;
              if (!birthdayField && !ageField) {
                if (prefersAgeField) {
                  ageField = visibleInputs[1]?.locator || null;
                } else {
                  birthdayField = visibleInputs[1]?.locator || null;
                }
              }
            }
            if (visibleInputs.length === 1) {
              nameField = nameField || visibleInputs[0]?.locator || null;
              birthdayField = null;
              ageField = null;
            }
            if (nameField && birthdayField && nameField === birthdayField) {
              birthdayField = null;
            }
            if (nameField && ageField && nameField === ageField) {
              ageField = null;
            }
            if (!nameField || (!birthdayField && !ageField)) {
              const focusedFallback = await tryFocusedAboutYouFallback();
              if (focusedFallback) {
                return focusedFallback;
              }
            }
            if (!nameField || (!birthdayField && !ageField)) {
              throw new Error("about-you-fields-not-found");
            }
            await fillTextInput(nameField, fullName);
            if (birthdayField) {
              await fillBirthdayInput(birthdayField);
            } else if (ageField) {
              await fillAgeInput(ageField);
            }
            await page.locator("body").click({ position: { x: 8, y: 8 } }).catch(() => {});
            await page.waitForTimeout(250).catch(() => {});
            const nameActual = normalize(await readInputValue(nameField));
            const birthdayActual = birthdayField ? normalize(await readInputValue(birthdayField)) : null;
            const ageActual = ageField ? normalize(await readInputValue(ageField)) : null;
            const submitState = await readSubmitState();
            const result = {
              ok: submitState.disabled === false || (
                nameActual === fullName
                  && (
                    (birthdayField && digitsOnly(birthdayActual) === birthdayDigits)
                    || (ageField && digitsOnly(ageActual) === ageDigits)
                  )
              ),
              name_value: nameActual || null,
              month_value: null,
              day_value: null,
              year_value: null,
              birthday_value: birthdayActual || null,
              age_value: ageActual || null,
              submit_disabled: submitState.disabled,
              submit_text: submitState.text,
              error: null,
            };
            if (!result.ok) {
              result.error = "about-you-form-not-ready";
              throw new Error("about-you-fill-failed:" + JSON.stringify(result));
            }
            return {
              ...result,
              current_url: page.url(),
            };
    submit_openai_password_form:
      metadata:
        description: "Submit the current OpenAI password form and verify that the flow leaves the password stage."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const readStateInPage = () => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                if (!(node instanceof Element)) {
