                    const isSubmitNode = (node instanceof HTMLButtonElement && node.type === "submit")
                      || (node instanceof HTMLInputElement && node.type === "submit");
                    return isSubmitNode && /continue|next|create account|sign up|log in|sign in|submit|verify|authorize|allow|accept/i.test(label);
                  }) || candidates.find((node) => /continue|next|create account|sign up|log in|sign in|submit|verify|authorize|allow|accept/i.test(readLabel(node)));
                  if (preferred instanceof HTMLElement) {
                    preferred.click();
                    return {
                      ok: true,
                      strategy: "form-dom-click",
