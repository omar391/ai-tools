                }
                const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || ""));
                return /continue to codex|continue to openai|authorize|allow|accept/i.test(text)
                  || (oauthConsentCopy && /^continue$/i.test(text));
              });
              const needsEmailVerification = (!oauthConsentCopy && verificationInput)
                || (!oauthConsentCopy && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))
                || (!oauthConsentCopy && /email-verification/i.test(path));
              let stage = "unknown";
              if (/^(localhost|127\.0\.0\.1)$/i.test(host)) {
                stage = "callback_complete";
              } else if (antiBotGate) {
                stage = "security_verification";
              } else if (rateLimitExceeded) {
                stage = "rate_limit";
              } else if (sessionEnded) {
                stage = "session_ended";
              } else if (retryableTimeout) {
                stage = "retryable_timeout";
              } else if (addPhonePrompt) {
                stage = "add_phone";
              } else if (oauthConsentCopy && oauthContinueVisible) {
                stage = "oauth_consent";
              } else if (aboutYou) {
                stage = "about_you";
              } else if (needsEmailVerification) {
                stage = "email_verification";
              } else if (existingAccountPrompt) {
                stage = "existing_account_prompt";
              } else if (invalidCredentials) {
                stage = "invalid_credentials";
              } else if (/\/create-account(?:\/|$)/i.test(path) && passwordInput) {
                stage = "signup_password";
              } else if (/\/create-account(?:\/|$)/i.test(path) && emailInput) {
                stage = "signup_email";
              } else if (/\/log-in(?:\/|$)/i.test(path) && passwordInput) {
                stage = "login_password";
              } else if (/\/log-in(?:\/|$)/i.test(path) && emailInput) {
                stage = "login_email";
              } else if (emailInput || passwordInput || verificationInput) {
                stage = "auth_prompt";
