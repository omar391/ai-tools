document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: open-auth-url
  version: 1.0.0
  summary: "Open an arbitrary OpenAI auth URL on the current managed browser profile."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        auth_url: {}
      required:
        - auth_url
do:
  - open_auth_url:
      metadata:
        description: "Open the supplied OpenAI auth URL in the current managed browser profile."
        mode: headless_ok
        targetRef: primary
        browser:
          validation:
            post:
              kind: playwright
              op: exists
              selector: body
      call: afn.driver.browser.navigate
      with:
        body:
          url: "${inputs.auth_url}"
