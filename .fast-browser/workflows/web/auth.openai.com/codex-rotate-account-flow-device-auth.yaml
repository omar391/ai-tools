document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow-device-auth
  version: 1.3.0
  summary: "Managed-profile OpenAI account creation flow that first reaches a normal authenticated session, then completes Codex device authorization inside the same workflow."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        mode:
          default: codex_login
        codex_bin:
          default: codex
        auth_url: {}
        device_code: {}
        callback_url: {}
        callback_port: {}
        codex_session_dir: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        codex_home_path: {}
        codex_auth_file_path: {}
        email: {}
        account_login_locator:
          type: object
          format: secret-locator
        full_name:
          default: "M Omar Faruque"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - email
use:
  functions:
    click_primary_continue:
      metadata:
        description: "Click the primary visible submit or continue control for the current OpenAI form."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const result = await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const readLabel = (node) => {\n    if (!(node instanceof Element)) {\n      return \"\";\n    }\n    if (node instanceof HTMLInputElement) {\n      return normalize(node.value || node.getAttribute(\"aria-label\") || node.getAttribute(\"title\") || \"\");\n    }\n    return normalize(node.innerText || node.textContent || node.getAttribute(\"aria-label\") || node.getAttribute(\"title\") || \"\");\n  };\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const isDisabled = (node) => node.hasAttribute(\"disabled\") || node.getAttribute(\"aria-disabled\") === \"true\";\n  const isExplicitSubmit = (node) => {\n    if (node instanceof HTMLInputElement) {\n      return node.type === \"submit\";\n    }\n    if (node instanceof HTMLButtonElement) {\n      return node.type === \"submit\";\n    }\n    return false;\n  };\n  const clickNode = (node) => {\n    if (!(node instanceof HTMLElement)) {\n      return false;\n    }\n    node.click();\n    return true;\n  };\n  const selectors = [\n    \"input[type='email']\",\n    \"input[name='email']\",\n    \"input[autocomplete='email']\",\n    \"input[autocomplete='username']\",\n    \"input[type='password']\",\n    \"input[autocomplete='current-password']\",\n    \"input[autocomplete='new-password']\",\n    \"input[autocomplete='one-time-code']\",\n    \"input[name*='code']\",\n    \"input[inputmode='numeric']\",\n  ];\n  const activeForm = document.activeElement instanceof Element ? document.activeElement.closest(\"form\") : null;\n  const candidateForms = [];\n  if (activeForm) {\n    candidateForms.push(activeForm);\n  }\n  for (const selector of selectors) {\n    const field = document.querySelector(selector);\n    if (field instanceof Element) {\n      const form = field.closest(\"form\");\n      if (form && !candidateForms.includes(form)) {\n        candidateForms.push(form);\n      }\n    }\n  }\n  const buttonMatchers = /continue|next|verify|submit|continue to codex|continue to openai|authorize|allow|accept/i;\n  const formControls = candidateForms.flatMap((form) => Array.from(form.querySelectorAll(\"button, input[type='submit'], [role='button']\"))).filter((node) => isVisible(node) && !isDisabled(node));\n  const preferredFormControl = formControls.find((node) => isExplicitSubmit(node) && buttonMatchers.test(readLabel(node))) || formControls.find((node) => buttonMatchers.test(readLabel(node))) || formControls.find((node) => isExplicitSubmit(node));\n  if (preferredFormControl && clickNode(preferredFormControl)) {\n    return { ok: true, strategy: \"form-submit\", clicked_text: readLabel(preferredFormControl) || null };\n  }\n  const fallback = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\")).filter((node) => isVisible(node) && !isDisabled(node)).find((node) => buttonMatchers.test(readLabel(node)));\n  if (fallback && clickNode(fallback)) {\n    return { ok: true, strategy: \"text-match\", clicked_text: readLabel(fallback) || null };\n  }\n  if (activeForm instanceof HTMLFormElement) {\n    activeForm.requestSubmit();\n    return { ok: true, strategy: \"request-submit\", clicked_text: null };\n  }\n  return { ok: false, error: \"primary-continue-not-found\" };\n});\nif (result.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn { ...result, current_url: page.url() };\n"
    click_oauth_consent_continue:
      metadata:
        description: "Click the visible OAuth consent continue control with a Playwright-side click so navigation-triggering consent does not die inside page.evaluate."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const readLabel = async (locator) => {
              return await locator.evaluate((node) => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                if (node instanceof HTMLInputElement) {
                  return normalize(node.value || node.getAttribute("aria-label") || node.getAttribute("title") || "");
                }
                if (!(node instanceof Element)) {
                  return "";
                }
                return normalize(
                  node.innerText
                  || node.textContent
                  || node.getAttribute("aria-label")
                  || node.getAttribute("title")
                  || ""
                );
              }).catch(() => "");
            };
            const isDisabled = async (locator) => {
              return await locator.evaluate((node) => {
                if (!(node instanceof Element)) {
                  return true;
                }
                return node.hasAttribute("disabled") || node.getAttribute("aria-disabled") === "true";
              }).catch(() => true);
            };
            const controls = page.locator("button, [role='button'], a, input[type='submit']");
            const candidates = [];
            const count = await controls.count().catch(() => 0);
            for (let index = 0; index < count; index += 1) {
              const locator = controls.nth(index);
              if (!(await locator.isVisible().catch(() => false))) {
                continue;
              }
              if (await isDisabled(locator)) {
                continue;
              }
              const label = normalize(await readLabel(locator));
              if (!label) {
                continue;
              }
              candidates.push({ locator, label });
            }
            const matchers = [
              /^continue to codex$/i,
              /^continue$/i,
              /continue to codex|continue to openai|authorize|allow|accept/i,
            ];
            for (const matcher of matchers) {
              for (const candidate of candidates) {
                if (!matcher.test(candidate.label)) {
                  continue;
                }
                await candidate.locator.scrollIntoViewIfNeeded().catch(() => {});
                await candidate.locator.click({ timeout: 5000 });
                await page.waitForTimeout(1200).catch(() => {});
                return {
                  ok: true,
                  strategy: "locator-click",
                  clicked_text: candidate.label,
                  current_url: page.url(),
                };
              }
            }
            return {
              ok: false,
              error: "oauth-consent-continue-not-found",
              current_url: page.url(),
            };
    wait_for_openai_surface_ready:
      metadata:
        description: "Wait for the OpenAI auth surface to render a stable visible shell before classifying it."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const ready = await page.waitForFunction(() => {\n  const bodyText = document.body ? String(document.body.innerText || document.body.textContent || \"\") : \"\";\n  const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    if (node.closest(\"script,style,noscript,template,[hidden],[aria-hidden=\\\"true\\\"]\")) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  });\n  const emailInput = hasVisible(\"input[type='email'], input[name='email'], input[autocomplete='email'], input[autocomplete='username']\");\n  const passwordInput = hasVisible(\"input[type='password'], input[name='password'], input[name='new-password'], input[autocomplete='current-password'], input[autocomplete='new-password']\");\n  const codeInput = hasVisible(\"input[name*='code' i], input[autocomplete='one-time-code'], input[inputmode='numeric']\");\n  const actionableButton = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\")).some((node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    if (!(rect.width > 0 && rect.height > 0)) {\n      return false;\n    }\n    const text = String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || \"\")).replace(/\\s+/g, \" \").trim();\n    return /log in|sign in|continue|verify|allow|authorize|accept|one-time code|device code/i.test(text);\n  });\n  const meaningfulText = /welcome back|enter your password|enter the code|device code|authorize|allow|sign in to codex|check your inbox/i.test(bodyText);\n  return emailInput || passwordInput || codeInput || actionableButton || meaningfulText;\n}, { timeout: 8000 }).then(() => true).catch(() => false);\nreturn { ok: ready, current_url: page.url() };\n"
    replay_captured_auth_url:
      metadata:
        description: "Replay the captured Codex auth URL and tolerate redirect-driven navigation aborts when the browser lands on a real auth or callback page."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const targetUrl = String(
              args.auth_url
              || state.vars?.codex_login?.auth_url
              || state.steps.capture_codex_login_url?.action?.value?.auth_url
              || ""
            ).trim();
            if (!targetUrl) {
              throw new Error("captured-auth-url-missing");
            }
            const priorUrl = page.url();
            const isSuccessfulLanding = (href) => Boolean(href) && /auth\.openai\.com|localhost|127\.0\.0\.1/i.test(href);
            const captureState = async () => ({
              current_url: page.url(),
              title: await page.title().catch(() => null),
            });
            const settleAfterAbort = async (reason) => {
              await page.waitForTimeout(1200).catch(() => {});
              const state = await captureState();
              if (isSuccessfulLanding(state.current_url) && state.current_url !== priorUrl) {
                return { ok: true, strategy: reason, prior_url: priorUrl, ...state };
              }
              return null;
            };
            if (priorUrl && priorUrl !== "about:blank") {
              await page.goto("about:blank", { waitUntil: "domcontentloaded", timeout: 5000 }).catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
            }
            try {
              await page.goto(targetUrl, { waitUntil: "domcontentloaded", timeout: 30000 });
              return { ok: true, strategy: "goto", prior_url: priorUrl, ...(await captureState()) };
            } catch (error) {
              const message = String(error?.message || error || "");
              if (/ERR_ABORTED/i.test(message)) {
                const abortedLanding = await settleAfterAbort("goto-err-aborted");
                if (abortedLanding) {
                  return abortedLanding;
                }
              }
              await page.evaluate((url) => { window.location.assign(url); }, targetUrl).catch(() => {});
              const assignedLanding = await settleAfterAbort("location-assign");
              if (assignedLanding) {
                return assignedLanding;
              }
              throw error;
            }
    ensure_codex_device_auth_enabled:
      metadata:
        description: "Ensure the ChatGPT security setting for Codex device-code authorization is enabled on the authenticated managed profile."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const readToggleState = async () =>
              await page.evaluate(() => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const readEnabled = (node) => {
                  if (!(node instanceof Element)) {
                    return null;
                  }
                  if (node instanceof HTMLInputElement && node.type === "checkbox") {
                    return node.checked;
                  }
                  const ariaChecked = node.getAttribute("aria-checked");
                  if (ariaChecked === "true") {
                    return true;
                  }
                  if (ariaChecked === "false") {
                    return false;
                  }
                  const ariaPressed = node.getAttribute("aria-pressed");
                  if (ariaPressed === "true") {
                    return true;
                  }
                  if (ariaPressed === "false") {
                    return false;
                  }
                  const dataState = node.getAttribute("data-state");
                  if (dataState === "checked" || dataState === "on" || dataState === "enabled") {
                    return true;
                  }
                  if (dataState === "unchecked" || dataState === "off" || dataState === "disabled") {
                    return false;
                  }
                  return null;
                };
                const findDeviceAuthRow = () => {
                  const candidates = Array.from(document.querySelectorAll("section,div,label,button"))
                    .filter((node) => isVisible(node))
                    .map((node) => ({
                      node,
                      text: normalize(node.innerText || node.textContent || ""),
                    }))
                    .filter(({ text }) =>
                      /enable device code authorization for codex/i.test(text)
                      && /device code sign-in|headless|remote environments/i.test(text)
                    )
                    .sort((left, right) => left.text.length - right.text.length);
                  return candidates[0]?.node || null;
                };
                const rowNode = findDeviceAuthRow();
                const toggleNodes = rowNode
                  ? Array.from(rowNode.querySelectorAll("button,[role=\"switch\"],input[type=\"checkbox\"],[aria-checked]"))
                    .filter((node) => isVisible(node))
                  : [];
                const toggleNode = toggleNodes.find((node) => readEnabled(node) !== null) || toggleNodes[0] || null;
                const bodyText = normalize(document.body ? (document.body.innerText || document.body.textContent || "") : "");
                return {
                  found: Boolean(rowNode),
                  row_text: rowNode ? normalize(rowNode.innerText || rowNode.textContent || "") : null,
                  enabled: readEnabled(toggleNode),
                  toggle_found: Boolean(toggleNode),
                  security_panel: /trusted devices|log out of this device|secure sign in with chatgpt|codex cli/i.test(bodyText),
                  current_url: location.href,
                  headline: bodyText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || document.title || null,
                };
              }).catch(() => ({
                found: false,
                row_text: null,
                enabled: null,
                toggle_found: false,
                security_panel: false,
                current_url: page.url(),
                headline: null,
              }));

            const activateSecurityTab = async () => {
              const tab = page.getByRole("tab", { name: /^Security$/i }).first();
              if ((await tab.count().catch(() => 0)) === 0) {
                return false;
              }
              const isActive = (await tab.getAttribute("data-state").catch(() => null)) === "active";
              if (isActive) {
                return true;
              }
              await tab.click().catch(() => {});
              await page.waitForTimeout(600).catch(() => {});
              return true;
            };

            const waitForPanel = async () => {
              const deadline = Date.now() + 10000;
              let last = null;
              let activatedSecurityTab = false;
              while (Date.now() < deadline) {
                last = await readToggleState();
                if (last.found && last.toggle_found) {
                  return last;
                }
                if (!activatedSecurityTab && last.security_panel !== true) {
                  activatedSecurityTab = await activateSecurityTab();
                }
                await page.waitForTimeout(500).catch(() => {});
              }
              return last || (await readToggleState());
            };

            const before = await waitForPanel();
            if (!before?.found || !before?.toggle_found) {
              return {
                ok: false,
                error: "device-auth-toggle-not-found",
                ...before,
              };
            }
            if (before.enabled === true) {
              return {
                ok: true,
                changed: false,
                enabled: true,
                ...before,
              };
            }

            const clickResult = await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const readEnabled = (node) => {
                if (!(node instanceof Element)) {
                  return null;
                }
                if (node instanceof HTMLInputElement && node.type === "checkbox") {
                  return node.checked;
                }
                const ariaChecked = node.getAttribute("aria-checked");
                if (ariaChecked === "true") return true;
                if (ariaChecked === "false") return false;
                const ariaPressed = node.getAttribute("aria-pressed");
                if (ariaPressed === "true") return true;
                if (ariaPressed === "false") return false;
                const dataState = node.getAttribute("data-state");
                if (dataState === "checked" || dataState === "on" || dataState === "enabled") return true;
                if (dataState === "unchecked" || dataState === "off" || dataState === "disabled") return false;
                return null;
              };
              const candidates = Array.from(document.querySelectorAll("section,div,label,button"))
                .filter((node) => isVisible(node))
                .map((node) => ({
                  node,
                  text: normalize(node.innerText || node.textContent || ""),
                }))
                .filter(({ text }) =>
                  /enable device code authorization for codex/i.test(text)
                  && /device code sign-in|headless|remote environments/i.test(text)
                )
                .sort((left, right) => left.text.length - right.text.length);
              const rowNode = candidates[0]?.node || null;
              if (!rowNode) {
                return { ok: false, error: "device-auth-row-not-found" };
              }
              const toggleNodes = Array.from(rowNode.querySelectorAll("button,[role=\"switch\"],input[type=\"checkbox\"],[aria-checked]"))
                .filter((node) => isVisible(node));
              const toggleNode = toggleNodes.find((node) => readEnabled(node) !== null) || toggleNodes[0] || null;
              if (!(toggleNode instanceof HTMLElement)) {
                return { ok: false, error: "device-auth-toggle-not-found" };
              }
              toggleNode.click();
              return {
                ok: true,
                clicked_text: normalize(toggleNode.innerText || toggleNode.textContent || toggleNode.getAttribute("aria-label") || ""),
                row_text: normalize(rowNode.innerText || rowNode.textContent || ""),
              };
            }).catch((error) => ({
              ok: false,
              error: String(error?.message || error || "device-auth-toggle-click-failed"),
            }));

            if (!clickResult.ok) {
              return {
                ...clickResult,
                current_url: page.url(),
              };
            }

            await page.waitForTimeout(1500).catch(() => {});
            const after = await waitForPanel();
            return {
              ok: after?.enabled === true,
              changed: true,
              enabled: after?.enabled === true,
              clicked_text: clickResult.clicked_text || null,
              row_text: clickResult.row_text || before?.row_text || null,
              current_url: page.url(),
              before,
              after,
              error: after?.enabled === true ? null : "device-auth-toggle-did-not-enable",
            };
do:
  - run_prepare_account_flow:
      metadata:
        description: "Reach a normal authenticated ChatGPT/OpenAI session on the managed profile before attempting device authorization."
      call: workflow.workspace.web.auth-openai-com.codex-rotate-account-flow-shared
      with:
        version: 1.0.0
        input:
          enabled: "${inputs.enabled}"
          mode: "prepare_device_auth"
          codex_bin: "${inputs.codex_bin}"
          email: "${inputs.email}"
          account_login_locator: "${inputs.account_login_locator}"
          full_name: "${inputs.full_name}"
          birth_month: "${inputs.birth_month}"
          birth_day: "${inputs.birth_day}"
          birth_year: "${inputs.birth_year}"
          prefer_signup_recovery: "false"
  - open_chatgpt_shell:
      if: "${state.steps.run_prepare_account_flow?.action?.result?.output?.next_action == 'complete' || state.steps.run_prepare_account_flow?.action?.result?.output?.success === true}"
      metadata:
        description: "Reset the current managed browser document before reopening the ChatGPT shell for device authorization."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "about:blank"
  - reopen_chatgpt_shell:
      if: "${state.steps.run_prepare_account_flow?.action?.result?.output?.next_action == 'complete' || state.steps.run_prepare_account_flow?.action?.result?.output?.success === true}"
      metadata:
        description: "Open the managed ChatGPT shell to ensure the browser session is authenticated before starting device authorization."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "https://chatgpt.com/?codex_rotate_device_auth=1"
  - inspect_chatgpt_shell:
      if: "${state.steps.run_prepare_account_flow?.action?.result?.output?.next_action == 'complete' || state.steps.run_prepare_account_flow?.action?.result?.output?.success === true}"
      metadata:
        description: "Verify the managed browser is already authenticated in ChatGPT before requesting a device code."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const title = await page.title().catch(() => "");
            const bodyText = await page.locator("body").innerText().catch(() => "");
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const normalizedText = normalize(bodyText);
            const href = page.url();
            let host = "";
            let path = "";
            try {
              const parsed = new URL(href);
              host = parsed.hostname;
              path = parsed.pathname;
            } catch {}
            const appShell = /\bNew chat\b|\bProjects\b|\bLog out\b|\bUpgrade plan\b|\bExplore GPTs\b/i.test(normalizedText);
            const authPrompt = /welcome back|log in|enter your password|check your inbox|verification code/i.test(normalizedText)
              || /auth\.openai\.com/i.test(host)
              || /^\/(?:auth|log-in|create-account|email-verification)\b/i.test(path);
            return {
              ok: true,
              current_url: href,
              headline: normalizedText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
              account_ready: ((/chatgpt\.com|chat\.openai\.com/i.test(host) && !/^\/(?:auth|api\/auth)\b/.test(path)) || appShell),
              auth_prompt: authPrompt,
            };
  - open_chatgpt_security_settings:
      if: "${state.steps.inspect_chatgpt_shell?.action?.account_ready === true}"
      metadata:
        description: "Open the ChatGPT security settings surface where Codex device authorization can be enabled."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "https://chatgpt.com/#settings/Security"
  - ensure_device_code_authorization_enabled:
      if: "${state.steps.inspect_chatgpt_shell?.action?.account_ready === true}"
      metadata:
        templateRef: ensure_codex_device_auth_enabled
        description: "Enable the ChatGPT security toggle that allows Codex device-code authorization."
  - start_codex_login_session:
      if: "${state.steps.inspect_chatgpt_shell?.action?.account_ready === true && state.steps.ensure_device_code_authorization_enabled?.action?.ok === true && !String(inputs.auth_url || '').trim() && !String(inputs.device_code || '').trim() && !String(inputs.codex_login_stdout_path || '').trim() && !String(inputs.codex_session_dir || '').trim()}"
      metadata:
        description: "Start a detached codex device-auth session on the host and capture its stdout/stderr paths."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const path = await import("node:path");
            const { spawn } = await import("node:child_process");
            const shell = process.env.SHELL || "/bin/sh";
            const codexBin = String(args.codex_bin || "codex").trim() || "codex";
            const sessionRoot = path.join(env.projectArtifactsRoot, "codex-login-sessions");
            fs.mkdirSync(sessionRoot, { recursive: true });
            const sessionDir = fs.mkdtempSync(path.join(sessionRoot, String(env.workflowRunStamp || "run") + "-"));
            const codexHomePath = path.join(sessionDir, "codex-home");
            fs.mkdirSync(codexHomePath, { recursive: true });
            const stdoutPath = path.join(sessionDir, "stdout.log");
            const stderrPath = path.join(sessionDir, "stderr.log");
            const exitPath = path.join(sessionDir, "exit.code");
            const authPath = path.join(codexHomePath, "auth.json");
            const quote = (value) => "'" + String(value).replace(/'/g, "'\"'\"'") + "'";
            const command = quote(codexBin) + " login --device-auth >" + quote(stdoutPath) + " 2>" + quote(stderrPath) + "; printf '%s' \"$?\" >" + quote(exitPath);
            const child = spawn(shell, ["-lc", command], {
              cwd: env.workspaceRoot,
              env: {
                ...process.env,
                CODEX_HOME: codexHomePath,
              },
              detached: true,
              stdio: "ignore",
            });
            child.unref();
            return {
              ok: true,
              started: true,
              codex_bin: codexBin,
              session_dir: sessionDir,
              codex_home_path: codexHomePath,
              auth_file_path: authPath,
              pid: child.pid ?? null,
              stdout_path: stdoutPath,
              stderr_path: stderrPath,
              exit_path: exitPath,
            };
  - capture_codex_login_url:
      if: "${state.steps.inspect_chatgpt_shell?.action?.account_ready === true && state.steps.ensure_device_code_authorization_enabled?.action?.ok === true}"
      metadata:
        description: "Capture or normalize the Codex device-auth URL and one-time code for this workflow run."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const { setTimeout: delay } = await import("node:timers/promises");
            const explicitAuthUrl = String(args.auth_url || "").trim();
            const explicitDeviceCode = String(args.device_code || "").trim();
            const stdoutPath = String(args.codex_login_stdout_path || state.steps.start_codex_login_session?.action?.value?.stdout_path || "").trim();
            const stderrPath = String(args.codex_login_stderr_path || state.steps.start_codex_login_session?.action?.value?.stderr_path || "").trim();
            const exitPath = String(args.codex_login_exit_path || state.steps.start_codex_login_session?.action?.value?.exit_path || "").trim();
            const sessionDir = String(args.codex_session_dir || state.steps.start_codex_login_session?.action?.value?.session_dir || "").trim() || null;
            const codexHomePath = String(args.codex_home_path || state.steps.start_codex_login_session?.action?.value?.codex_home_path || "").trim() || null;
            const authFilePath = String(args.codex_auth_file_path || state.steps.start_codex_login_session?.action?.value?.auth_file_path || "").trim() || null;
            const pidValue = Number(args.codex_login_pid || state.steps.start_codex_login_session?.action?.value?.pid || 0);
            const stripAnsi = (raw) => String(raw || "").replace(/\u001b\[[0-9;]*m/g, "");
            const extractDeviceChallenge = (raw) => {
              const cleaned = stripAnsi(raw);
              const authMatch = cleaned.match(/https:\/\/auth\.openai\.com\/codex\/device\b[^\s"'<>]*/);
              const codeMatch = cleaned.match(/\b[A-Z0-9]{4}-[A-Z0-9]{5}\b/);
              return { auth_url: authMatch ? authMatch[0] : null, device_code: codeMatch ? codeMatch[0] : null };
            };
            const parseCapture = (authUrl, deviceCode) => {
              if (!authUrl) throw new Error("captured-device-auth-url-missing");
              if (!deviceCode) throw new Error("captured-device-auth-code-missing");
              return { auth_url: authUrl, callback_url: null, callback_port: null, device_code: deviceCode };
            };
            const readText = (filePath) => (!filePath || !fs.existsSync(filePath)) ? "" : fs.readFileSync(filePath, "utf8");
            const tail = (filePath, maxChars = 1200) => {
              const text = readText(filePath);
              return text.length > maxChars ? text.slice(-maxChars) : text;
            };
            if (explicitAuthUrl && explicitDeviceCode) {
              return {
                ok: true,
                reused: true,
                ...parseCapture(explicitAuthUrl, explicitDeviceCode),
                session_dir: sessionDir,
                codex_home_path: codexHomePath,
                auth_file_path: authFilePath,
                pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                stdout_path: stdoutPath || null,
                stderr_path: stderrPath || null,
                exit_path: exitPath || null,
              };
            }
            const timeoutMs = 45000;
            const startedAt = Date.now();
            while (Date.now() - startedAt < timeoutMs) {
              const combined = readText(stdoutPath) + "\n" + readText(stderrPath);
              const challenge = extractDeviceChallenge(combined);
              if (challenge.auth_url && challenge.device_code) {
                return {
                  ok: true,
                  reused: false,
                  ...parseCapture(challenge.auth_url, challenge.device_code),
                  session_dir: sessionDir,
                  codex_home_path: codexHomePath,
                  auth_file_path: authFilePath,
                  pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                  stdout_path: stdoutPath || null,
                  stderr_path: stderrPath || null,
                  exit_path: exitPath || null,
                };
              }
              if (exitPath && fs.existsSync(exitPath)) {
                const exitCodeRaw = readText(exitPath).trim();
                throw new Error("codex-login-exited-before-auth-url:" + (exitCodeRaw || "unknown") + ":" + (tail(stderrPath) || tail(stdoutPath) || "no-output"));
              }
              await delay(250);
            }
            throw new Error("codex-login-auth-url-timeout:" + (tail(stderrPath) || tail(stdoutPath) || "no-output"));
