                  label: String(option.label || option.textContent || ""),
                }));
              }).catch(() => []);
              const normalizedTarget = normalize(targetValue).toLowerCase();
              const normalizedAccepted = acceptedTokens.map((value) => normalize(value).toLowerCase());
              const chosen = options.find((option) => {
                const value = normalize(option.value).toLowerCase();
                const label = normalize(option.label).toLowerCase();
