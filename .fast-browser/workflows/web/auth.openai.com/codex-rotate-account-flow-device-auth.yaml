  - classify_device_auth_login_entry_after_auth_landing:
      if: "${(state.steps.click_device_auth_login_button_from_auth_landing?.action?.ok === true && state.steps.click_device_auth_login_button_from_auth_landing?.action?.skipped !== true) || (state.steps.choose_device_auth_email_login_option_after_auth_landing?.action?.ok === true && state.steps.choose_device_auth_email_login_option_after_auth_landing?.action?.skipped !== true)}"
      metadata:
