      if: "${state.vars.codex_login?.exit_path || inputs.codex_login_exit_path}"
      metadata:
        description: "Wait for the detached codex device-auth process to exit after browser authorization completes."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const { setTimeout: delay } = await import("node:timers/promises");
            const exitPath = String(state.vars?.codex_login?.exit_path || args.codex_login_exit_path || "").trim();
            const stdoutPath = String(state.vars?.codex_login?.stdout_path || args.codex_login_stdout_path || "").trim();
            const stderrPath = String(state.vars?.codex_login?.stderr_path || args.codex_login_stderr_path || "").trim();
            if (!exitPath) {
              return { ok: true, skipped: true };
            }
            const readText = (filePath) => (!filePath || !fs.existsSync(filePath)) ? "" : fs.readFileSync(filePath, "utf8");
            const tail = (filePath, maxChars = 1200) => {
              const text = readText(filePath);
              return text.length > maxChars ? text.slice(-maxChars) : text;
            };
            const timeoutMs = 45000;
            const startedAt = Date.now();
            while (Date.now() - startedAt < timeoutMs) {
              if (fs.existsSync(exitPath)) {
                const raw = readText(exitPath).trim();
                const parsed = raw === "" ? null : Number.parseInt(raw, 10);
                const exitCode = Number.isInteger(parsed) ? parsed : null;
                return {
                  ok: exitCode === 0,
                  exit_code: exitCode,
                  stdout_tail: tail(stdoutPath) || null,
                  stderr_tail: tail(stderrPath) || null,
                };
              }
              await delay(250);
            }
            return {
              ok: false,
              timeout: true,
              exit_code: null,
              stdout_tail: tail(stdoutPath) || null,
              stderr_tail: tail(stderrPath) || null,
            };
  - finalize_device_auth_tail_summary:
      if: "${state.steps.run_prepare_account_flow?.action?.result?.output?.next_action == 'complete' || state.steps.run_prepare_account_flow?.action?.result?.output?.success === true}"
      metadata:
        description: "Build the final device-authorization outcome from the browser surface and detached Codex session."
