            const lastSurface = finalInspect.current_url ? finalInspect : (afterCode.current_url ? afterCode : inspect);
            const authPrompt = inspect.auth_prompt === true;
            const stateMismatch = inspect.state_mismatch === true || inspectInitial.state_mismatch === true;
            const success = finalInspect.success === true || afterCode.success === true || inspect.success === true || exitResult.ok === true;
            let errorMessage = null;
            const toggleResult = state.steps.ensure_device_code_authorization_enabled?.action || {};
            if (shell.account_ready !== true) {
              errorMessage = "Managed browser session is not authenticated in ChatGPT before device authorization starts.";
            } else if (toggleResult.ok !== true) {
              errorMessage = "ChatGPT did not expose or enable the Codex device-code authorization toggle before device authorization started.";
            } else if (stateMismatch) {
              errorMessage = "OpenAI returned a state mismatch during Codex device authorization.";
            } else if (authPrompt) {
              errorMessage = "OpenAI redirected the device-authorization entry back to a login prompt instead of showing the device authorization screen.";
            } else if (inspect.device_code_prompt === true) {
              errorMessage = "OpenAI still requires the Codex device code before authorization can complete.";
            } else if ((afterCode.oauth_continue_visible === true || inspect.oauth_continue_visible === true) && success !== true) {
              errorMessage = "OpenAI still requires consent before Codex device authorization can complete.";
            } else if (success !== true) {
              errorMessage = "Codex device authorization did not complete.";
            }
            return {
              stage: success ? "success" : "device_authorization_failed",
              current_url: lastSurface.current_url || inspect.current_url || shell.current_url || null,
              headline: lastSurface.headline || inspect.headline || shell.headline || null,
              callback_complete: false,
              success,
              auth_prompt: authPrompt,
              state_mismatch: stateMismatch,
              next_action: success ? "complete" : "fail_terminal",
              error_message: success ? null : errorMessage,
              codex_session: {
                auth_url: session.auth_url || null,
                callback_url: session.callback_url || null,
                callback_port: session.callback_port ?? null,
                device_code: session.device_code || null,
                session_dir: session.session_dir || null,
                codex_home_path: session.codex_home_path || null,
                auth_file_path: session.auth_file_path || null,
                pid: session.pid ?? null,
                stdout_path: session.stdout_path || null,
                stderr_path: session.stderr_path || null,
                exit_path: session.exit_path || null,
              },
              codex_login_exit_ok: exitResult.ok === true,
              codex_login_exit_code: exitResult.exit_code ?? null,
              codex_login_stdout_tail: exitResult.stdout_tail || null,
              codex_login_stderr_tail: exitResult.stderr_tail || null,
            };
  - finalize_selected_flow:
      metadata:
        description: "Return the merged device-auth outcome when preparation succeeded, otherwise surface the preparation failure."
      run:
        script:
          language: javascript
          code: |
            const prepare =
              state.steps.run_prepare_account_flow?.action?.result?.output || {};
            const tail =
              state.steps.finalize_device_auth_tail_summary?.action?.value || null;
            const prepareComplete =
              prepare.success === true || prepare.next_action === "complete";
            const selected = prepareComplete && tail ? tail : prepare;

            return {
              ...(selected && typeof selected === "object" ? selected : {}),
              selected_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-device-auth",
              prepare_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-shared",
              prepare_completed: prepareComplete,
              tail_attempted: Boolean(tail),
              tail_selected: prepareComplete && Boolean(tail),
              merged_tail: true,
              selection_strategy:
                "prepare-authenticated-session-then-merged-device-authorization-tail",
            };
output:
  as: "${state.steps.finalize_selected_flow?.action?.value || {}}"
