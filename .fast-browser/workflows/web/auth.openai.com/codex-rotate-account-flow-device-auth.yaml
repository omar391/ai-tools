      wait:
        milliseconds: 1200
  - inspect_prepare_public_chatgpt_entry:
      if: "${state.vars.reuse_device_auth_session !== true}"
      metadata:
        description: "Inspect the public ChatGPT entry before the local device-auth prepare login branch begins."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const title = await page.title().catch(() => "");
            const latest = await page.evaluate((titleText) => {
              const normalizeInner = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const buttons = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']"))
                .filter((node) => isVisible(node))
                .map((node) => {
                  if (node instanceof HTMLInputElement) {
                    return normalizeInner(node.value || node.getAttribute("aria-label") || "");
                  }
                  return normalizeInner(node.innerText || node.textContent || node.getAttribute("aria-label") || "");
                })
                .filter(Boolean)
                .slice(0, 20);
              const bodyText = normalizeInner(document.body ? (document.body.innerText || document.body.textContent || "") : "");
              return {
                current_url: location.href,
                title: normalizeInner(titleText || document.title || ""),
                body_text: bodyText,
                visible_buttons: buttons,
              };
            }, title);
            const combinedText = normalize([latest.title, latest.body_text, ...(latest.visible_buttons || [])].join(" "));
            const currentUrl = String(latest.current_url || page.url());
            const chatGptShell = /chatgpt\.com/i.test(currentUrl);
            const logoutUrl = /chatgpt\.com\/auth\/logout/i.test(currentUrl);
            const settingsShell = chatGptShell && /general|notifications|personalization|apps|data controls|security|account/i.test(combinedText);
            const securityOpen = chatGptShell && /secure sign in with chatgpt|trusted devices|enable device code authorization for codex|log out of all devices|multi-factor authentication|security keys & passkeys/i.test(combinedText);
            const composerShell = chatGptShell && /new chat|search chats|chat history|projects|what are you working on|what’s on your mind today|where should we begin|upgrade plan|explore gpts/i.test(combinedText);
            const sessionExpired = chatGptShell && /your session has expired|please log in again to continue using the app/i.test(combinedText);
            const publicShellSignals = chatGptShell && /log in to get smarter responses|get responses tailored to you|see plans and pricing|sign up for free|welcome to chatgpt|get started|where should we begin/i.test(combinedText);
            const loginCtaVisible = (latest.visible_buttons || []).some((label) => /^(log in|sign in)$/i.test(label) || /log in/i.test(label));
            const signupCtaVisible = (latest.visible_buttons || []).some((label) => /^sign up$/i.test(label) || /sign up for free|create account|get started/i.test(label));
            const blankShell = chatGptShell && combinedText.length === 0;
            const securityVerification = /just a moment|enable javascript and cookies to continue|verification successful/i.test(combinedText);
            const accountReady = (securityOpen || settingsShell || composerShell) && !sessionExpired;
            return {
              ok: true,
              current_url: currentUrl,
              headline: latest.body_text.split("\n").map((value) => value.trim()).filter(Boolean)[0] || latest.title || null,
              stage: blankShell
                ? "blank_chatgpt"
                : (securityVerification
                    ? "security_verification"
                    : (accountReady
                    ? "app_shell"
                    : ((logoutUrl || sessionExpired || loginCtaVisible || signupCtaVisible || publicShellSignals)
                        ? "public_chatgpt"
                        : "unknown"))),
              account_ready: accountReady,
              settings_shell: settingsShell,
              security_open: securityOpen,
              security_verification: securityVerification,
              session_expired: sessionExpired,
              login_cta_visible: loginCtaVisible,
              signup_cta_visible: signupCtaVisible,
              logout_url: logoutUrl,
              blank_shell: blankShell,
              visible_buttons: latest.visible_buttons || [],
              body_text_length: latest.body_text.length,
            };
  - wait_after_prepare_public_chatgpt_security_verification:
      if: "${state.vars.reuse_device_auth_session !== true && (state.steps.inspect_prepare_public_chatgpt_entry?.action?.stage === 'security_verification' || state.steps.inspect_prepare_public_chatgpt_entry?.action?.stage === 'unknown')}"
      metadata:
        description: Give the ChatGPT entry shell time to clear security-verification interstitials before deciding that a direct auth fallback is necessary.
      wait:
