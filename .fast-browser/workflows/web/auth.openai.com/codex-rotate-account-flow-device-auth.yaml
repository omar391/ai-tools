            const success = /you can close this window|successfully logged in|signed in|device authorized|authorization complete/i.test(normalizedText) || /close this window/i.test(title);
            const authPrompt = emailInput || passwordInput || /welcome back|log in|enter your password|check your inbox/i.test(normalizedText);
