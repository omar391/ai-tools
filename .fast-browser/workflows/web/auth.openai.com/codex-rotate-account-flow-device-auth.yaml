document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow-device-auth
  version: 1.3.6
  summary: "Managed-profile OpenAI device-auth flow that first reaches a normal authenticated ChatGPT session, then completes Codex device authorization inside the same workflow."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        mode:
          default: codex_login
        codex_bin:
          default: codex
        auth_url: {}
        device_code: {}
        callback_url: {}
        callback_port: {}
        codex_session_dir: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        codex_home_path: {}
        codex_auth_file_path: {}
        email: {}
        account_login_locator:
          type: object
          format: secret-locator
        prefer_password_login:
          default: "true"
        full_name:
          default: "Dev Astronlab"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - email
use:
  functions:
    click_primary_continue:
      metadata:
        description: "Click the primary visible submit or continue control for the current OpenAI form."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const result = await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const readLabel = (node) => {\n    if (!(node instanceof Element)) {\n      return \"\";\n    }\n    if (node instanceof HTMLInputElement) {\n      return normalize(node.value || node.getAttribute(\"aria-label\") || node.getAttribute(\"title\") || \"\");\n    }\n    return normalize(node.innerText || node.textContent || node.getAttribute(\"aria-label\") || node.getAttribute(\"title\") || \"\");\n  };\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const isDisabled = (node) => node.hasAttribute(\"disabled\") || node.getAttribute(\"aria-disabled\") === \"true\";\n  const isExplicitSubmit = (node) => {\n    if (node instanceof HTMLInputElement) {\n      return node.type === \"submit\";\n    }\n    if (node instanceof HTMLButtonElement) {\n      return node.type === \"submit\";\n    }\n    return false;\n  };\n  const clickNode = (node) => {\n    if (!(node instanceof HTMLElement)) {\n      return false;\n    }\n    node.click();\n    return true;\n  };\n  const selectors = [\n    \"input[type='email']\",\n    \"input[name='email']\",\n    \"input[autocomplete='email']\",\n    \"input[autocomplete='username']\",\n    \"input[type='password']\",\n    \"input[autocomplete='current-password']\",\n    \"input[autocomplete='new-password']\",\n    \"input[autocomplete='one-time-code']\",\n    \"input[name*='code']\",\n    \"input[inputmode='numeric']\",\n  ];\n  const activeForm = document.activeElement instanceof Element ? document.activeElement.closest(\"form\") : null;\n  const candidateForms = [];\n  if (activeForm) {\n    candidateForms.push(activeForm);\n  }\n  for (const selector of selectors) {\n    const field = document.querySelector(selector);\n    if (field instanceof Element) {\n      const form = field.closest(\"form\");\n      if (form && !candidateForms.includes(form)) {\n        candidateForms.push(form);\n      }\n    }\n  }\n  const buttonMatchers = /continue|next|verify|submit|try again|retry|continue to codex|continue to openai|authorize|allow|accept/i;\n  const formControls = candidateForms.flatMap((form) => Array.from(form.querySelectorAll(\"button, input[type='submit'], [role='button']\"))).filter((node) => isVisible(node) && !isDisabled(node));\n  const preferredFormControl = formControls.find((node) => isExplicitSubmit(node) && buttonMatchers.test(readLabel(node))) || formControls.find((node) => buttonMatchers.test(readLabel(node))) || formControls.find((node) => isExplicitSubmit(node));\n  if (preferredFormControl && clickNode(preferredFormControl)) {\n    return { ok: true, strategy: \"form-submit\", clicked_text: readLabel(preferredFormControl) || null };\n  }\n  const fallback = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\")).filter((node) => isVisible(node) && !isDisabled(node)).find((node) => buttonMatchers.test(readLabel(node)));\n  if (fallback && clickNode(fallback)) {\n    return { ok: true, strategy: \"text-match\", clicked_text: readLabel(fallback) || null };\n  }\n  if (activeForm instanceof HTMLFormElement) {\n    activeForm.requestSubmit();\n    return { ok: true, strategy: \"request-submit\", clicked_text: null };\n  }\n  return { ok: false, error: \"primary-continue-not-found\" };\n});\nif (result.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn { ...result, current_url: page.url() };\n"
    click_oauth_consent_continue:
      metadata:
        description: "Click the visible OAuth consent continue control with a Playwright-side click so navigation-triggering consent does not die inside page.evaluate."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const readLabel = async (locator) => {
              return await locator.evaluate((node) => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                if (node instanceof HTMLInputElement) {
                  return normalize(node.value || node.getAttribute("aria-label") || node.getAttribute("title") || "");
                }
                if (!(node instanceof Element)) {
                  return "";
                }
                return normalize(
                  node.innerText
                  || node.textContent
                  || node.getAttribute("aria-label")
                  || node.getAttribute("title")
                  || ""
                );
              }).catch(() => "");
            };
            const isDisabled = async (locator) => {
              return await locator.evaluate((node) => {
                if (!(node instanceof Element)) {
                  return true;
                }
                return node.hasAttribute("disabled") || node.getAttribute("aria-disabled") === "true";
              }).catch(() => true);
            };
            const controls = page.locator("button, [role='button'], a, input[type='submit']");
            const candidates = [];
            const count = await controls.count().catch(() => 0);
            for (let index = 0; index < count; index += 1) {
              const locator = controls.nth(index);
              if (!(await locator.isVisible().catch(() => false))) {
                continue;
              }
              if (await isDisabled(locator)) {
                continue;
              }
              const label = normalize(await readLabel(locator));
              if (!label) {
                continue;
              }
              candidates.push({ locator, label });
            }
            const matchers = [
              /^continue to codex$/i,
              /^continue$/i,
              /continue to codex|continue to openai|authorize|allow|accept/i,
            ];
            for (const matcher of matchers) {
              for (const candidate of candidates) {
                if (!matcher.test(candidate.label)) {
                  continue;
                }
                await candidate.locator.scrollIntoViewIfNeeded().catch(() => {});
                await candidate.locator.click({ timeout: 5000 });
                await page.waitForTimeout(1200).catch(() => {});
                return {
                  ok: true,
                  strategy: "locator-click",
                  clicked_text: candidate.label,
                  current_url: page.url(),
                };
              }
            }
            return {
              ok: false,
              error: "oauth-consent-continue-not-found",
              current_url: page.url(),
            };
    wait_for_openai_surface_ready:
      metadata:
        description: "Wait for the OpenAI auth surface to render a stable visible shell before classifying it."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const ready = await page.waitForFunction(() => {
              const bodyText = document.body ? String(document.body.innerText || document.body.textContent || "") : "";
              const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              });
              const emailInput = hasVisible("input[type='email'], input[name='email'], input[autocomplete='email'], input[autocomplete='username']");
              const passwordInput = hasVisible("input[type='password'], input[name='password'], input[name='new-password'], input[autocomplete='current-password'], input[autocomplete='new-password']");
              const codeInput = hasVisible("input[name*='code' i], input[autocomplete='one-time-code'], input[inputmode='numeric']");
              const actionableButton = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']")).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                if (!(rect.width > 0 && rect.height > 0)) {
                  return false;
                }
                const text = String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || "")).replace(/\s+/g, " ").trim();
                return /log in|sign in|continue|verify|allow|authorize|accept|one-time code|device code/i.test(text);
              });
              const meaningfulText = /welcome back|enter your password|enter the code|device code|authorize|allow|sign in to codex|check your inbox/i.test(bodyText);
              const appShell = /\bnew chat\b|\bsearch chats\b|\bprojects\b|\bimages\b|\bapps\b|\bcodex\b|what['’]s on your mind today\?/i.test(bodyText);
              const publicChatGptShell = /log in to get answers based on saved chats|get responses tailored to you|sign up for free|see plans and pricing|welcome to chatgpt/i.test(bodyText);
              return emailInput || passwordInput || codeInput || actionableButton || meaningfulText || appShell || publicChatGptShell;
            }, { timeout: 8000 }).then(() => true).catch(() => false);
            return { ok: ready, current_url: page.url() };
    classify_openai_auth_surface:
      metadata:
        description: "Classify the current OpenAI auth surface for the local device-auth login branch."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const isVisible = (node) => {
              if (!(node instanceof Element)) {
                return false;
              }
              if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                return false;
              }
              const style = window.getComputedStyle(node);
              if (!style || style.display === "none" || style.visibility === "hidden") {
                return false;
              }
              const rect = node.getBoundingClientRect();
              return rect.width > 0 && rect.height > 0;
            };
            const title = await page.title().catch(() => "");
            const bodyText = await page.locator("body").innerText().catch(() => "");
            const normalizedText = normalize(bodyText);
            const firstLine = normalizedText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || null;
            const currentUrl = page.url();
            let host = "";
            let path = "";
            try {
              const parsed = new URL(currentUrl);
              host = parsed.hostname;
              path = parsed.pathname;
            } catch {}
            const visibleButtons = await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              return Array.from(document.querySelectorAll("button,a,[role='button'],input[type='submit']"))
                .filter((node) => isVisible(node))
                .map((node) => node instanceof HTMLInputElement
                  ? normalize(node.value || node.getAttribute("aria-label") || "")
                  : normalize(node.innerText || node.textContent || node.getAttribute("aria-label") || ""))
                .filter(Boolean)
                .slice(0, 24);
            }).catch(() => []);
            const emailFieldState = await page.evaluate(() => {
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const field = Array.from(document.querySelectorAll("input[type='email'], input[name='email'], input[autocomplete='email'], input[autocomplete='username']"))
                .find((node) => isVisible(node));
              if (!(field instanceof HTMLInputElement)) {
                return {
                  present: false,
                  editable: false,
                  disabled: false,
                  prefilled: false,
                };
              }
              const disabled = field.disabled || field.getAttribute("aria-disabled") === "true" || field.hasAttribute("readonly");
              return {
                present: true,
                editable: !disabled,
                disabled,
                prefilled: String(field.value || "").trim().length > 0,
              };
            }).catch(() => ({
              present: false,
              editable: false,
              disabled: false,
              prefilled: false,
            }));
            const hasVisible = async (selector) => {
              return await page.evaluate((currentSelector) => {
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                return Array.from(document.querySelectorAll(currentSelector)).some((node) => isVisible(node));
              }, selector).catch(() => false);
            };
            const emailInput = await hasVisible("input[type='email'], input[name='email'], input[autocomplete='email'], input[autocomplete='username']");
            const passwordInput = await hasVisible("input[type='password'], input[name='password'], input[name='new-password'], input[autocomplete='current-password'], input[autocomplete='new-password']");
            const codeInput = await hasVisible("input[name*='code' i], input[autocomplete='one-time-code'], input[aria-label*='code' i], input[placeholder*='code' i], input[inputmode='numeric']");
            const antiBotGate = /just a moment/i.test(title)
              || /performing security verification|security verification|verify you are not a bot|verifying you are human|verify you are human|checking your browser|cloudflare|press & hold|turnstile/i.test(normalizedText)
              || await hasVisible("input[name='cf-turnstile-response'], iframe[src*='challenge'], iframe[title*='Widget containing']");
            const retryableTimeout = /oops, an error occurred|operation timed out|please try again|invalid_state/i.test(normalizedText) || /oops, an error occurred|operation timed out|invalid_state/i.test(title);
            const sessionEnded = /your session has ended|your session has expired/i.test(normalizedText);
            const rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(normalizedText);
            const addPhonePrompt = /add-phone/i.test(path)
              || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(normalizedText);
            const aboutYou = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(normalizedText)
              || /about-you/i.test(path);
            const resetPasswordPrompt = /reset-password/i.test(currentUrl) || /\breset password\b/i.test(normalizedText);
            const incorrectCode = /incorrect code|invalid code|code expired|expired code/i.test(normalizedText);
            const existingAccountPrompt = /an account for this email address already exists|this email address already exists|account already exists|already registered/i.test(normalizedText);
            const usernameNotFound = /username_not_found|username not found/i.test(normalizedText);
            const invalidCredentials = /incorrect email address or password|incorrect password|wrong password|invalid email or password/i.test(normalizedText);
            const sawOauthConsent = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(normalizedText) || /sign in to codex/i.test(title);
            const oauthContinueVisible = sawOauthConsent && visibleButtons.some((text) => /continue to codex|continue to openai|authorize|allow|accept/i.test(text) || /^continue$/i.test(text));
            const continueButtonVisible = visibleButtons.some((text) => /continue|next|verify|submit|log in|sign in/i.test(text));
            const oneTimeCodeOption = visibleButtons.some((text) => /one-time code|one time code/i.test(text));
            const emailVerification = (!sawOauthConsent && codeInput)
              || (!sawOauthConsent && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(normalizedText))
              || (!sawOauthConsent && /email-verification/i.test(path));
            const deviceCodePrompt = codeInput && !emailVerification && /device code|authorization code|code displayed in your terminal|paste the device code|enter (?:the |your )?(?:device )?code/i.test(normalizedText);
            const success = /you can close this window|authorization complete|device authorized|successfully logged in|signed in/i.test(normalizedText) || /close this window/i.test(title) || /\/deviceauth\/callback(?:\/|$)?/i.test(path);
            const signupPasswordRoute = /\/create-account\/password(?:\/|$)?/i.test(path)
              || (/\/create-account(?:\/|$)/i.test(path) && /create a password|choose a password/i.test(normalizedText));
            const loginPasswordRoute = /\/log-in\/password(?:\/|$)?/i.test(path)
              || (/\/log-in(?:\/|$)/i.test(path)
                && !emailInput
                && (passwordInput
                  || /enter your password/i.test(normalizedText)
                  || (emailFieldState.prefilled === true
                    && emailFieldState.editable === false
                    && continueButtonVisible)));
            const chatGptHost = /(?:^|\.)chatgpt\.com$/i.test(host);
            const publicShellSignals = /log in to get smarter responses|get responses tailored to you|see plans and pricing|sign up for free|welcome to chatgpt|get started|where should we begin/i.test(normalizedText);
            const loginCtaVisible = visibleButtons.some((text) => /^log in$/i.test(text) || /^sign in$/i.test(text));
            const securityShell = chatGptHost && !/^\/auth\//i.test(path) && /secure sign in with chatgpt|trusted devices|enable device code authorization for codex|log out of all devices|multi-factor authentication|security keys & passkeys/i.test(normalizedText);
            const appShell = chatGptHost
              && !/^\/auth\//i.test(path)
              && /\bnew chat\b|\bsearch chats\b|\bimages\b|\bapps\b|\bprojects\b|\bdeep research\b|\bcodex\b|what['’]s on your mind today\?|ask anything/i.test(normalizedText);
            const publicShell = chatGptHost && !securityShell && (publicShellSignals || loginCtaVisible);
            let stage = "unknown";
            if (success) {
              stage = "success";
            } else if (deviceCodePrompt) {
              stage = "device_code";
            } else if (antiBotGate) {
              stage = "security_verification";
            } else if (rateLimitExceeded) {
              stage = "rate_limit";
            } else if (sessionEnded) {
              stage = "session_ended";
            } else if (retryableTimeout) {
              stage = "retryable_timeout";
            } else if (addPhonePrompt) {
              stage = "add_phone";
            } else if (oauthContinueVisible) {
              stage = "oauth_consent";
            } else if (appShell || securityShell) {
              stage = "app_shell";
            } else if (aboutYou) {
              stage = "about_you";
            } else if (emailVerification) {
              stage = "email_verification";
            } else if (existingAccountPrompt) {
              stage = "existing_account_prompt";
            } else if (invalidCredentials) {
              stage = "invalid_credentials";
            } else if (signupPasswordRoute || (/\/create-account(?:\/|$)/i.test(path) && passwordInput)) {
              stage = "signup_password";
            } else if (/\/create-account(?:\/|$)/i.test(path) && emailInput) {
              stage = "signup_email";
            } else if (loginPasswordRoute || (/\/log-in(?:\/|$)/i.test(path) && passwordInput)) {
              stage = "login_password";
            } else if (/\/log-in(?:\/|$)/i.test(path) && emailInput) {
              stage = "login_email";
            } else if (passwordInput) {
              stage = "login_password";
            } else if (emailInput) {
              stage = "login_email";
            } else if (publicShell && !emailInput && !passwordInput && !codeInput) {
              stage = "public_chatgpt";
            } else if (emailInput || passwordInput || codeInput || /welcome back|log in|sign in|check your inbox|enter your password/i.test(normalizedText)) {
              stage = "auth_prompt";
            }
            return {
              ok: true,
              current_url: currentUrl,
              headline: firstLine || title || null,
              stage,
              success,
              host: host || null,
              path: path || null,
              chatgpt_app_shell: appShell || securityShell,
              chatgpt_public_shell: publicShell,
              account_ready: appShell || securityShell,
              email_input: emailInput,
              email_input_editable: emailFieldState.editable,
              email_input_disabled: emailFieldState.disabled,
              email_prefilled: emailFieldState.prefilled,
              password_input: passwordInput,
              code_input: codeInput,
              email_verification: emailVerification,
              device_code_prompt: deviceCodePrompt,
              oauth_continue_visible: oauthContinueVisible,
              continue_button_visible: continueButtonVisible,
              one_time_code_option: oneTimeCodeOption,
              retryable_timeout: retryableTimeout,
              rate_limit_exceeded: rateLimitExceeded,
              reset_password_prompt: resetPasswordPrompt,
              incorrect_code: incorrectCode,
              username_not_found: usernameNotFound,
              invalid_credentials: invalidCredentials,
              existing_account_prompt: existingAccountPrompt,
              follow_up_step: aboutYou,
              add_phone_prompt: addPhonePrompt,
              session_ended: sessionEnded,
              anti_bot_gate: antiBotGate,
              auth_prompt: stage === "login_email" || stage === "login_password" || stage === "signup_email" || stage === "signup_password" || stage === "auth_prompt",
            };
    clear_openai_security_gate:
      metadata:
        description: Pause for HIL when OpenAI or Cloudflare requires human verification.
        mode: hil
        targetRef: primary
        pause:
          responder: human
          verifyPersistence: false
          restorePreferredMode: false
        browser:
          screenshot: true
          validation:
            post:
              kind: js
              expression: "const bodyText = document.body ? document.body.innerText : '';\nconst title = document.title || '';\nconst hasTurnstile = !!document.querySelector('input[name=\"cf-turnstile-response\"], iframe[src*=\"challenge\"], iframe[title*=\"Widget containing\"]');\nconst stillBlocked = hasTurnstile\n  || /just a moment/i.test(title)\n  || /performing security verification|security verification|verify you are human|verifying you are human|verify you are not a bot/i.test(bodyText);\nreturn {\n  ok: !stillBlocked,\n  current_url: location.href,\n  still_blocked: stillBlocked,\n};\n"
      call: afn.request_input
      with:
        body:
          hilMode: page
          message: If OpenAI or Cloudflare shows a human-verification page or checkbox, complete it in the HIL viewer and wait until the normal auth page is visible.
          source: |
            const blockedNow = async () => {
              const title = await page.title().catch(() => "");
              const bodyText = await page.locator("body").innerText().catch(() => "");
              const hasTurnstile = await page.locator("input[name='cf-turnstile-response'], iframe[src*='challenge'], iframe[title*='Widget containing']").count().catch(() => 0) > 0;
              return hasTurnstile
                || /just a moment/i.test(title)
                || /performing security verification|security verification|verify you are human|verifying you are human|verify you are not a bot/i.test(bodyText);
            };

            if (!(await blockedNow())) {
              return {
                ok: true,
                skipped: true,
                blocked: false,
                current_url: page.url(),
              };
            }

            const clickLocator = async (locator, strategy) => {
              if (!locator || (await locator.count().catch(() => 0)) === 0) {
                return null;
              }
              if (!(await locator.isVisible().catch(() => false))) {
                return null;
              }
              await locator.scrollIntoViewIfNeeded().catch(() => {});
              const attempts = [
                async () => locator.click({ timeout: 2000 }),
                async () => locator.click({ timeout: 2000, force: true }),
                async () => locator.press(" "),
                async () => locator.press("Enter"),
              ];
              for (const attempt of attempts) {
                await attempt().catch(() => {});
                await page.waitForTimeout(1500).catch(() => {});
                if (!(await blockedNow())) {
                  return strategy;
                }
              }
              return null;
            };

            const clickBoundingBox = async (locator, strategy) => {
              if (!locator || (await locator.count().catch(() => 0)) === 0) {
                return null;
              }
              if (!(await locator.isVisible().catch(() => false))) {
                return null;
              }
              const box = await locator.boundingBox().catch(() => null);
              if (!box) {
                return null;
              }
              const x = box.x + Math.min(24, Math.max(10, box.width * 0.12));
              const y = box.y + (box.height / 2);
              await page.mouse.move(x, y, { steps: 8 }).catch(() => {});
              await page.waitForTimeout(150).catch(() => {});
              await page.mouse.click(x, y, { delay: 120 }).catch(() => {});
              await page.waitForTimeout(1500).catch(() => {});
              if (!(await blockedNow())) {
                return strategy;
              }
              return null;
            };

            const strategies = [
              async () => clickLocator(page.getByRole("checkbox", { name: /verify you are human/i }).first(), "role-checkbox"),
              async () => clickLocator(page.locator("input[type='checkbox']").first(), "input-checkbox"),
              async () => clickBoundingBox(page.getByText(/verify you are human/i).first(), "text-bbox"),
              async () => clickBoundingBox(page.locator("iframe[src*='challenge'], iframe[title*='Widget containing']").first(), "iframe-bbox"),
            ];

            let strategy = null;
            for (const attempt of strategies) {
              strategy = await attempt();
              if (strategy) {
                break;
              }
            }

            return {
              ok: true,
              blocked: await blockedNow(),
              strategy,
              current_url: page.url(),
            };
    fill_openai_email_field:
      metadata:
        description: "Fill the OpenAI email field on the local device-auth login branch."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.type
      with:
        body:
          selector: 'input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]'
          text: "${inputs.email}"
          dispatch_events_after_fill: true
          blur_after_fill: true
          settle_ms: 250
    submit_signup_email_form:
      metadata:
        description: "Submit the signup email form and verify that OpenAI advances to a valid next state."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const expectedEmail = String(args.email || "").trim().toLowerCase();
            const detectStage = async () => {
              for (let attempt = 1; attempt <= 3; attempt += 1) {
                try {
                  return await page.evaluate(() => {
                    const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                    const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                      if (!(node instanceof Element)) {
                        return false;
                      }
                      const style = window.getComputedStyle(node);
                      if (!style || style.display === "none" || style.visibility === "hidden") {
                        return false;
                      }
                      const rect = node.getBoundingClientRect();
                      return rect.width > 0 && rect.height > 0;
                    });
                    const bodyText = normalize(document.body ? (document.body.innerText || document.body.textContent || "") : "");
                    const title = normalize(document.title || "");
                    const path = location.pathname;
                    const host = location.hostname;
                    const emailInput = hasVisible('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]');
                    const passwordInput = hasVisible('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]');
                    const verificationInput = hasVisible('input[name*="code" i], input[autocomplete="one-time-code"], input[inputmode="numeric"]');
                    const antiBotGate = /just a moment/i.test(title)
                      || /performing security verification|verify you are not a bot|verifying you are human|verify you are human/i.test(bodyText)
                      || hasVisible('input[name="cf-turnstile-response"], iframe[src*="challenge"], iframe[title*="Widget containing"]');
                    const retryableTimeout = /oops, an error occurred|operation timed out|try again/i.test(bodyText);
                    const sessionEnded = /your session has ended/i.test(bodyText);
                    const rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(bodyText);
                    const addPhonePrompt = /add-phone/i.test(path)
                      || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(bodyText);
                    const aboutYou = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(bodyText)
                      || /about-you/i.test(path);
                    const needsEmailVerification = verificationInput
                      || /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText)
                      || /email-verification/i.test(path);
                    const existingAccountPrompt = /an account for this email address already exists|this email address already exists|account already exists|already registered/i.test(bodyText);
                    let stage = "unknown";
                    if (/^(localhost|127\.0\.0\.1)$/i.test(host)) {
                      stage = "callback_complete";
                    } else if (antiBotGate) {
                      stage = "security_verification";
                    } else if (rateLimitExceeded) {
                      stage = "rate_limit";
                    } else if (sessionEnded) {
                      stage = "session_ended";
                    } else if (retryableTimeout) {
                      stage = "retryable_timeout";
                    } else if (addPhonePrompt) {
                      stage = "add_phone";
                    } else if (aboutYou) {
                      stage = "about_you";
                    } else if (needsEmailVerification) {
                      stage = "email_verification";
                    } else if (existingAccountPrompt) {
                      stage = "existing_account_prompt";
                    } else if (/\/create-account(?:\/|$)/i.test(path) && passwordInput) {
                      stage = "signup_password";
                    } else if (/\/create-account(?:\/|$)/i.test(path) && emailInput) {
                      stage = "signup_email";
                    } else if (emailInput || passwordInput || verificationInput) {
                      stage = "auth_prompt";
                    }
                    return {
                      stage,
                      current_url: location.href,
                      headline: bodyText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
                    };
                  });
                } catch (error) {
                  const message = String(error?.message || error || "");
                  if (!/Execution context was destroyed|Cannot find context|Target closed|Frame was detached/i.test(message) || attempt === 3) {
                    throw error;
                  }
                  await page.waitForLoadState("domcontentloaded").catch(() => {});
                  await page.waitForTimeout(250).catch(() => {});
                }
              }
              return {
                stage: "unknown",
                current_url: page.url(),
                headline: null,
              };
            };

            const fieldSelectors = [
              'input[type="email"]',
              'input[name="email"]',
              'input[autocomplete="email"]',
              'input[autocomplete="username"]',
            ];
            let field = null;
            for (const selector of fieldSelectors) {
              const candidate = page.locator(selector).first();
              if (!(await candidate.count().catch(() => 0))) {
                continue;
              }
              if (!(await candidate.isVisible().catch(() => false))) {
                continue;
              }
              field = candidate;
              break;
            }
            if (!field) {
              throw new Error("signup-email-field-not-found");
            }
            const value = String(await field.inputValue().catch(() => "")).trim().toLowerCase();
            if (!value || value !== expectedEmail) {
              throw new Error("signup-email-not-filled:" + (value || "empty"));
            }

            const allowedStages = new Set([
              "signup_password",
              "email_verification",
              "about_you",
              "add_phone",
              "existing_account_prompt",
              "security_verification",
              "retryable_timeout",
              "rate_limit",
              "session_ended",
              "callback_complete",
            ]);

            const clickVisibleContinue = async () => {
              try {
                const result = await field.evaluate((input) => {
                  const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                  const isVisible = (node) => {
                    if (!(node instanceof Element)) {
                      return false;
                    }
                    const style = window.getComputedStyle(node);
                    if (!style || style.display === "none" || style.visibility === "hidden") {
                      return false;
                    }
                    const rect = node.getBoundingClientRect();
                    return rect.width > 0 && rect.height > 0;
                  };
                  const readLabel = (node) => {
                    if (!(node instanceof Element)) {
                      return "";
                    }
                    if (node instanceof HTMLInputElement) {
                      return normalize(node.value || node.getAttribute("aria-label") || "");
                    }
                    return normalize(node.innerText || node.textContent || node.getAttribute("aria-label") || "");
                  };
                  const form = input instanceof Element ? input.closest("form") : null;
                  const scope = form || document;
                  const candidates = Array.from(scope.querySelectorAll("button, input[type='submit'], [role='button']"))
                    .filter((node) => isVisible(node) && node.getAttribute("aria-disabled") !== "true" && !node.hasAttribute("disabled"));
                  const preferred = candidates.find((node) => {
                    const label = readLabel(node);
                    const isSubmitNode = (node instanceof HTMLButtonElement && node.type === "submit")
                      || (node instanceof HTMLInputElement && node.type === "submit");
                    return isSubmitNode && /continue|next|sign up|create account|submit|verify/i.test(label);
                  }) || candidates.find((node) => /continue|next|sign up|create account|submit|verify/i.test(readLabel(node)));
                  if (preferred instanceof HTMLElement) {
                    preferred.click();
                    return {
                      ok: true,
                      strategy: "form-dom-click",
                      label: readLabel(preferred) || null,
                    };
                  }
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                    return {
                      ok: true,
                      strategy: "form-request-submit",
                      label: null,
                    };
                  }
                  return null;
                });
                return result;
              } catch (error) {
                const message = String(error?.message || error || "");
                if (/Execution context was destroyed|Cannot find context|Target closed|Frame was detached/i.test(message)) {
                  return {
                    ok: true,
                    strategy: "form-dom-click-navigation",
                    label: null,
                  };
                }
                throw error;
              }
            };

            const attempts = [
              async () => clickVisibleContinue(),
              async () => {
                await field.press("Enter").catch(() => {});
                return { strategy: "press-enter", label: null };
              },
              async () => {
                await field.evaluate((input) => {
                  if (input instanceof HTMLElement) {
                    input.blur();
                  }
                  const form = input instanceof Element ? input.closest("form") : null;
                  if (form instanceof HTMLFormElement) {
                    form.requestSubmit();
                  }
                }).catch(() => {});
                return { strategy: "request-submit", label: null };
              },
            ];

            const waitForTransition = async (sameStage, timeoutMs = 6500) => {
              const startedAt = Date.now();
              let latest = await detectStage();
              while (Date.now() - startedAt < timeoutMs) {
                if (allowedStages.has(latest.stage) && latest.stage !== sameStage) {
                  return latest;
                }
                await page.waitForTimeout(500).catch(() => {});
                latest = await detectStage();
              }
              return latest;
            };

            const transitions = [];
            for (const attempt of attempts) {
              const performed = await attempt();
              if (!performed) {
                continue;
              }
              const after = await waitForTransition("signup_email");
              transitions.push({ ...performed, ...after });
              if (allowedStages.has(after.stage) && after.stage !== "signup_email") {
                return {
                  ok: true,
                  strategy: performed.strategy,
                  next_stage: after.stage,
                  current_url: after.current_url,
                  headline: after.headline,
                  transitions,
                };
              }
            }

            const finalState = await detectStage();
            throw new Error("signup-email-submit-stuck:" + String(finalState.stage || "unknown") + ":" + String(finalState.current_url || page.url()));
