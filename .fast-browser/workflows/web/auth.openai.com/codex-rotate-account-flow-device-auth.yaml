  - inspect_prepare_public_chatgpt_entry_after_security_wait:
      if: "${state.steps.wait_after_prepare_public_chatgpt_security_verification?.action?.ok === true && state.steps.wait_after_prepare_public_chatgpt_security_verification?.action?.skipped !== true}"
      metadata:
        description: Re-inspect the ChatGPT entry after waiting through any security-verification interstitial.
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const title = await page.title().catch(() => "");
            const latest = await page.evaluate((titleText) => {
              const normalizeInner = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const buttons = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']"))
                .filter((node) => isVisible(node))
                .map((node) => {
                  if (node instanceof HTMLInputElement) {
                    return normalizeInner(node.value || node.getAttribute("aria-label") || "");
                  }
                  return normalizeInner(node.innerText || node.textContent || node.getAttribute("aria-label") || "");
                })
                .filter(Boolean)
                .slice(0, 20);
              const bodyText = normalizeInner(document.body ? (document.body.innerText || document.body.textContent || "") : "");
              return {
                current_url: location.href,
                title: normalizeInner(titleText || document.title || ""),
                body_text: bodyText,
                visible_buttons: buttons,
              };
            }, title);
            const combinedText = normalize([latest.title, latest.body_text, ...(latest.visible_buttons || [])].join(" "));
            const currentUrl = String(latest.current_url || page.url());
            const chatGptShell = /chatgpt\.com/i.test(currentUrl);
            const logoutUrl = /chatgpt\.com\/auth\/logout/i.test(currentUrl);
            const settingsShell = chatGptShell && /general|notifications|personalization|apps|data controls|security|account/i.test(combinedText);
            const securityOpen = chatGptShell && /secure sign in with chatgpt|trusted devices|enable device code authorization for codex|log out of all devices|multi-factor authentication|security keys & passkeys/i.test(combinedText);
            const composerShell = chatGptShell && /new chat|search chats|chat history|projects|what are you working on|what’s on your mind today|where should we begin|upgrade plan|explore gpts/i.test(combinedText);
            const sessionExpired = chatGptShell && /your session has expired|please log in again to continue using the app/i.test(combinedText);
            const publicShellSignals = chatGptShell && /log in to get smarter responses|get responses tailored to you|see plans and pricing|sign up for free|welcome to chatgpt|get started|where should we begin/i.test(combinedText);
            const loginCtaVisible = (latest.visible_buttons || []).some((label) => /^(log in|sign in)$/i.test(label) || /log in/i.test(label));
            const signupCtaVisible = (latest.visible_buttons || []).some((label) => /^sign up$/i.test(label) || /sign up for free|create account|get started/i.test(label));
            const blankShell = chatGptShell && combinedText.length === 0;
            const securityVerification = /just a moment|enable javascript and cookies to continue|verification successful/i.test(combinedText);
            const accountReady = (securityOpen || settingsShell || composerShell) && !sessionExpired;
            return {
              ok: true,
              current_url: currentUrl,
              headline: latest.body_text.split("\n").map((value) => value.trim()).filter(Boolean)[0] || latest.title || null,
              stage: blankShell
                ? "blank_chatgpt"
                : (securityVerification
                    ? "security_verification"
                    : (accountReady
                    ? "app_shell"
                    : ((logoutUrl || sessionExpired || loginCtaVisible || signupCtaVisible || publicShellSignals)
                        ? "public_chatgpt"
                        : "unknown"))),
              account_ready: accountReady,
              settings_shell: settingsShell,
              security_open: securityOpen,
              security_verification: securityVerification,
              session_expired: sessionExpired,
              login_cta_visible: loginCtaVisible,
              signup_cta_visible: signupCtaVisible,
              logout_url: logoutUrl,
              blank_shell: blankShell,
              visible_buttons: latest.visible_buttons || [],
              body_text_length: latest.body_text.length,
            };
  - dismiss_prepare_chatgpt_onboarding_modal:
      if: "${state.vars.reuse_device_auth_session !== true && state.steps.inspect_prepare_public_chatgpt_entry?.action?.stage === 'app_shell'}"
      metadata:
        description: "Dismiss the ChatGPT onboarding modal before attempting the explicit UI logout path."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const findDismissButton = async () => {
              const candidates = page.locator("button, [role='button'], a");
              const count = await candidates.count().catch(() => 0);
              for (let index = 0; index < count; index += 1) {
                const candidate = candidates.nth(index);
                if (!(await candidate.isVisible().catch(() => false))) {
                  continue;
                }
                const text = normalize(await candidate.innerText().catch(() => ""));
                if (/okay,?\s+let['’]s go/i.test(text)) {
                  return { candidate, text };
                }
              }
              return null;
            };

            let match = await findDismissButton();
            if (!match) {
              return {
                ok: true,
                skipped: true,
                dismissed: false,
                current_url: page.url(),
                error: null,
              };
            }

            await match.candidate.scrollIntoViewIfNeeded().catch(() => {});

            const attempts = [
              async () => match.candidate.click({ timeout: 5000 }),
              async () => match.candidate.click({ timeout: 5000, force: true }),
              async () => match.candidate.press("Enter"),
              async () => page.evaluate(() => {
                const normalizeInner = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const target = Array.from(document.querySelectorAll("button, [role='button'], a"))
                  .find((node) => isVisible(node) && /okay,?\s+let['’]s go/i.test(normalizeInner(node.textContent || "")));
                if (target instanceof HTMLElement) {
                  target.click();
                  return true;
                }
                return false;
              }),
            ];

            let dismissed = false;
            let strategy = null;
            for (const [index, attempt] of attempts.entries()) {
              await attempt().catch(() => {});
              await page.waitForTimeout(1200).catch(() => {});
              match = await findDismissButton();
              if (!match) {
                dismissed = true;
                strategy = index === 0
                  ? "locator-click"
                  : (index === 1
                      ? "locator-force-click"
                      : (index === 2 ? "press-enter" : "dom-click"));
                break;
              }
            }
            return {
              ok: dismissed === true,
              skipped: false,
              dismissed,
              matched_text: match?.text || "Okay, let's go",
              strategy,
              current_url: page.url(),
              error: dismissed ? null : "chatgpt-onboarding-modal-still-visible",
            };
  - cache_prepare_public_entry_before_logout:
      if: "${state.vars.reuse_device_auth_session !== true}"
      metadata:
        description: "Cache the most recent ChatGPT shell inspection before attempting the explicit UI logout path."
      set:
        prepare_public_entry_before_logout: "${state.steps.dismiss_prepare_chatgpt_onboarding_modal?.action?.stage ? state.steps.dismiss_prepare_chatgpt_onboarding_modal?.action : (state.steps.inspect_prepare_public_chatgpt_entry?.action || {})}"
  - open_prepare_chatgpt_security_settings_for_logout:
      if: "${state.vars.reuse_device_auth_session !== true && state.vars.prepare_public_entry_before_logout?.stage === 'app_shell'}"
      metadata:
        description: Open ChatGPT security settings so the current managed session can be logged out before device-auth prepare continues.
      call: afn.driver.browser.navigate
      with:
        body:
          url: https://chatgpt.com/#settings/Security
  - wait_for_prepare_chatgpt_security_settings_shell:
      if: "${state.vars.reuse_device_auth_session !== true && state.steps.open_prepare_chatgpt_security_settings_for_logout?.action?.ok === true && state.steps.open_prepare_chatgpt_security_settings_for_logout?.action?.skipped !== true}"
      metadata:
        description: Wait for the ChatGPT settings shell to render before attempting the prepare-logout control.
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const ok = await page.waitForFunction(() => {
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const dialog = Array.from(document.querySelectorAll("[role='dialog']")).find((node) => isVisible(node));
              const root = dialog || document.body;
              const text = String(root ? (root.innerText || root.textContent || "") : "").replace(/\s+/g, " ").trim().toLowerCase();
              return Boolean(dialog) && /general/.test(text) && /security/.test(text) && /account/.test(text);
            }, { timeout: 10000 }).then(() => true).catch(() => false);
            const title = await page.title().catch(() => "");
            const shell = await page.evaluate(() => {
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const dialog = Array.from(document.querySelectorAll("[role='dialog']")).find((node) => isVisible(node));
              const root = dialog || document.body;
              const text = String(root ? (root.innerText || root.textContent || "") : "").replace(/\s+/g, " ").trim();
              return {
                dialog_visible: Boolean(dialog),
                text,
              };
            }).catch(() => ({ dialog_visible: false, text: "" }));
            const normalizedText = String(shell.text || "").replace(/\s+/g, " ").trim();
            return {
              ok,
              current_url: page.url(),
              headline: normalizedText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
              dialog_visible: shell.dialog_visible === true,
              settings_shell: shell.dialog_visible === true && /general|notifications|apps|data controls|security|account/i.test(normalizedText),
            };
  - logout_prepare_chatgpt_app_shell:
      if: "${state.vars.reuse_device_auth_session !== true && state.vars.prepare_public_entry_before_logout?.stage === 'app_shell' && state.steps.wait_for_prepare_chatgpt_security_settings_shell?.action?.ok === true && state.steps.wait_for_prepare_chatgpt_security_settings_shell?.action?.skipped !== true}"
      metadata:
        description: When the explicit logout URL still lands on an authenticated ChatGPT shell, use the ChatGPT security settings logout control before continuing.
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const result = await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              const labelMatches = (label) => {
