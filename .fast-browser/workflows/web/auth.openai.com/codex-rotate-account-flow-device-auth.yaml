            } else if (rateLimitExceeded) {
              nextAction = "retry_attempt";
              retryReason = "rate_limit";
              errorMessage = "OpenAI rate-limited the device authorization flow.";
            } else if (retryableTimeout) {
              nextAction = "retry_attempt";
              retryReason = "retryable_timeout";
              errorMessage = "OpenAI timed out while advancing the device authorization flow.";
            } else if (toggleConfirmed !== true || toggleResult.ok !== true) {
              errorMessage = "ChatGPT did not expose or enable the Codex device-code authorization toggle before device authorization started.";
            } else if (issuedDeviceChallenge !== true) {
              errorMessage = "Codex device authorization never issued a device URL and code after the ChatGPT security toggle was prepared.";
            } else if (preDeviceSessionConfirmed !== true) {
              errorMessage = "Managed browser session could not be confirmed in ChatGPT before device authorization started.";
            } else if (stateMismatch) {
              errorMessage = "OpenAI returned a state mismatch during Codex device authorization.";
            } else if (emailVerification) {
              errorMessage = "OpenAI remained on email verification instead of advancing to the device authorization surface.";
            } else if (authPrompt) {
              errorMessage = "OpenAI redirected the device-authorization entry back to a login prompt instead of showing the device authorization screen.";
            } else if (deviceCodePrompt) {
              errorMessage = "OpenAI still requires the Codex device code before authorization can complete.";
            } else if (oauthContinueVisible && success !== true) {
              errorMessage = "OpenAI still requires consent before Codex device authorization can complete.";
            } else if (success !== true) {
              errorMessage = "Codex device authorization did not complete.";
            }
            return {
              stage: success ? "success" : (retryReason === "device_auth_rate_limit" ? "device_auth_rate_limit" : (retryReason === "retryable_timeout" ? "retryable_timeout" : "device_authorization_failed")),
              current_url: lastSurface.current_url || inspect.current_url || shell.current_url || null,
              headline: lastSurface.headline || inspect.headline || shell.headline || null,
              callback_complete: callbackComplete || cliCompleted,
              success,
              device_code_prompt: deviceCodePrompt,
              auth_prompt: authPrompt,
              email_verification: emailVerification,
              state_mismatch: stateMismatch,
              retryable_timeout: retryableTimeout,
              rate_limit_exceeded: rateLimitExceeded,
              next_action: nextAction,
              retry_reason: retryReason,
              error_message: success ? null : errorMessage,
              codex_session: {
                auth_url: resolvedAuthUrl,
                callback_url: session.callback_url || null,
                callback_port: session.callback_port ?? null,
                device_code: resolvedDeviceCode,
                session_dir: session.session_dir || null,
                codex_home_path: session.codex_home_path || null,
                auth_file_path: session.auth_file_path || null,
                pid: session.pid ?? null,
                stdout_path: session.stdout_path || null,
                stderr_path: session.stderr_path || null,
                exit_path: session.exit_path || null,
              },
              codex_login_exit_ok: exitResult.ok === true,
              codex_login_exit_code: exitResult.exit_code ?? session.exit_code ?? null,
              codex_login_stdout_tail: exitResult.stdout_tail || session.stdout_tail || null,
              codex_login_stderr_tail: exitResult.stderr_tail || session.stderr_tail || null,
            };
  - finalize_selected_flow:
      metadata:
        description: "Return the merged device-auth outcome when preparation succeeded, otherwise surface the preparation failure."
      run:
        script:
          language: javascript
          code: |
            const prepare =
              state.vars.prepare_flow_output || {};
            const tailAction =
              state.steps.finalize_device_auth_tail_summary?.action || null;
            const tail =
              tailAction && tailAction.skipped !== true
                ? (tailAction.value || null)
                : null;
            const prepareComplete =
              state.vars.prepare_flow_ready === true
              || prepare.account_ready === true
              || prepare.stage === "app_shell";
            const selected = tail || {
              ...(prepare && typeof prepare === "object" ? prepare : {}),
              success: false,
              callback_complete: false,
              codex_login_exit_ok: false,
              codex_login_exit_code: null,
              next_action: prepareComplete ? "fail_terminal" : ((prepare && prepare.next_action) || "fail_terminal"),
              error_message:
                (prepare && prepare.error_message)
                || (prepareComplete
                    ? "Codex device authorization never started after ChatGPT account preparation."
                    : "ChatGPT account preparation did not reach an authenticated session for device authorization."),
            };
            const tailAttempted = Boolean(tail);
            const tailSelected = Boolean(tail);

            return {
              ...(selected && typeof selected === "object" ? selected : {}),
              selected_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-device-auth",
              prepare_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-device-auth",
              prepare_completed: prepareComplete,
              tail_attempted: tailAttempted,
              tail_selected: tailSelected,
              merged_tail: tailSelected,
              selection_strategy:
                "single-device-auth-workflow",
            };
  - teardown_abandoned_codex_login_session:
      if: "${state.steps.finalize_selected_flow?.action?.value?.next_action != 'complete' && (state.steps.finalize_selected_flow?.action?.value?.codex_session?.pid ?? 0) > 0}"
      metadata:
        description: "Terminate the detached device-auth Codex login session when this flow exits without completing."
      run:
        script:
          language: javascript
          code: |
            const pid = Number(
              state.steps.finalize_selected_flow?.action?.value?.codex_session?.pid || 0
            );

            if (!Number.isInteger(pid) || pid <= 0) {
              return {
                ok: true,
                skipped: true,
              };
            }

            const sendSignal = (signal) => {
              try {
                process.kill(-pid, signal);
                return true;
              } catch (error) {
                if (error && typeof error === "object" && error.code === "ESRCH") {
                  return false;
                }
                throw error;
              }
            };

            const terminated = sendSignal("SIGTERM");
            return {
              ok: true,
              pid,
              terminated,
              signal: "SIGTERM",
            };
output:
  as: "${state.steps.finalize_selected_flow?.action?.value || {}}"
