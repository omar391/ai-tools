    replay_captured_auth_url:
      metadata:
        description: "Replay the captured Codex auth URL and tolerate redirect-driven navigation aborts when the browser lands on a real auth or callback page."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const fs = await import("node:fs");
            const stripAnsi = (raw) => String(raw || "").replace(/\u001b\[[0-9;]*m/g, "");
            const extractDeviceChallenge = (raw) => {
              const cleaned = stripAnsi(raw);
              const authMatch = cleaned.match(/https:\/\/auth\.openai\.com\/codex\/device\b[^\s"'<>]*/);
              const codeMatch = cleaned.match(/\b[A-Z0-9]{4}-[A-Z0-9]{5}\b/);
              return {
                auth_url: authMatch ? authMatch[0] : null,
                device_code: codeMatch ? codeMatch[0] : null,
              };
            };
            const readText = (filePath) =>
              (!filePath || !fs.existsSync(filePath)) ? "" : fs.readFileSync(filePath, "utf8");
            const fallbackSession = (() => {
              const stdoutPath = String(
                state.vars?.codex_login?.stdout_path
                || args.codex_login_stdout_path
                || ""
              ).trim();
              const stderrPath = String(
                state.vars?.codex_login?.stderr_path
                || args.codex_login_stderr_path
                || ""
              ).trim();
              const combined = readText(stdoutPath) + "\n" + readText(stderrPath);
              return extractDeviceChallenge(combined);
            })();
            const targetUrl = String(
              args.auth_url
              || state.vars?.codex_login?.auth_url
              || state.steps.capture_codex_login_url?.action?.value?.auth_url
              || fallbackSession.auth_url
              || ""
            ).trim();
            if (!targetUrl) {
              throw new Error("captured-auth-url-missing");
            }
            const priorUrl = page.url();
            const isSuccessfulLanding = (href) => Boolean(href) && /auth\.openai\.com|localhost|127\.0\.0\.1/i.test(href);
            const captureState = async () => ({
              current_url: page.url(),
              title: await page.title().catch(() => null),
            });
            const settleAfterAbort = async (reason) => {
              await page.waitForTimeout(1200).catch(() => {});
              const state = await captureState();
              if (isSuccessfulLanding(state.current_url) && state.current_url !== priorUrl) {
                return { ok: true, strategy: reason, prior_url: priorUrl, ...state };
              }
              return null;
            };
            if (priorUrl && priorUrl !== "about:blank") {
              await page.goto("about:blank", { waitUntil: "domcontentloaded", timeout: 5000 }).catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
            }
            try {
              await page.goto(targetUrl, { waitUntil: "domcontentloaded", timeout: 30000 });
              return { ok: true, strategy: "goto", prior_url: priorUrl, ...(await captureState()) };
            } catch (error) {
              const message = String(error?.message || error || "");
              if (/ERR_ABORTED/i.test(message)) {
                const abortedLanding = await settleAfterAbort("goto-err-aborted");
                if (abortedLanding) {
                  return abortedLanding;
                }
              }
              await page.evaluate((url) => { window.location.assign(url); }, targetUrl).catch(() => {});
              const assignedLanding = await settleAfterAbort("location-assign");
              if (assignedLanding) {
                return assignedLanding;
              }
              throw error;
            }
    ensure_codex_device_auth_enabled:
      metadata:
        description: "Ensure the ChatGPT security setting for Codex device-code authorization is enabled on the authenticated managed profile."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const dismissOnboardingModal = async () => {
              const dismissButton = page.locator("button, [role='button'], a").filter({ hasText: /okay,? let'?s go/i }).first();
              if ((await dismissButton.count().catch(() => 0)) > 0 && (await dismissButton.isVisible().catch(() => false))) {
                await dismissButton.scrollIntoViewIfNeeded().catch(() => {});
                await dismissButton.click({ timeout: 5000 }).catch(() => {});
                await page.waitForTimeout(700).catch(() => {});
                return true;
              }
              return false;
            };
            await dismissOnboardingModal().catch(() => false);
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const targetText = /enable device code authorization for codex/i;
            const supportingText = /device code sign-in|headless|remote environments/i;
            const unrelatedSecurityContent = /secure sign in with chatgpt|trusted devices|log out of this device|log out of all devices|text message|password/i;
            const forceCycleWhenEnabled = args.force_cycle_when_enabled === true;

            const readEnabled = async (locator) => {
              return await locator.evaluate((node) => {
                if (!(node instanceof Element)) {
                  return null;
                }
                if (node instanceof HTMLInputElement && node.type === "checkbox") {
                  return node.checked;
                }
                const ariaChecked = node.getAttribute("aria-checked");
                if (ariaChecked === "true") {
                  return true;
                }
                if (ariaChecked === "false") {
                  return false;
                }
                const ariaPressed = node.getAttribute("aria-pressed");
                if (ariaPressed === "true") {
                  return true;
                }
                if (ariaPressed === "false") {
                  return false;
                }
                const dataState = node.getAttribute("data-state");
                if (dataState === "checked" || dataState === "on" || dataState === "enabled") {
                  return true;
                }
                if (dataState === "unchecked" || dataState === "off" || dataState === "disabled") {
                  return false;
                }
                return null;
              }).catch(() => null);
            };

            const readContextText = async (locator) => {
              return await locator.evaluate((node) => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                let current = node instanceof Element ? node : null;
                for (let depth = 0; current && depth < 8; depth += 1, current = current.parentElement) {
                  const text = normalize(current.innerText || current.textContent || "");
                  if (text && /enable device code authorization for codex/i.test(text)) {
                    return text;
                  }
                }
                return normalize(
                  node instanceof Element
                    ? (node.getAttribute("aria-label") || node.getAttribute("title") || "")
                    : ""
                );
              }).catch(() => "");
            };

            const inspectSecurityPanel = async () => {
              const title = await page.title().catch(() => "");
              const panel = await page.evaluate(() => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const dialog = Array.from(document.querySelectorAll("[role='dialog']")).find((node) => isVisible(node));
                const root = dialog || document.body;
                return {
                  dialog_visible: Boolean(dialog),
                  text: normalize(root ? (root.innerText || root.textContent || "") : ""),
                };
              }).catch(() => ({ dialog_visible: false, text: "" }));
              const normalizedText = normalize(panel.text);
              return {
                current_url: page.url(),
                headline: normalizedText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || title || null,
                dialog_visible: panel.dialog_visible === true,
                security_panel: panel.dialog_visible === true && /secure sign in with chatgpt|trusted devices|enable device code authorization for codex|log out of all devices/i.test(normalizedText),
              };
            };

            const collectToggleCandidates = async () => {
              const dialog = page.locator("[role='dialog']").first();
              const root = ((await dialog.count().catch(() => 0)) > 0 && (await dialog.isVisible().catch(() => false)))
                ? dialog
                : page.locator("body");
              const containers = root.locator("div, section, article, label, li");
              const count = await containers.count().catch(() => 0);
              const matches = [];
              for (let index = 0; index < count; index += 1) {
                const container = containers.nth(index);
                if (!(await container.isVisible().catch(() => false))) {
                  continue;
                }
                const containerText = normalize(await container.innerText().catch(() => ""));
                if (!targetText.test(containerText)) {
                  continue;
                }
                if (!supportingText.test(containerText)) {
                  continue;
                }
                if (containerText.length > 320) {
                  continue;
                }
                const toggles = container.locator("[role='switch'], input[type='checkbox'], button[aria-checked], button[aria-pressed]");
                const toggleCount = await toggles.count().catch(() => 0);
                if (toggleCount === 0) {
                  continue;
                }
                for (let toggleIndex = 0; toggleIndex < toggleCount; toggleIndex += 1) {
                  const toggle = toggles.nth(toggleIndex);
                  if (!(await toggle.isVisible().catch(() => false))) {
                    continue;
                  }
                  const enabled = await readEnabled(toggle);
                  matches.push({
                    container,
                    toggle,
                    enabled,
                    row_text: containerText,
                    toggle_count: toggleCount,
                    score: containerText.length + (toggleIndex * 50),
                  });
                }
              }
              matches.sort((left, right) => left.score - right.score);
              return matches;
            };

            const locateToggleState = async () => {
              const matches = await collectToggleCandidates();
              const best = matches[0] || null;
              if (!best) {
                return {
                  found: false,
                  row_text: null,
                  enabled: null,
                  toggle_count: 0,
                };
              }
              await best.container.scrollIntoViewIfNeeded().catch(() => {});
              await best.toggle.scrollIntoViewIfNeeded().catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
              return {
                found: true,
                row_text: best.row_text || null,
                enabled: best.enabled ?? null,
                toggle_count: best.toggle_count ?? 0,
              };
            };

            const clickToggle = async () => {
              const matches = await collectToggleCandidates();
              const best = matches[0] || null;
              if (!best) {
                return {
                  clicked: false,
                  row_text: null,
                };
              }
              await best.container.scrollIntoViewIfNeeded().catch(() => {});
              await best.toggle.scrollIntoViewIfNeeded().catch(() => {});
              await page.waitForTimeout(250).catch(() => {});
              await best.toggle.click({ force: true, timeout: 5000 }).catch(() => {});
              return {
                clicked: true,
                row_text: best.row_text || null,
              };
            };

            const activateSecurityTab = async () => {
              const candidates = [
                page.getByRole("tab", { name: /^Security$/i }).first(),
                page.getByRole("button", { name: /^Security$/i }).first(),
                page.getByRole("link", { name: /^Security$/i }).first(),
                page.locator("button,a,[role='tab'],[role='button']").filter({ hasText: /^Security$/i }).first(),
              ];
              for (const candidate of candidates) {
                if ((await candidate.count().catch(() => 0)) === 0) {
                  continue;
                }
                if (!(await candidate.isVisible().catch(() => false))) {
                  continue;
                }
                await candidate.scrollIntoViewIfNeeded().catch(() => {});
                await candidate.click().catch(() => {});
                await page.waitForTimeout(700).catch(() => {});
                return true;
              }
              return false;
            };

            const scrollSecurityPanel = async () => {
              await page.evaluate(() => {
                const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
                const unrelatedSecurityContent = /secure sign in with chatgpt|trusted devices|log out of this device|log out of all devices|text message|password|codex cli|disconnect/i;
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const dialog = Array.from(document.querySelectorAll("[role='dialog']")).find((node) => isVisible(node));
                const root = dialog || document.body;
                const target = Array.from(root.querySelectorAll("*"))
                  .map((node) => ({
                    node,
                    text: normalize(node.textContent || ""),
                  }))
                  .filter((entry) =>
                    /enable device code authorization for codex/i.test(entry.text)
                    && /device code sign-in|headless|remote environments/i.test(entry.text)
                    && entry.text.length <= 320
                  )
                  .sort((left, right) => left.text.length - right.text.length)[0];
                if (target?.node instanceof Element) {
                  target.node.scrollIntoView({ block: "center", inline: "nearest" });
                }
              }).catch(() => {});
              await page.waitForTimeout(300).catch(() => {});
              const visibleAfterTargetScroll = await locateToggleState();
              if (visibleAfterTargetScroll?.found === true) {
                return;
              }
              await page.evaluate(() => {
                const isVisible = (node) => {
                  if (!(node instanceof Element)) {
                    return false;
                  }
                  const style = window.getComputedStyle(node);
                  if (!style || style.display === "none" || style.visibility === "hidden") {
                    return false;
                  }
                  const rect = node.getBoundingClientRect();
                  return rect.width > 0 && rect.height > 0;
                };
                const dialog = Array.from(document.querySelectorAll("[role='dialog']")).find((node) => isVisible(node)) || document.body;
                const scrollables = [dialog, ...Array.from(dialog.querySelectorAll("*"))]
                  .filter((node) =>
                    node instanceof HTMLElement
                    && isVisible(node)
                    && node.scrollHeight > node.clientHeight + 40
                  )
                  .sort((left, right) =>
                    (right.scrollHeight - right.clientHeight) - (left.scrollHeight - left.clientHeight)
                  );
                if (scrollables.length > 0) {
                  for (const scrollable of scrollables) {
                    scrollable.scrollTop = scrollable.scrollHeight;
                  }
                  return;
                }
                window.scrollTo(0, document.body.scrollHeight);
              }).catch(() => {});
              const visibleDialog = page.locator("[role='dialog']").first();
              if ((await visibleDialog.count().catch(() => 0)) > 0 && (await visibleDialog.isVisible().catch(() => false))) {
                await visibleDialog.click({ position: { x: 40, y: 40 } }).catch(() => {});
                await visibleDialog.hover().catch(() => {});
                await page.mouse.wheel(0, 2200).catch(() => {});
                await page.keyboard.press("End").catch(() => {});
                await page.keyboard.press("PageDown").catch(() => {});
                await page.keyboard.press("PageDown").catch(() => {});
              }
            };

            const waitForToggle = async () => {
              const deadline = Date.now() + 12000;
              let activatedSecurityTab = false;
              let lastPanel = null;
              while (Date.now() < deadline) {
                await dismissOnboardingModal().catch(() => false);
                lastPanel = await inspectSecurityPanel();
                const toggle = await locateToggleState();
                if (toggle?.found === true) {
                  return {
                    found: true,
                    toggle_found: true,
                    enabled: toggle.enabled,
                    row_text: toggle.row_text,
                    ...lastPanel,
                  };
                }
                if (!activatedSecurityTab && lastPanel.security_panel !== true) {
                  activatedSecurityTab = await activateSecurityTab();
                }
                await scrollSecurityPanel();
                await page.waitForTimeout(500).catch(() => {});
              }
              return {
                found: false,
                toggle_found: false,
                enabled: null,
                row_text: null,
                ...(lastPanel || (await inspectSecurityPanel())),
              };
            };

            let before = await waitForToggle();
            if (!before?.found || !before?.toggle_found) {
              return {
                ok: false,
                error: "device-auth-toggle-not-found",
                found: before?.found === true,
                toggle_found: before?.toggle_found === true,
                enabled: before?.enabled ?? null,
                row_text: before?.row_text || null,
                current_url: before?.current_url || page.url(),
                headline: before?.headline || null,
                security_panel: before?.security_panel === true,
              };
            }
            if (before.enabled === true && forceCycleWhenEnabled !== true) {
              return {
                ok: true,
                changed: false,
                enabled: true,
                row_text: before.row_text || null,
                current_url: before.current_url || page.url(),
                headline: before.headline || null,
                security_panel: before.security_panel === true,
              };
            }

            const toggleAndVerify = async (expectedEnabled) => {
              const clicked = await clickToggle();
              if (clicked?.clicked !== true) {
                return {
                  ok: false,
                  error: "device-auth-toggle-click-failed",
                  enabled: before?.enabled ?? null,
                  row_text: before?.row_text || null,
                  current_url: before?.current_url || page.url(),
                  headline: before?.headline || null,
                  security_panel: before?.security_panel === true,
                };
              }
              await page.waitForTimeout(4000).catch(() => {});
              let result = await waitForToggle();
              if (result?.enabled !== expectedEnabled) {
                await page.goto("https://chatgpt.com/#settings/Security", { waitUntil: "domcontentloaded", timeout: 15000 }).catch(() => {});
                await page.waitForTimeout(1200).catch(() => {});
                result = await waitForToggle();
              }
              return {
                ok: result?.enabled === expectedEnabled,
                result,
              };
            };

            if (before.enabled === true && forceCycleWhenEnabled === true) {
              const disabled = await toggleAndVerify(false);
              if (disabled.ok !== true) {
                return {
                  ok: false,
                  error: "device-auth-toggle-did-not-disable-for-refresh",
                  changed: false,
                  enabled: disabled?.result?.enabled ?? before?.enabled ?? null,
                  row_text: disabled?.result?.row_text || before?.row_text || null,
                  current_url: disabled?.result?.current_url || before?.current_url || page.url(),
                  headline: disabled?.result?.headline || before?.headline || null,
                  security_panel: disabled?.result?.security_panel === true || before?.security_panel === true,
                };
              }
              before = disabled.result;
            }

            const clicked = await clickToggle();
            if (clicked?.clicked !== true) {
              return {
                ok: false,
                error: "device-auth-toggle-click-failed",
                found: true,
                toggle_found: true,
                enabled: before?.enabled ?? null,
                row_text: before?.row_text || null,
                current_url: before?.current_url || page.url(),
                headline: before?.headline || null,
                security_panel: before?.security_panel === true,
              };
            }
            await page.waitForTimeout(4000).catch(() => {});

            let after = await waitForToggle();
            if (after?.enabled !== true) {
              await page.goto("https://chatgpt.com/#settings/Security", { waitUntil: "domcontentloaded", timeout: 15000 }).catch(() => {});
              await page.waitForTimeout(1200).catch(() => {});
              after = await waitForToggle();
            }

            const verifiedEnabled = after?.enabled === true;
            return {
              ok: verifiedEnabled,
              changed: true,
              cycled: forceCycleWhenEnabled === true,
              enabled: verifiedEnabled,
              verification_pending: false,
              row_text: after?.row_text || before?.row_text || null,
              current_url: after?.current_url || page.url(),
              headline: after?.headline || before?.headline || null,
              security_panel: after?.security_panel === true || before?.security_panel === true,
              before: {
                enabled: before?.enabled ?? null,
                row_text: before?.row_text || null,
              },
              after: {
                enabled: after?.enabled ?? null,
                row_text: after?.row_text || null,
              },
              error: verifiedEnabled ? null : "device-auth-toggle-did-not-enable",
            };
do:
  - cache_device_auth_retry_mode:
      metadata:
        description: "Detect whether this run is reusing an already-issued device-auth challenge and should skip the fresh ChatGPT preparation branch."
      set:
        reuse_device_auth_session: "${String(inputs.auth_url || '').trim() !== '' && String(inputs.device_code || '').trim() !== ''}"
  - park_on_blank_before_prepare_logout:
      if: "${state.vars.reuse_device_auth_session !== true}"
      metadata:
        description: "Move the managed page to about:blank before clearing OpenAI site data so the logout navigation does not reuse a live ChatGPT shell."
      call: afn.driver.browser.navigate
      with:
        body:
          url: "about:blank"
  - clear_prepare_device_auth_site_state:
      if: "${state.vars.reuse_device_auth_session !== true && state.steps.park_on_blank_before_prepare_logout?.action?.ok === true && state.steps.park_on_blank_before_prepare_logout?.action?.skipped !== true}"
      metadata:
        description: "Clear ChatGPT/OpenAI site state and visit the explicit ChatGPT logout URL before the target-account prepare flow."
        browser:
          clearSiteDataForOrigins:
            - https://auth.openai.com
            - https://chatgpt.com
            - https://chat.openai.com
