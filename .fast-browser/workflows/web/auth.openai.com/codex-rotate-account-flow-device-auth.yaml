            const deviceCode = explicitDeviceCode || recovered.device_code || null;
            return {
              ok: true,
              reusable_challenge: Boolean(authUrl && deviceCode),
              auth_url: authUrl,
              device_code: deviceCode,
              session_dir: sessionDir,
              codex_home_path: codexHomePath,
              auth_file_path: authFilePath,
              pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
              stdout_path: stdoutPath || null,
              stderr_path: stderrPath || null,
              exit_path: exitPath || null,
            };
  - start_codex_login_session:
      if: "${state.vars.prepare_flow_ready === true && state.vars.reuse_device_auth_session !== true && (state.steps.reconfirm_device_code_authorization_enabled?.action?.enabled === true || state.steps.ensure_device_code_authorization_enabled?.action?.enabled === true) && state.steps.wait_after_device_code_toggle_reconfirm?.action?.ok === true && state.steps.seed_existing_codex_login_session?.action?.value?.reusable_challenge !== true}"
      metadata:
        description: "Start a detached codex device-auth session on the host and capture its stdout/stderr paths."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const path = await import("node:path");
            const { spawn } = await import("node:child_process");
            if (
              state.steps?.reconfirm_device_code_authorization_enabled?.action?.enabled !== true
              && state.steps?.ensure_device_code_authorization_enabled?.action?.enabled !== true
            ) {
              return {
                ok: false,
                started: false,
                error: "device-auth-toggle-not-enabled",
              };
            }
            const shell = process.env.SHELL || "/bin/sh";
            const codexBin = String(args.codex_bin || "codex").trim() || "codex";
            const sessionRoot = path.join(env.projectArtifactsRoot, "codex-login-sessions");
            fs.mkdirSync(sessionRoot, { recursive: true });
            const sessionDir = fs.mkdtempSync(path.join(sessionRoot, String(env.workflowRunStamp || "run") + "-"));
            const codexHomePath = path.join(sessionDir, "codex-home");
            fs.mkdirSync(codexHomePath, { recursive: true });
            const stdoutPath = path.join(sessionDir, "stdout.log");
            const stderrPath = path.join(sessionDir, "stderr.log");
            const exitPath = path.join(sessionDir, "exit.code");
            const authPath = path.join(codexHomePath, "auth.json");
            const quote = (value) => "'" + String(value).replace(/'/g, "'\"'\"'") + "'";
            const command = quote(codexBin) + " login --device-auth >" + quote(stdoutPath) + " 2>" + quote(stderrPath) + "; printf '%s' \"$?\" >" + quote(exitPath);
            const child = spawn(shell, ["-lc", command], {
              cwd: env.workspaceRoot,
              env: {
                ...process.env,
                CODEX_HOME: codexHomePath,
              },
              detached: true,
              stdio: "ignore",
            });
            child.unref();
            return {
              ok: true,
              started: true,
              codex_bin: codexBin,
              session_dir: sessionDir,
              codex_home_path: codexHomePath,
              auth_file_path: authPath,
              pid: child.pid ?? null,
              stdout_path: stdoutPath,
              stderr_path: stderrPath,
              exit_path: exitPath,
            };
  - capture_codex_login_url:
      if: "${state.vars.prepare_flow_ready === true && ((state.vars.reuse_device_auth_session === true) || ((state.steps.reconfirm_device_code_authorization_enabled?.action?.enabled === true || state.steps.ensure_device_code_authorization_enabled?.action?.enabled === true) && state.steps.wait_after_device_code_toggle_reconfirm?.action?.ok === true))}"
      metadata:
        description: "Capture or normalize the Codex device-auth URL and one-time code for this workflow run."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const { setTimeout: delay } = await import("node:timers/promises");
            if (
              state.vars?.reuse_device_auth_session !== true
              && state.steps?.reconfirm_device_code_authorization_enabled?.action?.enabled !== true
              && state.steps?.ensure_device_code_authorization_enabled?.action?.enabled !== true
            ) {
              return {
                ok: false,
                error: "device-auth-toggle-not-enabled",
              };
            }
            const seededSession =
              state.steps?.seed_existing_codex_login_session?.action?.value
              && typeof state.steps.seed_existing_codex_login_session.action.value === "object"
              && !Array.isArray(state.steps.seed_existing_codex_login_session.action.value)
                ? state.steps.seed_existing_codex_login_session.action.value
                : {};
            const explicitAuthUrl = String(args.auth_url || seededSession.auth_url || "").trim();
            const explicitDeviceCode = String(args.device_code || seededSession.device_code || "").trim();
            const stdoutPath = String(args.codex_login_stdout_path || seededSession.stdout_path || state.steps.start_codex_login_session?.action?.value?.stdout_path || "").trim();
            const stderrPath = String(args.codex_login_stderr_path || seededSession.stderr_path || state.steps.start_codex_login_session?.action?.value?.stderr_path || "").trim();
            const exitPath = String(args.codex_login_exit_path || seededSession.exit_path || state.steps.start_codex_login_session?.action?.value?.exit_path || "").trim();
            const sessionDir = String(args.codex_session_dir || seededSession.session_dir || state.steps.start_codex_login_session?.action?.value?.session_dir || "").trim() || null;
            const codexHomePath = String(args.codex_home_path || seededSession.codex_home_path || state.steps.start_codex_login_session?.action?.value?.codex_home_path || "").trim() || null;
            const authFilePath = String(args.codex_auth_file_path || seededSession.auth_file_path || state.steps.start_codex_login_session?.action?.value?.auth_file_path || "").trim() || null;
            const pidValue = Number(args.codex_login_pid || seededSession.pid || state.steps.start_codex_login_session?.action?.value?.pid || 0);
            const stripAnsi = (raw) => String(raw || "").replace(/\u001b\[[0-9;]*m/g, "");
            const extractDeviceChallenge = (raw) => {
              const cleaned = stripAnsi(raw);
              const authMatch = cleaned.match(/https:\/\/auth\.openai\.com\/codex\/device\b[^\s"'<>]*/);
              const codeMatch = cleaned.match(/\b[A-Z0-9]{4}-[A-Z0-9]{5}\b/);
              return { auth_url: authMatch ? authMatch[0] : null, device_code: codeMatch ? codeMatch[0] : null };
            };
            const parseCapture = (authUrl, deviceCode) => {
              if (!authUrl) throw new Error("captured-device-auth-url-missing");
              if (!deviceCode) throw new Error("captured-device-auth-code-missing");
              return { auth_url: authUrl, callback_url: null, callback_port: null, device_code: deviceCode };
            };
            const readText = (filePath) => (!filePath || !fs.existsSync(filePath)) ? "" : fs.readFileSync(filePath, "utf8");
            const tail = (filePath, maxChars = 1200) => {
              const text = readText(filePath);
              return text.length > maxChars ? text.slice(-maxChars) : text;
            };
            if (explicitAuthUrl && explicitDeviceCode) {
              return {
                ok: true,
                reused: true,
                ...parseCapture(explicitAuthUrl, explicitDeviceCode),
                session_dir: sessionDir,
                codex_home_path: codexHomePath,
                auth_file_path: authFilePath,
                pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                stdout_path: stdoutPath || null,
                stderr_path: stderrPath || null,
                exit_path: exitPath || null,
              };
            }
            const timeoutMs = 45000;
            const startedAt = Date.now();
            while (Date.now() - startedAt < timeoutMs) {
              const combined = readText(stdoutPath) + "\n" + readText(stderrPath);
              const challenge = extractDeviceChallenge(combined);
              if (challenge.auth_url && challenge.device_code) {
                return {
                  ok: true,
                  reused: false,
                  ...parseCapture(challenge.auth_url, challenge.device_code),
                  session_dir: sessionDir,
                  codex_home_path: codexHomePath,
                  auth_file_path: authFilePath,
                  pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                  stdout_path: stdoutPath || null,
                  stderr_path: stderrPath || null,
                  exit_path: exitPath || null,
                };
              }
              if (exitPath && fs.existsSync(exitPath)) {
                await delay(400);
                const exitCodeRaw = readText(exitPath).trim();
                const combinedAfterExit = readText(stdoutPath) + "\n" + readText(stderrPath);
                const challengeAfterExit = extractDeviceChallenge(combinedAfterExit);
                const stderrTail = tail(stderrPath) || null;
                const stdoutTail = tail(stdoutPath) || null;
                const combinedTail = String(stderrTail || "") + "\n" + String(stdoutTail || "");
                const deviceAuthRateLimited = /device code request failed with status 429|device auth failed with status 429|429 too many requests/i.test(combinedTail);
                if (challengeAfterExit.auth_url && challengeAfterExit.device_code) {
                  return {
                    ok: true,
                    reused: false,
                    ...parseCapture(challengeAfterExit.auth_url, challengeAfterExit.device_code),
                    issued_before_exit: true,
                    retry_reason: deviceAuthRateLimited ? "device_auth_rate_limit" : null,
                    error_message: deviceAuthRateLimited
                      ? (stderrTail || stdoutTail || "Codex device authorization was rate limited after issuing a device code.")
                      : null,
                    exit_code: exitCodeRaw === "" ? null : Number.parseInt(exitCodeRaw, 10),
                    stdout_tail: stdoutTail,
                    stderr_tail: stderrTail,
                    session_dir: sessionDir,
                    codex_home_path: codexHomePath,
                    auth_file_path: authFilePath,
                    pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                    stdout_path: stdoutPath || null,
                    stderr_path: stderrPath || null,
                    exit_path: exitPath || null,
                  };
                }
                return {
                  ok: false,
                  error: "codex-login-exited-before-auth-url",
                  retry_reason: deviceAuthRateLimited ? "device_auth_rate_limit" : null,
                  error_message: stderrTail || stdoutTail || ("codex login exited before issuing a device authorization URL (exit=" + (exitCodeRaw || "unknown") + ")"),
                  exit_code: exitCodeRaw === "" ? null : Number.parseInt(exitCodeRaw, 10),
                  stdout_tail: stdoutTail,
                  stderr_tail: stderrTail,
                  session_dir: sessionDir,
                  codex_home_path: codexHomePath,
                  auth_file_path: authFilePath,
                  pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
                  stdout_path: stdoutPath || null,
                  stderr_path: stderrPath || null,
                  exit_path: exitPath || null,
                };
              }
              await delay(250);
            }
            return {
              ok: false,
              error: "codex-login-auth-url-timeout",
              retry_reason: null,
              error_message: tail(stderrPath) || tail(stdoutPath) || "codex login did not emit a device authorization URL before timing out",
              session_dir: sessionDir,
              codex_home_path: codexHomePath,
              auth_file_path: authFilePath,
              pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,
              stdout_path: stdoutPath || null,
              stderr_path: stderrPath || null,
              exit_path: exitPath || null,
            };
  - cache_codex_login_session:
      if: "${state.steps.seed_existing_codex_login_session?.action?.ok === true || state.steps.start_codex_login_session?.action?.ok === true || state.steps.capture_codex_login_url?.action?.ok === true || String(inputs.auth_url || '').trim() !== '' || String(inputs.codex_login_stdout_path || '').trim() !== '' || String(inputs.codex_login_stderr_path || '').trim() !== '' || String(inputs.codex_session_dir || '').trim() !== ''}"
      metadata:
        description: "Cache the current Codex login session metadata for later exit handling."
      set:
        codex_login: "${state.steps.capture_codex_login_url?.action?.value || state.steps.seed_existing_codex_login_session?.action?.value || state.steps.start_codex_login_session?.action?.value || { auth_url: String(inputs.auth_url || '').trim() || null, device_code: String(inputs.device_code || '').trim() || null, session_dir: String(inputs.codex_session_dir || '').trim() || null, codex_home_path: String(inputs.codex_home_path || '').trim() || null, auth_file_path: String(inputs.codex_auth_file_path || '').trim() || null, pid: (inputs.codex_login_pid ?? null), stdout_path: String(inputs.codex_login_stdout_path || '').trim() || null, stderr_path: String(inputs.codex_login_stderr_path || '').trim() || null, exit_path: String(inputs.codex_login_exit_path || '').trim() || null }}"
  - restore_codex_login_challenge_from_artifacts:
      if: "${(String(state.vars.codex_login?.auth_url || '').trim() === '' || String(state.vars.codex_login?.device_code || '').trim() === '') && (String(state.vars.codex_login?.stdout_path || inputs.codex_login_stdout_path || '').trim() !== '' || String(state.vars.codex_login?.stderr_path || inputs.codex_login_stderr_path || '').trim() !== '')}"
      metadata:
        description: "Rebuild the saved device-auth URL/code from the detached Codex session logs when retrying a preserved device-auth session."
      run:
        script:
          language: javascript
          code: |
            const fs = await import("node:fs");
            const session = state.vars?.codex_login && typeof state.vars.codex_login === "object" && !Array.isArray(state.vars.codex_login)
              ? { ...state.vars.codex_login }
              : {};
            const stdoutPath = String(session.stdout_path || args.codex_login_stdout_path || "").trim();
            const stderrPath = String(session.stderr_path || args.codex_login_stderr_path || "").trim();
            const stripAnsi = (raw) => String(raw || "").replace(/\u001b\[[0-9;]*m/g, "");
            const readText = (filePath) => (!filePath || !fs.existsSync(filePath)) ? "" : fs.readFileSync(filePath, "utf8");
            const combined = stripAnsi(readText(stdoutPath) + "\n" + readText(stderrPath));
            const authMatch = combined.match(/https:\/\/auth\.openai\.com\/codex\/device\b[^\s"'<>]*/);
            const codeMatch = combined.match(/\b[A-Z0-9]{4}-[A-Z0-9]{5}\b/);
            return {
              ok: Boolean(authMatch?.[0] || session.auth_url || args.auth_url || ""),
              auth_url: String(session.auth_url || args.auth_url || authMatch?.[0] || "").trim() || null,
              device_code: String(session.device_code || args.device_code || codeMatch?.[0] || "").trim() || null,
              session_dir: String(session.session_dir || args.codex_session_dir || "").trim() || null,
              codex_home_path: String(session.codex_home_path || args.codex_home_path || "").trim() || null,
              auth_file_path: String(session.auth_file_path || args.codex_auth_file_path || "").trim() || null,
              pid: session.pid ?? args.codex_login_pid ?? null,
              stdout_path: stdoutPath || null,
              stderr_path: stderrPath || null,
              exit_path: String(session.exit_path || args.codex_login_exit_path || "").trim() || null,
            };
  - merge_restored_codex_login_session:
      if: "${String(state.steps.restore_codex_login_challenge_from_artifacts?.action?.value?.auth_url || '').trim() !== '' && String(state.steps.restore_codex_login_challenge_from_artifacts?.action?.value?.device_code || '').trim() !== ''}"
      metadata:
        description: "Promote the restored detached Codex device-auth session into workflow state."
      set:
        codex_login: "${state.steps.restore_codex_login_challenge_from_artifacts?.action?.value || state.vars.codex_login || {}}"
  - open_device_authorization_entry:
      if: "${state.vars.prepare_flow_ready === true && ((state.vars.reuse_device_auth_session === true) || state.steps.reconfirm_device_code_authorization_enabled?.action?.enabled === true || state.steps.ensure_device_code_authorization_enabled?.action?.enabled === true) && String(state.vars.codex_login?.auth_url || state.steps.capture_codex_login_url?.action?.value?.auth_url || state.steps.restore_codex_login_challenge_from_artifacts?.action?.value?.auth_url || '').trim() !== ''}"
      metadata:
        templateRef: replay_captured_auth_url
        description: "Open the captured Codex device-authorization URL on the already authenticated managed browser profile."
  - stabilize_device_authorization_surface:
      if: "${state.steps.open_device_authorization_entry?.action?.ok === true && state.steps.open_device_authorization_entry?.action?.skipped !== true}"
      metadata:
        templateRef: wait_for_openai_surface_ready
        description: "Wait for the device-authorization surface to render."
  - inspect_device_authorization_surface:
      if: "${state.steps.open_device_authorization_entry?.action?.ok === true && state.steps.open_device_authorization_entry?.action?.skipped !== true}"
      metadata:
        description: "Inspect the device-authorization surface for a code prompt, consent page, success page, or unexpected auth prompt."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const title = await page.title().catch(() => "");
            const bodyText = await page.locator("body").innerText().catch(() => "");
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const normalizedText = normalize(bodyText);
            const firstLine = normalizedText.split("\n").map((value) => value.trim()).filter(Boolean)[0] || null;
            const visibleButtons = await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const isVisible = (node) => {
                if (!(node instanceof Element)) return false;
                if (node.closest("script,style,noscript,template,[hidden],[aria-hidden=\"true\"]")) return false;
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") return false;
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              };
              return Array.from(document.querySelectorAll("button,a,[role=\"button\"],input[type=\"submit\"]"))
                .filter((node) => isVisible(node))
                .map((node) => node instanceof HTMLInputElement ? normalize(node.value || node.getAttribute("aria-label") || "") : normalize(node.innerText || node.textContent || node.getAttribute("aria-label") || ""))
                .filter(Boolean)
                .slice(0, 16);
            }).catch(() => []);
            const verificationInput = await page.locator("input[name*=\"code\" i], input[autocomplete=\"one-time-code\"], input[aria-label*=\"code\" i], input[placeholder*=\"code\" i], input[inputmode=\"numeric\"]").count().catch(() => 0) > 0;
            const emailInput = await page.locator("input[type=\"email\"], input[name=\"email\"], input[autocomplete=\"email\"], input[autocomplete=\"username\"]").count().catch(() => 0) > 0;
            const passwordInput = await page.locator("input[type=\"password\"], input[name=\"password\"], input[autocomplete=\"current-password\"]").count().catch(() => 0) > 0;
            const surfaceText = String(title || "") + "\n" + normalizedText;
            let host = "";
            let path = "";
            try {
              const parsed = new URL(page.url());
              host = parsed.hostname;
              path = parsed.pathname;
            } catch {}
            const deviceCodePrompt = verificationInput && /device code|one-time code|authorization code|enter (?:the |your )?(?:\d+-character )?code|code displayed in your terminal/i.test(surfaceText);
            const stateMismatch = /state mismatch/i.test(title) || /state mismatch/i.test(normalizedText);
            const sawOauthConsent = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|link your account/i.test(normalizedText) || /sign in to codex/i.test(title);
            const deviceAuthDisabled = /enable device code authorization for codex in chatgpt security settings/i.test(normalizedText);
            const oauthContinueVisible = sawOauthConsent && visibleButtons.some((text) => /continue to codex|continue to openai|authorize|allow|accept/i.test(text) || /^continue$/i.test(text));
            const success = /you can close this window|successfully logged in|signed in|device authorized|authorization complete/i.test(normalizedText) || /close this window/i.test(title);
            const chatGptHost = /(?:^|\.)chatgpt\.com$/i.test(host);
            const appShell = chatGptHost && !/^\/auth\//i.test(path) && /\bnew chat\b|\bsearch chats\b|\bimages\b|\bapps\b|\bprojects\b|\bdeep research\b|\bcodex\b|what['’]s on your mind today\?|ask anything/i.test(normalizedText);
            const securityShell = chatGptHost && !/^\/auth\//i.test(path) && /secure sign in with chatgpt|trusted devices|enable device code authorization for codex|log out of all devices|multi-factor authentication|security keys & passkeys/i.test(normalizedText);
            const publicShell = chatGptHost && !appShell && !securityShell && !emailInput && !passwordInput && !verificationInput && /log in to get smarter responses|log in|sign up for free|welcome to chatgpt|get started/i.test(normalizedText);
            const authPrompt = !chatGptHost && (emailInput || passwordInput || /welcome back|log in|enter your password|check your inbox/i.test(normalizedText));
            return {
              ok: true,
              current_url: page.url(),
              headline: firstLine || title || null,
              device_code_prompt: deviceCodePrompt,
              saw_oauth_consent: sawOauthConsent,
              device_auth_disabled: deviceAuthDisabled,
              oauth_continue_visible: oauthContinueVisible,
              success,
              state_mismatch: stateMismatch,
              chatgpt_app_shell: appShell || securityShell,
              chatgpt_public_shell: publicShell,
              auth_prompt: authPrompt,
            };
  - advance_device_authorization_login:
      if: "${state.steps.inspect_device_authorization_surface?.action?.ok === true && state.steps.inspect_device_authorization_surface?.action?.skipped !== true && state.steps.inspect_device_authorization_surface?.action?.auth_prompt === true}"
