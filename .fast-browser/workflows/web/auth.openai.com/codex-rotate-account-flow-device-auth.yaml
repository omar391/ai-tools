      if: "${(state.steps.classify_device_auth_login_entry_after_auth_landing?.action?.skipped === true || !state.steps.classify_device_auth_login_entry_after_auth_landing?.action?.stage) && state.steps.classify_device_auth_login_entry?.action?.stage === 'unknown'}"
      metadata:
        description: Give the initial device-auth login shell a moment to finish rendering when the first classification returns unknown.
      wait:
