document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow-main
  version: 1.1.0
  summary: "Single active codex-rotate OpenAI auth flow pinned to the hardened unified control path."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        mode:
          default: codex_login
        codex_bin:
          default: codex
        auth_url: {}
        callback_url: {}
        callback_port: {}
        device_code: {}
        codex_session_dir: {}
        codex_home_path: {}
        codex_auth_file_path: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        email: {}
        account_login_ref:
          type: object
          format: secret-ref
        account_login_locator:
          type: object
          format: secret-locator
        prefer_password_login:
          default: "true"
        password: {}
        full_name:
          default: "Dev Astronlab"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - email
do:
  - run_active_unified_flow:
      metadata:
        description: "Run the single active unified OpenAI auth flow."
      call: workflow.workspace.web.auth-openai-com.codex-rotate-account-flow-unified
      with:
        version: 1.1.0
        input:
          enabled: "${inputs.enabled}"
          mode: "codex_login"
          codex_bin: "${inputs.codex_bin}"
          auth_url: "${inputs.auth_url}"
          callback_url: "${inputs.callback_url}"
          callback_port: "${inputs.callback_port}"
          device_code: "${inputs.device_code}"
          codex_session_dir: "${inputs.codex_session_dir}"
          codex_home_path: "${inputs.codex_home_path}"
          codex_auth_file_path: "${inputs.codex_auth_file_path}"
          codex_login_pid: "${inputs.codex_login_pid}"
          codex_login_stdout_path: "${inputs.codex_login_stdout_path}"
          codex_login_stderr_path: "${inputs.codex_login_stderr_path}"
          codex_login_exit_path: "${inputs.codex_login_exit_path}"
          email: "${inputs.email}"
          account_login_ref: "${inputs.account_login_ref}"
          account_login_locator: "${inputs.account_login_locator}"
          prefer_password_login: "${inputs.prefer_password_login}"
          password: "${inputs.password}"
          full_name: "${inputs.full_name}"
          birth_month: "${inputs.birth_month}"
          birth_day: "${inputs.birth_day}"
          birth_year: "${inputs.birth_year}"
          prefer_signup_recovery: "${inputs.prefer_signup_recovery}"
  - finalize_selected_flow:
      metadata:
        description: "Return the single active unified flow outcome."
      run:
        script:
          language: javascript
          code: |
            const selected =
              state.steps.run_active_unified_flow?.action?.result?.output || {};

            return {
              ...(selected && typeof selected === "object" ? selected : {}),
              selected_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-unified",
              primary_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow-unified",
              fallback_flow: null,
              fallback_attempted: false,
              fallback_selected: false,
              selection_strategy: "single-unified-flow",
            };
output:
  as: "${state.steps.finalize_selected_flow?.action?.value || {}}"
