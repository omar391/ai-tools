document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow-main
  version: 1.0.10
  summary: "Pinned codex-rotate OpenAI account flow that routes create/login through the current original non-device path."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        mode:
          default: codex_login
        codex_bin:
          default: codex
        auth_url: {}
        device_code: {}
        callback_url: {}
        callback_port: {}
        codex_session_dir: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        email: {}
        account_login_locator:
          type: object
          format: secret-locator
        full_name:
          default: "Dev Astronlab"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - email
do:
  - run_primary_flow:
      metadata:
        description: "Run the current pinned original non-device OpenAI account flow."
      call: workflow.workspace.web.auth-openai-com.codex-rotate-account-flow
      with:
        version: 1.0.7
        input:
          enabled: "${inputs.enabled}"
          mode: "codex_login"
          codex_bin: "${inputs.codex_bin}"
          auth_url: "${inputs.auth_url}"
          callback_url: "${inputs.callback_url}"
          callback_port: "${inputs.callback_port}"
          codex_session_dir: "${inputs.codex_session_dir}"
          codex_login_pid: "${inputs.codex_login_pid}"
          codex_login_stdout_path: "${inputs.codex_login_stdout_path}"
          codex_login_stderr_path: "${inputs.codex_login_stderr_path}"
          codex_login_exit_path: "${inputs.codex_login_exit_path}"
          email: "${inputs.email}"
          account_login_locator: "${inputs.account_login_locator}"
          full_name: "${inputs.full_name}"
          birth_month: "${inputs.birth_month}"
          birth_day: "${inputs.birth_day}"
          birth_year: "${inputs.birth_year}"
          prefer_signup_recovery: "${inputs.prefer_signup_recovery}"
  - finalize_selected_flow:
      metadata:
        description: "Return the pinned original flow outcome."
      run:
        script:
          language: javascript
          code: |
            return {
              ...(state.steps.run_primary_flow?.action?.result?.output || {}),
              selected_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow",
              primary_flow:
                "workspace.web.auth-openai-com.codex-rotate-account-flow",
              primary_completed:
                state.steps.run_primary_flow?.action?.result?.output?.success === true
                || state.steps.run_primary_flow?.action?.result?.output?.next_action === "complete",
              primary_skipped_by_policy:
                state.steps.run_primary_flow?.action?.result?.output?.next_action === "skip_account",
              fallback_attempted: false,
              fallback_selected: false,
              selection_strategy: "pinned-original-only",
            };
output:
  as: "${state.steps.finalize_selected_flow?.action?.value || {}}"
