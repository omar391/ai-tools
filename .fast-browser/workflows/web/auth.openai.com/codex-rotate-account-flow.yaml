          language: javascript
          code: "const final = state.steps.complete_login_or_consent?.action || {};\nconst signupGate = state.steps.classify_after_signup_password_gate?.action || {};\nconst signupAfter = state.steps.classify_after_signup_password?.action || {};\nconst signupComplete = state.steps.classify_signup_complete?.action || {};\nconst exitResult = state.steps.wait_for_codex_login_exit?.action?.value || {};\nconst session = state.vars?.codex_login && typeof state.vars.codex_login === \"object\" && !Array.isArray(state.vars.codex_login)\n  ? state.vars.codex_login\n  : {};\n\nconst stage = final.stage || signupGate.stage || signupAfter.stage || signupComplete.stage || null;\nconst currentUrl = final.current_url || signupGate.current_url || signupAfter.current_url || signupComplete.current_url || null;\nconst headline = final.headline || signupGate.headline || signupAfter.headline || signupComplete.headline || null;\n\nconst callbackComplete = final.callback_complete === true;\nconst success = final.success === true;\nconst accountReady = final.account_ready === true;\nconst needsEmailVerification = final.needs_email_verification === true || stage === \"email_verification\";\nconst followUpStep = final.follow_up_step === true || stage === \"about_you\";\nconst addPhonePrompt = final.add_phone_prompt === true || stage === \"add_phone\" || signupComplete.stage === \"add_phone\";\nconst retryableTimeout = final.retryable_timeout === true || stage === \"retryable_timeout\";\nconst sessionEnded = final.session_ended === true || stage === \"session_ended\";\nconst existingAccountPrompt = final.existing_account_prompt === true\n  || signupGate.existing_account_prompt === true\n  || signupAfter.existing_account_prompt === true\n  || stage === \"existing_account_prompt\";\nconst usernameNotFound = final.username_not_found === true;\nconst invalidCredentials = final.invalid_credentials === true || stage === \"invalid_credentials\";\nconst rateLimitExceeded = final.rate_limit_exceeded === true || stage === \"rate_limit\";\nconst antiBotGate = final.anti_bot_gate === true\n  || state.steps.classify_before_consent?.action?.anti_bot_gate === true\n  || state.steps.classify_after_oauth_consent?.action?.anti_bot_gate === true;\nconst authPrompt = final.auth_prompt === true\n  || stage === \"auth_prompt\"\n  || stage === \"login_email\"\n  || stage === \"login_password\"\n  || stage === \"signup_email\"\n  || stage === \"signup_password\";\n\nlet nextAction = \"fail_terminal\";\nlet replayReason = null;\nlet retryReason = null;\nlet errorMessage = null;\nif (callbackComplete || success) {\n  nextAction = \"complete\";\n} else if (invalidCredentials) {\n  nextAction = \"fail_invalid_credentials\";\n  errorMessage = \"OpenAI rejected the stored password for \" + String(args.email || \"the account\") + \".\";\n} else if (rateLimitExceeded || retryableTimeout) {\n  nextAction = \"retry_attempt\";\n  retryReason = rateLimitExceeded ? \"rate_limit\" : \"retryable_timeout\";\n  errorMessage = rateLimitExceeded\n    ? \"OpenAI rate-limited the Codex login.\"\n    : \"OpenAI timed out before completing the Codex login.\";\n} else if (needsEmailVerification || followUpStep || addPhonePrompt || authPrompt) {\n  nextAction = \"replay_auth_url\";\n  replayReason = addPhonePrompt\n    ? \"add_phone\"\n    : (needsEmailVerification\n        ? \"email_verification\"\n        : (followUpStep ? \"about_you\" : \"auth_prompt\"));\n  errorMessage = addPhonePrompt\n    ? \"OpenAI still requires phone setup before the Codex callback can complete.\"\n    : (needsEmailVerification\n        ? \"OpenAI still requires email verification before the Codex callback can complete.\"\n        : (followUpStep\n            ? \"OpenAI still requires account setup before the Codex callback can complete.\"\n            : \"OpenAI remained on an auth prompt instead of reaching the Codex callback.\"));\n} else if (existingAccountPrompt) {\n  nextAction = \"replay_auth_url\";\n  replayReason = \"existing_account_prompt\";\n  errorMessage = \"OpenAI redirected signup into an existing-account prompt instead of completing the Codex callback.\";\n} else if (usernameNotFound) {\n  nextAction = \"fail_terminal\";\n  errorMessage = \"OpenAI reported that the username was not found during recovery.\";\n} else if (sessionEnded) {\n  nextAction = \"retry_attempt\";\n  retryReason = \"session_ended\";\n  errorMessage = \"OpenAI ended the auth session before the Codex callback completed.\";\n} else if (antiBotGate) {\n  nextAction = \"retry_attempt\";\n  retryReason = \"anti_bot_gate\";\n  errorMessage = \"OpenAI remained behind a security gate before the Codex callback completed.\";\n} else {\n  errorMessage = \"Codex browser login did not reach the callback.\";\n}\n\nreturn {\n  stage,\n  current_url: currentUrl,\n  headline,\n  callback_complete: callbackComplete,\n  success,\n  account_ready: accountReady,\n  needs_email_verification: needsEmailVerification,\n  follow_up_step: followUpStep,\n  add_phone_prompt: addPhonePrompt,\n  retryable_timeout: retryableTimeout,\n  session_ended: sessionEnded,\n  existing_account_prompt: existingAccountPrompt,\n  username_not_found: usernameNotFound,\n  invalid_credentials: invalidCredentials,\n  rate_limit_exceeded: rateLimitExceeded,\n  anti_bot_gate: antiBotGate,\n  auth_prompt: authPrompt,\n  next_action: nextAction,\n  replay_reason: replayReason,\n  retry_reason: retryReason,\n  error_message: errorMessage,\n  codex_session: {\n    auth_url: session.auth_url || null,\n    callback_url: session.callback_url || null,\n    callback_port: session.callback_port ?? null,\n    session_dir: session.session_dir || null,\n    pid: session.pid ?? null,\n    stdout_path: session.stdout_path || null,\n    stderr_path: session.stderr_path || null,\n    exit_path: session.exit_path || null,\n  },\n  codex_login_exit_ok: exitResult.ok === true,\n  codex_login_exit_code: exitResult.exit_code ?? null,\n  codex_login_stdout_tail: exitResult.stdout_tail || null,\n  codex_login_stderr_tail: exitResult.stderr_tail || null,\n};\n"
