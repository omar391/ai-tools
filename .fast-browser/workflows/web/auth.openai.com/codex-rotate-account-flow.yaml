Input) {\n    stage = \"auth_prompt\";\n  }\n  return {\n    stage,\n    current_url: location.href,\n    headline: bodyText.split(\"\\n\").map((value) => value.trim()).filter(Boolean)[0] || title || null,\n  };\n});\n\nconst fieldSelectors = [\n  'input[name=\"name\"]',\n  'input[name*=\"name\" i]',\n  'input[autocomplete=\"name\"]',\n  'input[placeholder*=\"name\" i]',\n  'select[name*=\"month\" i]',\n  'select[name*=\"day\" i]',\n  'select[name*=\"year\" i]',\n  'select',\n];\nlet field = null;\nfor (const selector of fieldSelectors) {\n  const candidate = page.locator(selector).first();\n  if (!(await candidate.count().catch(() => 0))) {\n    continue;\n  }\n  if (!(await candidate.isVisible().catch(() => false))) {\n    continue;\n  }\n  field = candidate;\n  break;\n}\nif (!field) {\n  throw new Error(\"about-you-submit-fields-not-found\");\n}\n\nconst allowedStages = new Set([\n  \"add_phone\",\n  \"oauth_consent\",\n  \"email_verification\",\n  \"security_verification\",\n  \"retryable_timeout\",\n  \"rate_limit\",\n  \"session_ended\",\n  \"callback_complete\",\n]);\n\nconst clickVisibleContinue = async () => {\n  const result = await field.evaluate((node) => {\n    const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n    const isVisible = (candidate) => {\n      if (!(candidate instanceof Element)) {\n        return false;\n      }\n      const style = window.getComputedStyle(candidate);\n      if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n        return false;\n      }\n      const rect = candidate.getBoundingClientRect();\n      return rect.width > 0 && rect.height > 0;\n    };\n    const readLabel = (candidate) => {\n      if (!(candidate instanceof Element)) {\n        return \"\";\n      }\n      if (candidate instanceof HTMLInputElement) {\n        return normalize(candidate.value || candidate.getAttribute(\"aria-label\") || \"\");\n      }\n      return normalize(candidate.innerText || candidate.textContent || candidate.getAttribute(\"aria-label\") || \"\");\n    };\n    const form = node instanceof Element ? node.closest(\"form\") : null;\n    const scope = form || document;\n    const candidates = Array.from(scope.querySelectorAll(\"button, input[type='submit'], [role='button']\"))\n      .filter((candidate) => isVisible(candidate) && candidate.getAttribute(\"aria-disabled\") !== \"true\" && !candidate.hasAttribute(\"disabled\"));\n    const preferred = candidates.find((candidate) => {\n      const label = readLabel(candidate);\n      const isSubmitNode = (candidate instanceof HTMLButtonElement && candidate.type === \"submit\")\n        || (candidate instanceof HTMLInputElement && candidate.type === \"submit\");\n      return isSubmitNode && /continue|next|finish creating account|submit|verify|allow|authorize|accept/i.test(label);\n    }) || candidates.find((candidate) => /continue|next|finish creating account|submit|verify|allow|authorize|accept/i.test(readLabel(candidate)));\n    if (preferred instanceof HTMLElement) {\n      preferred.click();\n      return {\n        ok: true,\n        strategy: \"form-dom-click\",\n        label: readLabel(preferred) || null,\n      };\n    }\n    if (form instanceof HTMLFormElement) {\n      form.requestSubmit();\n      return {\n        ok: true,\n        strategy: \"form-request-submit\",\n        label: null,\n      };\n    }\n    return null;\n  }).catch(() => null);\n  return result;\n};\n\nconst attempts = [\n  async () => clickVisibleContinue(),\n  async () => {\n    await field.press(\"Enter\").catch(() => {});\n    return { strategy: \"press-enter\", label: null };\n  },\n  async () => {\n    await field.evaluate((node) => {\n      if (node instanceof HTMLElement) {\n        node.blur();\n      }\n      const form = node instanceof Element ? node.closest(\"form\") : null;\n      if (form instanceof HTMLFormElement) {\n        form.requestSubmit();\n      }\n    }).catch(() => {});\n    return { strategy: \"request-submit\", label: null };\n  },\n];\n\nconst waitForTransition = async (sameStage, timeoutMs = 8000) => {\n  const startedAt = Date.now();\n  let latest = await detectStage();\n  while (Date.now() - startedAt < timeoutMs) {\n    if (allowedStages.has(latest.stage) && latest.stage !== sameStage) {\n      return latest;\n    }\n    await page.waitForTimeout(500).catch(() => {});\n    latest = await detectStage();\n  }\n  return latest;\n};\n\nconst transitions = [];\nfor (const attempt of attempts) {\n  const performed = await attempt();\n  if (!performed) {\n    continue;\n  }\n  const after = await waitForTransition(\"about_you\");\n  transitions.push({ ...performed, ...after });\n  if (allowedStages.has(after.stage) && after.stage !== \"about_you\") {\n    return {\n      ok: true,\n      strategy: performed.strategy,\n      next_stage: after.stage,\n      current_url: after.current_url,\n      headline: after.headline,\n      transitions,\n    };\n  }\n}\n\nconst finalState = await detectStage();\nthrow new Error(\"about-you-submit-stuck:\" + String(finalState.stage || \"unknown\") + \":\" + String(finalState.current_url || page.url()));\n"
do:
  - start_codex_login_session:
      if: "${String(inputs.mode || 'codex_login') === 'codex_login' && !String(inputs.auth_url || '').trim()}"
      metadata:
        description: "Start a detached codex login session on the host and capture its stdout/stderr paths."
      run:
        script:
          language: javascript
          code: "const fs = await import(\"node:fs\");\nconst path = await import(\"node:path\");\nconst { spawn } = await import(\"node:child_process\");\n\nconst shell = process.env.SHELL || \"/bin/sh\";\nconst codexBin = String(args.codex_bin || \"codex\").trim() || \"codex\";\nconst sessionRoot = path.join(env.projectArtifactsRoot, \"codex-login-sessions\");\nfs.mkdirSync(sessionRoot, { recursive: true });\nconst sessionDir = fs.mkdtempSync(path.join(sessionRoot, String(env.workflowRunStamp || \"run\") + \"-\"));\nconst stdoutPath = path.join(sessionDir, \"stdout.log\");\nconst stderrPath = path.join(sessionDir, \"stderr.log\");\nconst exitPath = path.join(sessionDir, \"exit.code\");\nconst quote = (value) => \"'\" + String(value).replace(/'/g, \"'\\\"'\\\"'\") + \"'\";\nconst command = quote(codexBin)\n  + \" login >\"\n  + quote(stdoutPath)\n  + \" 2>\"\n  + quote(stderrPath)\n  + \"; printf '%s' \\\"$?\\\" >\"\n  + quote(exitPath);\n\nconst child = spawn(shell, [\"-lc\", command], {\n  cwd: env.workspaceRoot,\n  env: process.env,\n  detached: true,\n  stdio: \"ignore\",\n});\nchild.unref();\n\nreturn {\n  ok: true,\n  started: true,\n  codex_bin: codexBin,\n  session_dir: sessionDir,\n  pid: child.pid ?? null,\n  stdout_path: stdoutPath,\n  stderr_path: stderrPath,\n  exit_path: exitPath,\n};\n"
  - capture_codex_login_url:
      if: "${String(inputs.mode || 'codex_login') === 'codex_login'}"
      metadata:
        description: "Capture or normalize the Codex auth URL and callback session details for this workflow run."
      run:
        script:
          language: javascript
          code: "const fs = await import(\"node:fs\");\nconst { setTimeout: delay } = await import(\"node:timers/promises\");\n\nconst explicitAuthUrl = String(args.auth_url || \"\").trim();\nconst stdoutPath = String(\n  args.codex_login_stdout_path\n  || state.steps.start_codex_login_session?.action?.value?.stdout_path\n  || \"\"\n).trim();\nconst stderrPath = String(\n  args.codex_login_stderr_path\n  || state.steps.start_codex_login_session?.action?.value?.stderr_path\n  || \"\"\n).trim();\nconst exitPath = String(\n  args.codex_login_exit_path\n  || state.steps.start_codex_login_session?.action?.value?.exit_path\n  || \"\"\n).trim();\nconst sessionDir = String(\n  args.codex_session_dir\n  || state.steps.start_codex_login_session?.action?.value?.session_dir\n  || \"\"\n).trim() || null;\nconst pidValue = Number(\n  args.codex_login_pid\n  || state.steps.start_codex_login_session?.action?.value?.pid\n  || 0\n);\n\nconst extractAuthUrl = (raw) => {\n  const match = String(raw || \"\").match(/https:\\/\\/auth\\.openai\\.com\\/oauth\\/authorize\\?[^\\s\"'<>]+/);\n  return match ? match[0] : null;\n};\nconst parseCapture = (authUrl) => {\n  const parsedAuthUrl = new URL(authUrl);\n  const callbackUrl = parsedAuthUrl.searchParams.get(\"redirect_uri\") || \"\";\n  if (!callbackUrl) {\n    throw new Error(\"captured-auth-url-missing-redirect-uri\");\n  }\n  const callbackPort = Number.parseInt(new URL(callbackUrl).port, 10);\n  if (!Number.isInteger(callbackPort)) {\n    throw new Error(\"captured-auth-url-invalid-callback-port:\" + callbackUrl);\n  }\n  return {\n    auth_url: authUrl,\n    callback_url: callbackUrl,\n    callback_port: callbackPort,\n  };\n};\nconst readText = (filePath) => {\n  if (!filePath || !fs.existsSync(filePath)) {\n    return \"\";\n  }\n  return fs.readFileSync(filePath, \"utf8\");\n};\nconst tail = (filePath, maxChars = 1200) => {\n  const text = readText(filePath);\n  return text.length > maxChars ? text.slice(-maxChars) : text;\n};\n\nif (explicitAuthUrl) {\n  return {\n    ok: true,\n    reused: true,\n    ...parseCapture(explicitAuthUrl),\n    session_dir: sessionDir,\n    pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,\n    stdout_path: stdoutPath || null,\n    stderr_path: stderrPath || null,\n    exit_path: exitPath || null,\n  };\n}\n\nconst timeoutMs = 45000;\nconst startedAt = Date.now();\nwhile (Date.now() - startedAt < timeoutMs) {\n  const combined = readText(stdoutPath) + \"\\n\" + readText(stderrPath);\n  const authUrl = extractAuthUrl(combined);\n  if (authUrl) {\n    return {\n      ok: true,\n      reused: false,\n      ...parseCapture(authUrl),\n      session_dir: sessionDir,\n      pid: Number.isInteger(pidValue) && pidValue > 0 ? pidValue : null,\n      stdout_path: stdoutPath || null,\n      stderr_path: stderrPath || null,\n      exit_path: exitPath || null,\n    };\n  }\n  if (exitPath && fs.existsSync(exitPath)) {\n    const exitCodeRaw = readText(exitPath).trim();\n    throw new Error(\"codex-login-exited-before-auth-url:\" + (exitCodeRaw || \"unknown\") + \":\" + (tail(stderrPath) || tail(stdoutPath) || \"no-output\"));\n  }\n  await delay(250);\n}\n\nthrow new Error(\"codex-login-auth-url-timeout:\" + (tail(stderrPath) || tail(stdoutPath) || \"no-output\"));\n"
  - cache_codex_login_session:
      if: "${state.steps.capture_codex_login_url?.action?.ok === true}"
      metadata:
        description: "Cache the current Codex login session metadata for later replay and exit handling."
      set:
        codex_login: "${state.steps.capture_codex_login_url?.action?.value || {}}"
  - open_codex_login_entry:
      metadata:
        templateRef: replay_captured_auth_url
        description: "Open the captured Codex auth URL on the managed browser profile."
        browser:
          clearSiteDataForOrigins:
            - "https://auth.openai.com"
            - "https://chatgpt.com"
  - stabilize_entry_surface:
      metadata:
        templateRef: wait_for_openai_surface_ready
        description: "Wait for the initial managed Codex auth page to render before classifying it."
  - classify_entry_state:
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the initial managed Codex auth landing page."
  - clear_entry_security_gate:
      if: "${state.steps.classify_entry_state?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any initial OpenAI or Cloudflare security gate on the managed auth entry."
  - classify_entry_ready:
      metadata:
        templateRef: classify_openai_surface
        description: "Refresh the entry state after any initial security gate handling."
  - choose_signup_branch:
      if: "${state.steps.classify_entry_ready?.action?.stage === 'login_email' && state.steps.classify_entry_ready?.action?.signup_cta_visible === true && String(inputs.prefer_signup_recovery ?? 'true') !== 'false'}"
      metadata:
        templateRef: click_signup_button
        description: "Switch from the login shell to the signup page."
  - classify_after_choose_signup:
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after selecting signup."
  - fill_signup_email:
      if: "${state.steps.classify_after_choose_signup?.action?.stage === 'signup_email'}"
      metadata:
        templateRef: fill_openai_email_field
        description: "Fill the new account email on the signup page."
        browser:
          validation:
            pre:
              kind: playwright
              op: exists
              selector: 'input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]'
            post:
              kind: js
              expression: "const fields = Array.from(document.querySelectorAll('input[type=\"email\"], input[name=\"email\"], input[autocomplete=\"email\"], input[autocomplete=\"username\"]'));\nconst values = fields.map((field) => field.value || '');\nreturn {\n  ok: values.some((value) => value === String(args.email || '')),\n  values,\n};\n"
  - submit_signup_email:
      if: "${state.steps.classify_after_choose_signup?.action?.stage === 'signup_email' && state.steps.fill_signup_email?.action?.ok === true}"
      metadata:
        templateRef: submit_signup_email_form
        description: "Submit the signup email step."
  - wait_after_signup_email_submit:
      if: "${state.steps.submit_signup_email?.action?.ok === true && state.steps.submit_signup_email?.action?.skipped !== true}"
      metadata:
        description: "Allow the OpenAI signup email submission to settle before classifying the next page."
      wait:
        milliseconds: 900
  - classify_after_signup_email:
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after submitting the signup email."
  - click_signup_email_timeout_retry:
      if: "${state.steps.classify_after_signup_email?.action?.retryable_timeout === true}"
      metadata:
        templateRef: click_retryable_try_again
        description: "Retry the signup email step when OpenAI shows a retryable timeout page."
  - wait_after_signup_email_timeout_retry:
      if: "${state.steps.click_signup_email_timeout_retry?.action?.ok === true && state.steps.click_signup_email_timeout_retry?.action?.skipped !== true}"
      metadata:
        description: "Allow the retryable timeout retry to return to the signup email page."
      wait:
        milliseconds: 900
  - classify_after_signup_email_timeout_retry:
      if: "${state.steps.click_signup_email_timeout_retry?.action?.ok === true && state.steps.click_signup_email_timeout_retry?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after clicking Try again from the signup timeout state."
  - fill_signup_email_after_timeout_retry:
      if: "${state.steps.classify_after_signup_email_timeout_retry?.action?.stage === 'signup_email'}"
      metadata:
        templateRef: fill_openai_email_field
        description: "Refill the new account email after a retryable signup timeout resets the form."
        browser:
          validation:
            pre:
              kind: playwright
              op: exists
              selector: 'input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]'
            post:
              kind: js
              expression: "const fields = Array.from(document.querySelectorAll('input[type=\"email\"], input[name=\"email\"], input[autocomplete=\"email\"], input[autocomplete=\"username\"]'));\nconst values = fields.map((field) => field.value || '');\nreturn {\n  ok: values.some((value) => value === String(args.email || '')),\n  values,\n};\n"
  - submit_signup_email_after_timeout_retry:
      if: "${state.steps.classify_after_signup_email_timeout_retry?.action?.stage === 'signup_email' && state.steps.fill_signup_email_after_timeout_retry?.action?.ok === true}"
      metadata:
        templateRef: submit_signup_email_form
        description: "Resubmit the signup email after recovering from a retryable timeout."
  - wait_after_signup_email_timeout_resubmit:
      if: "${state.steps.submit_signup_email_after_timeout_retry?.action?.ok === true && state.steps.submit_signup_email_after_timeout_retry?.action?.skipped !== true}"
      metadata:
        description: "Allow the retried signup email submission to settle before classifying the next page."
      wait:
        milliseconds: 900
  - classify_after_signup_email_retry:
      if: "${state.steps.click_signup_email_timeout_retry?.action?.ok === true && state.steps.click_signup_email_timeout_retry?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after retrying the signup email submission."
  - clear_signup_email_security_gate:
      if: "${state.steps.classify_after_signup_email_retry?.action?.anti_bot_gate === true || (state.steps.click_signup_email_timeout_retry?.action?.ok !== true && state.steps.classify_after_signup_email?.action?.anti_bot_gate === true)}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any security gate encountered after submitting or retrying the signup email."
  - classify_after_signup_email_gate:
      metadata:
        templateRef: classify_openai_surface
        description: "Refresh the signup state after email-step retry and security handling."
  - fill_signup_password:
      if: "${state.steps.classify_after_signup_email_gate?.action?.stage === 'signup_password'}"
      metadata:
        templateRef: fill_openai_password_field
        description: "Fill the new account password on the signup password page."
        browser:
          validation:
            pre:
              kind: playwright
              op: exists
              selector: 'input[type="password"], input[name="new-password"], input[autocomplete="new-password"]'
            post:
              kind: js
              expression: "const fields = Array.from(document.querySelectorAll('input[type=\"password\"], input[name=\"new-password\"], input[autocomplete=\"new-password\"]'));\nconst values = fields.map((field) => String(field.value || ''));\nconst submit = Array.from(document.querySelectorAll('button[type=\"submit\"], input[type=\"submit\"], button, [role=\"button\"]')).find((node) => {\n  if (!(node instanceof Element)) {\n    return false;\n  }\n  const style = window.getComputedStyle(node);\n  if (!style || style.display === 'none' || style.visibility === 'hidden') {\n    return false;\n  }\n  const rect = node.getBoundingClientRect();\n  if (!(rect.width > 0 && rect.height > 0)) {\n    return false;\n  }\n  const label = String(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || '')).replace(/\\s+/g, ' ').trim();\n  return /continue|next|create account|sign up|submit|verify/i.test(label);\n});\nconst submitDisabled = submit instanceof Element ? (submit.hasAttribute('disabled') || submit.getAttribute('aria-disabled') === 'true') : null;\nconst hasValue = values.some((value) => value.length > 0);\nreturn {\n  ok: hasValue && submitDisabled === false,\n  has_value: hasValue,\n  value_lengths: values.map((value) => value.length),\n  submit_disabled: submitDisabled,\n};\n"
  - submit_signup_password:
      if: "${state.steps.classify_after_signup_email_gate?.action?.stage === 'signup_password' && state.steps.fill_signup_password?.action?.ok === true}"
      metadata:
        templateRef: submit_openai_password_form
        description: "Submit the signup password step."
  - wait_after_signup_password_submit:
      if: "${state.steps.submit_signup_password?.action?.ok === true && state.steps.submit_signup_password?.action?.skipped !== true}"
      metadata:
        description: "Allow the OpenAI signup password submission to settle before classifying the next page."
      wait:
        milliseconds: 900
  - classify_after_signup_password:
      metadata:
        templateRef: classify_openai_surface
        description: "Classify the OpenAI page after submitting the signup password."
  - clear_signup_password_security_gate:
      if: "${state.steps.classify_after_signup_password?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any security gate encountered after submitting the signup password."
  - classify_after_signup_password_gate:
      metadata:
        templateRef: classify_openai_surface
        description: "Refresh the signup state after password-step security handling."
  - collect_signup_verification_artifact:
      if: "${state.steps.classify_after_signup_password_gate?.action?.needs_email_verification === true}"
      metadata:
        description: "Collect the signup OTP from Gmail on the same managed profile."
        ref:
          digest: "sha256:a9544a3c9d3dc1bed813a75d323d7bb6429c6aecabb0b92bb8fddca4038c6dd3"
      call: workflow.sys.web.mail-google-com.collect-verification-artifact
      with:
        version: 1.0.0
        input:
          enabled: true
          search_query: "${'from:openai to:' + String(inputs.email || '').trim() + ' newer_than:7d'}"
          message_match_text: "${String(inputs.email || '').trim() || 'OpenAI'}"
          link_host_regex: "auth\\.openai\\.com|chatgpt\\.com"
  - return_to_signup_verification_page:
      if: "${state.steps.classify_after_signup_password_gate?.action?.needs_email_verification === true}"
      metadata:
        description: "Return from Gmail to the active OpenAI signup verification page before submitting the OTP."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.navigate
      with:
        body:
          url: "${state.steps.classify_after_signup_password_gate?.action?.current_url || state.steps.classify_after_signup_password?.action?.current_url || 'https://auth.openai.com/email-verification'}"
  - classify_signup_verification_ready:
      if: "${state.steps.classify_after_signup_password_gate?.action?.needs_email_verification === true}"
      metadata:
