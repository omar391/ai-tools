          clearSiteDataForOrigins:
            - https://auth.openai.com
            - https://chatgpt.com
            - https://chat.openai.com
      call: afn.driver.browser.navigate
      with:
        body:
          url: "${state.vars.codex_login?.auth_url || inputs.auth_url || ''}"
  - settle_before_consent_add_phone_retry_9:
      if: "${state.steps.reopen_auth_url_before_consent_retry_9?.action?.ok === true && state.steps.reopen_auth_url_before_consent_retry_9?.action?.skipped !== true}"
      metadata:
        description: Let the replayed final Codex auth URL settle after the ninth add-phone retry.
      wait:
        milliseconds: 1200
  - classify_before_consent_retry_9:
      if: "${state.steps.reopen_auth_url_before_consent_retry_9?.action?.ok === true && state.steps.reopen_auth_url_before_consent_retry_9?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: Reclassify the final OpenAI/Codex state after the ninth add-phone retry.
  - wait_before_consent_add_phone_retry_10:
      if: "${state.steps.classify_before_consent_retry_9?.action?.add_phone_prompt === true && String(state.vars.codex_login?.auth_url || inputs.auth_url || '').trim() !== ''}"
      metadata:
        description: Apply the final exponential wait before skipping the account when add-phone still blocks consent.
      wait:
        milliseconds: 1024000
  - reopen_auth_url_before_consent_retry_10:
      if: "${state.steps.wait_before_consent_add_phone_retry_10?.action != null && state.steps.wait_before_consent_add_phone_retry_10?.action?.skipped !== true && String(state.vars.codex_login?.auth_url || inputs.auth_url || '').trim() !== ''}"
      metadata:
        description: Replay the captured Codex auth URL after the tenth final add-phone wait.
        mode: headless_ok
        targetRef: primary
        browser:
          clearSiteDataForOrigins:
            - https://auth.openai.com
            - https://chatgpt.com
            - https://chat.openai.com
      call: afn.driver.browser.navigate
      with:
        body:
          url: "${state.vars.codex_login?.auth_url || inputs.auth_url || ''}"
  - settle_before_consent_add_phone_retry_10:
      if: "${state.steps.reopen_auth_url_before_consent_retry_10?.action?.ok === true && state.steps.reopen_auth_url_before_consent_retry_10?.action?.skipped !== true}"
      metadata:
        description: Let the replayed final Codex auth URL settle after the tenth add-phone retry.
      wait:
        milliseconds: 1200
  - classify_before_consent_retry_10:
      if: "${state.steps.reopen_auth_url_before_consent_retry_10?.action?.ok === true && state.steps.reopen_auth_url_before_consent_retry_10?.action?.skipped !== true}"
      metadata:
        templateRef: classify_openai_surface
        description: Reclassify the final OpenAI/Codex state after the tenth add-phone retry.
  - cache_effective_before_consent_surface:
      metadata:
        description: Cache the latest final OpenAI/Codex state after any bounded add-phone retries.
      set:
        effective_before_consent_surface: "${state.steps.classify_before_consent_retry_10?.action?.current_url ? state.steps.classify_before_consent_retry_10?.action : (state.steps.classify_before_consent_retry_9?.action?.current_url ? state.steps.classify_before_consent_retry_9?.action : (state.steps.classify_before_consent_retry_8?.action?.current_url ? state.steps.classify_before_consent_retry_8?.action : (state.steps.classify_before_consent_retry_7?.action?.current_url ? state.steps.classify_before_consent_retry_7?.action : (state.steps.classify_before_consent_retry_6?.action?.current_url ? state.steps.classify_before_consent_retry_6?.action : (state.steps.classify_before_consent_retry_5?.action?.current_url ? state.steps.classify_before_consent_retry_5?.action : (state.steps.classify_before_consent_retry_4?.action?.current_url ? state.steps.classify_before_consent_retry_4?.action : (state.steps.classify_before_consent_retry_3?.action?.current_url ? state.steps.classify_before_consent_retry_3?.action : (state.steps.classify_before_consent_retry_2?.action?.current_url ? state.steps.classify_before_consent_retry_2?.action : (state.steps.classify_before_consent_retry_1?.action?.current_url ? state.steps.classify_before_consent_retry_1?.action : (state.steps.classify_before_consent?.action || {}))))))))))}"
  - accept_oauth_consent:
      if: "${(state.vars.effective_before_consent_surface?.oauth_continue_visible === true || state.vars.effective_before_consent_surface?.stage === 'oauth_consent' || /\\/sign-in-with-chatgpt\\/codex\\/consent(?:[/?#]|$)/i.test(String(state.vars.effective_before_consent_surface?.current_url || ''))) && state.vars.effective_before_consent_surface?.callback_complete !== true}"
      metadata:
