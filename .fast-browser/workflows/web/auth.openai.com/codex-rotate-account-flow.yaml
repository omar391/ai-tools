  - clear_post_consent_security_gate:
      if: "${state.steps.classify_after_oauth_consent?.action?.current_url && state.steps.classify_after_oauth_consent?.action?.anti_bot_gate === true}"
      metadata:
        templateRef: clear_openai_security_gate
        description: "Clear any final security gate that appears after the consent step."
  - complete_login_or_consent:
      if: "${state.steps.classify_after_oauth_consent?.action?.current_url}"
      metadata:
