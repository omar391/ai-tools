document:
  dsl: 1.0.0
  namespace: web-auth-openai-com
  name: codex-rotate-account-flow
  version: 1.0.8
  summary: "Explicit managed-profile OpenAI account creation and Codex callback login flow for codex-rotate."
  metadata:
    preferredProfile: dev-1
    primaryTarget: primary
    targets:
      - id: primary
        kind: web
        match:
          kind: host_pattern
          value: "*"
        target: auth.openai.com
input:
  schema:
    format: json
    document:
      type: object
      properties:
        enabled:
          default: true
        mode:
          default: codex_login
        codex_bin:
          default: codex
        auth_url: {}
        callback_url: {}
        callback_port: {}
        codex_session_dir: {}
        codex_login_pid: {}
        codex_login_stdout_path: {}
        codex_login_stderr_path: {}
        codex_login_exit_path: {}
        email: {}
        account_login_ref:
          type: object
          format: secret-ref
        account_login_locator:
          type: object
          format: secret-locator
        full_name:
          default: "Dev Astronlab"
        birth_month:
          default: 1
        birth_day:
          default: 24
        birth_year:
          default: 1990
        prefer_signup_recovery:
          default: "true"
      required:
        - mode
        - email
use:
  functions:
    classify_openai_surface:
      metadata:
        description: "Classify the current OpenAI auth surface."
        mode: headless_ok
        targetRef: primary
        browser:
          screenshot: true
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const readVisibleAuthText = async () => {\n  return await page.evaluate(() => {\n    const selectors = [\n      \"h1\",\n      \"h2\",\n      \"h3\",\n      \"h4\",\n      \"p\",\n      \"button\",\n      \"a\",\n      \"label\",\n      \"legend\",\n      \"li\",\n      \"[role=\\\"button\\\"]\",\n      \"[role=\\\"alert\\\"]\",\n      \"[role=\\\"status\\\"]\",\n      \"[aria-live]\",\n      \"input[placeholder]\",\n      \"input[aria-label]\",\n    ];\n    const isVisible = (node) => {\n      if (!(node instanceof Element)) {\n        return false;\n      }\n      if (node.closest(\"script,style,noscript,template,[hidden],[aria-hidden=\\\"true\\\"]\")) {\n        return false;\n      }\n      const style = window.getComputedStyle(node);\n      if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n        return false;\n      }\n      const rect = node.getBoundingClientRect();\n      return rect.width > 0 && rect.height > 0;\n    };\n    const texts = [];\n    const seen = new Set();\n    for (const selector of selectors) {\n      for (const node of document.querySelectorAll(selector)) {\n        if (!isVisible(node)) {\n          continue;\n        }\n        const value = node instanceof HTMLInputElement\n          ? (node.getAttribute(\"aria-label\") || node.getAttribute(\"placeholder\") || \"\")\n          : (node.innerText || node.textContent || \"\");\n        const normalized = String(value || \"\").replace(/\\s+/g, \" \").trim();\n        if (!normalized || seen.has(normalized)) {\n          continue;\n        }\n        seen.add(normalized);\n        texts.push(normalized);\n      }\n    }\n    const combined = texts.join(\"\\n\");\n    if (combined.trim()) {\n      return combined;\n    }\n    const body = document.body;\n    return body ? String(body.innerText || body.textContent || \"\") : \"\";\n  }).catch(() => \"\");\n};\nconst extractVisibleButtons = async () => {\n  return await page.evaluate(() => {\n    const isVisible = (node) => {\n      if (!(node instanceof Element)) {\n        return false;\n      }\n      if (node.closest(\"script,style,noscript,template,[hidden],[aria-hidden=\\\"true\\\"]\")) {\n        return false;\n      }\n      const style = window.getComputedStyle(node);\n      if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n        return false;\n      }\n      const rect = node.getBoundingClientRect();\n      return rect.width > 0 && rect.height > 0;\n    };\n    return Array.from(document.querySelectorAll(\"button,a,[role=\\\"button\\\"],input[type=\\\"submit\\\"]\"))\n      .filter((node) => isVisible(node))\n      .map((node) => {\n        const raw = node instanceof HTMLInputElement\n          ? (node.value || \"\")\n          : (node.innerText || node.textContent || \"\");\n        return String(raw || \"\").replace(/\\s+/g, \" \").trim();\n      })\n      .filter(Boolean)\n      .slice(0, 12);\n  }).catch(() => []);\n};\nconst href = page.url();\nconst title = await page.title().catch(() => \"\");\nlet host = \"\";\nlet path = \"\";\ntry {\n  const parsed = new URL(href);\n  host = parsed.hostname;\n  path = parsed.pathname;\n} catch {}\nconst bodyText = await readVisibleAuthText();\nconst visibleButtons = await extractVisibleButtons();\nconst authPath = /^\\/(?:auth|api\\/auth)\\b/.test(path);\nconst hasTurnstile = await page.locator(\"input[name=\\\"cf-turnstile-response\\\"], iframe[src*=\\\"challenge\\\"], iframe[title*=\\\"Widget containing\\\"]\").count().catch(() => 0) > 0;\nconst callbackComplete = /^(localhost|127\\.0\\.0\\.1)$/i.test(host);\nconst success = /you can close this window|signed in|success/i.test(bodyText);\nconst verificationInput = await page.locator(\"input[name*=\\\"code\\\" i], input[name*=\\\"otp\\\" i], input[autocomplete=\\\"one-time-code\\\"], input[aria-label*=\\\"code\\\" i], input[aria-label*=\\\"otp\\\" i], input[placeholder*=\\\"code\\\" i], input[placeholder*=\\\"otp\\\" i], input[inputmode=\\\"numeric\\\"][maxlength=\\\"1\\\"], input[inputmode=\\\"numeric\\\"][maxlength=\\\"6\\\"]\").count().catch(() => 0) > 0;\nconst followUpStep = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(bodyText)\n  || /about-you/i.test(path);\nconst resetPasswordPrompt = /reset-password/i.test(path)\n  || /\\breset password\\b/i.test(bodyText);\nconst addPhonePrompt = /add-phone/i.test(path)\n  || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(bodyText);\nconst retryableTimeout = /oops, an error occurred|operation timed out|try again/i.test(bodyText);\nconst sessionEnded = /your session has ended/i.test(bodyText);\nconst existingAccountPrompt = /an account for this email address already exists|this email address already exists|account already exists|already registered/i.test(bodyText);\nconst usernameNotFound = /username_not_found|username not found/i.test(bodyText);\nconst invalidCredentials = /incorrect email address or password|incorrect password|wrong password|invalid email or password/i.test(bodyText);\nconst rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(bodyText);\nconst antiBotGate = hasTurnstile\n  || /just a moment/i.test(title)\n  || /performing security verification|security service to protect against malicious bots|verifies you are not a bot|verify you are not a bot|verifying you are human|verify you are human/i.test(bodyText);\nconst createAccountFailed = /failed to create account\\.?\\s*please try again/i.test(bodyText);\nconst appShell = /\\bNew chat\\b|\\bProjects\\b|\\bLog out\\b|\\bUpgrade plan\\b|\\bExplore GPTs\\b/i.test(bodyText);\nconst accountReady = ((/chatgpt\\.com|chat\\.openai\\.com/i.test(host) && !authPath && !hasTurnstile) || appShell);\nconst emailInput = await page.locator(\"input[type=\\\"email\\\"], input[name=\\\"email\\\"], input[autocomplete=\\\"email\\\"], input[autocomplete=\\\"username\\\"]\").count().catch(() => 0) > 0;\nconst currentPasswordInput = await page.locator(\"input[type=\\\"password\\\"], input[name=\\\"password\\\"], input[autocomplete=\\\"current-password\\\"]\").count().catch(() => 0) > 0;\nconst newPasswordInput = await page.locator(\"input[name=\\\"new-password\\\"], input[autocomplete=\\\"new-password\\\"]\").count().catch(() => 0) > 0;\nconst passwordInput = currentPasswordInput || newPasswordInput;\nconst signupCtaVisible = visibleButtons.some((text) => /^sign up$/i.test(text) || /create account/i.test(text));\nconst loginCtaVisible = visibleButtons.some((text) => /^log in$/i.test(text) || /^sign in$/i.test(text));\nconst oneTimeCodeOption = visibleButtons.some((text) => /one-time code|one time code/i.test(text));\nconst oauthConsentCopy = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(bodyText)\n  || /sign in to codex/i.test(title);\nconst oauthContinueVisible = visibleButtons.some((text) => /continue to codex|continue to openai|authorize|allow|accept/i.test(text))\n  || (oauthConsentCopy && visibleButtons.some((text) => /^continue$/i.test(text)));\nconst continueButtonVisible = visibleButtons.some((text) => /continue|next|verify|submit|finish creating account|log in|sign in/i.test(text));\nconst needsEmailVerification = (!oauthConsentCopy && verificationInput)\n  || (!oauthConsentCopy && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))\n  || (!oauthConsentCopy && /email-verification/i.test(path));\nlet stage = \"unknown\";\nif (callbackComplete) {\n  stage = \"callback_complete\";\n} else if (antiBotGate) {\n  stage = \"security_verification\";\n} else if (rateLimitExceeded) {\n  stage = \"rate_limit\";\n} else if (sessionEnded) {\n  stage = \"session_ended\";\n} else if (retryableTimeout) {\n  stage = \"retryable_timeout\";\n} else if (addPhonePrompt) {\n  stage = \"add_phone\";\n} else if (oauthConsentCopy && oauthContinueVisible) {\n  stage = \"oauth_consent\";\n} else if (followUpStep) {\n  stage = \"about_you\";\n} else if (needsEmailVerification) {\n  stage = \"email_verification\";\n} else if (existingAccountPrompt) {\n  stage = \"existing_account_prompt\";\n} else if (invalidCredentials) {\n  stage = \"invalid_credentials\";\n} else if (/\\/create-account(?:\\/|$)/i.test(path) && passwordInput) {\n  stage = \"signup_password\";\n} else if (/\\/create-account(?:\\/|$)/i.test(path) && emailInput) {\n  stage = \"signup_email\";\n} else if (/\\/log-in(?:\\/|$)/i.test(path) && passwordInput) {\n  stage = \"login_password\";\n} else if (/\\/log-in(?:\\/|$)/i.test(path) && emailInput) {\n  stage = \"login_email\";\n} else if (oauthContinueVisible) {\n  stage = \"oauth_consent\";\n} else if (success) {\n  stage = \"success\";\n} else if (emailInput || passwordInput || verificationInput) {\n  stage = \"auth_prompt\";\n}\nconst headline = String(bodyText || \"\").split(\"\\n\").map((value) => value.trim()).filter(Boolean)[0] || title || null;\nreturn {\n  ok: true,\n  stage,\n  current_url: href || null,\n  host: host || null,\n  path: path || null,\n  title: title || null,\n  headline,\n  callback_complete: callbackComplete,\n  success,\n  account_ready: accountReady,\n  needs_email_verification: needsEmailVerification,\n  follow_up_step: followUpStep,\n  add_phone_prompt: addPhonePrompt,\n  reset_password_prompt: resetPasswordPrompt,\n  retryable_timeout: retryableTimeout,\n  session_ended: sessionEnded,\n  existing_account_prompt: existingAccountPrompt,\n  username_not_found: usernameNotFound,\n  invalid_credentials: invalidCredentials,\n  rate_limit_exceeded: rateLimitExceeded,\n  anti_bot_gate: antiBotGate,\n  create_account_failed: createAccountFailed,\n  auth_prompt: emailInput || passwordInput || verificationInput,\n  email_input: emailInput,\n  password_input: passwordInput,\n  current_password_input: currentPasswordInput,\n  new_password_input: newPasswordInput,\n  verification_input: verificationInput,\n  signup_cta_visible: signupCtaVisible,\n  login_cta_visible: loginCtaVisible,\n  one_time_code_option: oneTimeCodeOption,\n  oauth_continue_visible: oauthContinueVisible,\n  continue_button_visible: continueButtonVisible,\n  visible_buttons: visibleButtons,\n};\n"
    clear_openai_security_gate:
      metadata:
        description: "Pause for HIL when OpenAI or Cloudflare requires human verification."
        mode: hil
        targetRef: primary
        pause:
          responder: human
          verifyPersistence: false
          restorePreferredMode: false
        browser:
          screenshot: true
          validation:
            post:
              kind: js
              expression: "const bodyText = document.body ? document.body.innerText : '';\nconst title = document.title || '';\nconst hasTurnstile = !!document.querySelector('input[name=\"cf-turnstile-response\"], iframe[src*=\"challenge\"], iframe[title*=\"Widget containing\"]');\nconst stillBlocked = hasTurnstile\n  || /just a moment/i.test(title)\n  || /performing security verification|security verification|verify you are human|verifying you are human|verify you are not a bot/i.test(bodyText);\nreturn {\n  ok: !stillBlocked,\n  current_url: location.href,\n  still_blocked: stillBlocked,\n};\n"
      call: afn.request_input
      with:
        body:
          hilMode: page
          message: "If OpenAI or Cloudflare shows a human-verification page or checkbox, complete it in the HIL viewer and wait until the normal auth page is visible."
          source: "const title = await page.title().catch(() => '');\nconst bodyText = await page.locator('body').innerText().catch(() => '');\nconst hasTurnstile = await page.locator('input[name=\"cf-turnstile-response\"], iframe[src*=\"challenge\"], iframe[title*=\"Widget containing\"]').count().catch(() => 0) > 0;\nconst blocked = hasTurnstile\n  || /just a moment/i.test(title)\n  || /performing security verification|security verification|verify you are human|verifying you are human|verify you are not a bot/i.test(bodyText);\nreturn {\n  ok: true,\n  blocked,\n  current_url: page.url(),\n  skipped: !blocked,\n};\n"
    click_signup_button:
      metadata:
        description: "Click the Sign up CTA from the OpenAI login shell."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const clicked = await page.evaluate(() => {\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const candidates = Array.from(document.querySelectorAll(\"a[href*='create-account'], button, a, [role='button']\"))\n    .filter((node) => isVisible(node));\n  const target = candidates.find((node) => {\n    const href = node.getAttribute(\"href\") || \"\";\n    const text = String(node.innerText || node.textContent || \"\").replace(/\\s+/g, \" \").trim();\n    return /create-account/i.test(href) || /^sign up$/i.test(text) || /create account/i.test(text);\n  });\n  if (!target) {\n    return { ok: false, error: \"sign-up-button-not-found\" };\n  }\n  target.click();\n  return {\n    ok: true,\n    clicked_text: String(target.innerText || target.textContent || \"\").replace(/\\s+/g, \" \").trim() || null,\n    clicked_href: target.getAttribute(\"href\") || null,\n  };\n});\nif (clicked.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn {\n  ...clicked,\n  current_url: page.url(),\n};\n"
    click_primary_continue:
      metadata:
        description: "Click the primary visible submit or continue control for the current OpenAI form."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const result = await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const readLabel = (node) => {\n    if (!(node instanceof Element)) {\n      return \"\";\n    }\n    if (node instanceof HTMLInputElement) {\n      return normalize(node.value || node.getAttribute(\"aria-label\") || node.getAttribute(\"title\") || \"\");\n    }\n    return normalize(\n      node.innerText\n      || node.textContent\n      || node.getAttribute(\"aria-label\")\n      || node.getAttribute(\"title\")\n      || \"\"\n    );\n  };\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const isDisabled = (node) => node.hasAttribute(\"disabled\") || node.getAttribute(\"aria-disabled\") === \"true\";\n  const isExplicitSubmit = (node) => {\n    if (node instanceof HTMLInputElement) {\n      return node.type === \"submit\";\n    }\n    if (node instanceof HTMLButtonElement) {\n      return node.type === \"submit\";\n    }\n    return false;\n  };\n  const clickNode = (node) => {\n    if (!(node instanceof HTMLElement)) {\n      return false;\n    }\n    node.click();\n    return true;\n  };\n  const selectors = [\n    \"input[type='email']\",\n    \"input[name='email']\",\n    \"input[autocomplete='email']\",\n    \"input[autocomplete='username']\",\n    \"input[type='password']\",\n    \"input[autocomplete='current-password']\",\n    \"input[autocomplete='new-password']\",\n    \"input[autocomplete='one-time-code']\",\n    \"input[name*='code']\",\n    \"input[inputmode='numeric']\",\n    \"input[name*='name']\",\n    \"input[autocomplete='name']\",\n    \"select\",\n  ];\n  const activeForm = document.activeElement instanceof Element ? document.activeElement.closest(\"form\") : null;\n  const candidateForms = [];\n  if (activeForm) {\n    candidateForms.push(activeForm);\n  }\n  for (const selector of selectors) {\n    const field = document.querySelector(selector);\n    if (field instanceof Element) {\n      const form = field.closest(\"form\");\n      if (form && !candidateForms.includes(form)) {\n        candidateForms.push(form);\n      }\n    }\n  }\n  const buttonMatchers = /continue|next|verify|submit|finish creating account|log in|sign in|continue to codex|continue to openai|authorize|allow|accept/i;\n  const formControls = candidateForms\n    .flatMap((form) => Array.from(form.querySelectorAll(\"button, input[type='submit'], [role='button']\")))\n    .filter((node) => isVisible(node) && !isDisabled(node));\n  const preferredFormControl = formControls.find((node) => isExplicitSubmit(node) && buttonMatchers.test(readLabel(node)))\n    || formControls.find((node) => buttonMatchers.test(readLabel(node)))\n    || formControls.find((node) => isExplicitSubmit(node));\n  if (preferredFormControl && clickNode(preferredFormControl)) {\n    return {\n      ok: true,\n      strategy: \"form-submit\",\n      clicked_text: readLabel(preferredFormControl) || null,\n    };\n  }\n  const fallback = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\"))\n    .filter((node) => isVisible(node) && !isDisabled(node))\n    .find((node) => buttonMatchers.test(readLabel(node)));\n  if (fallback && clickNode(fallback)) {\n    return {\n      ok: true,\n      strategy: \"text-match\",\n      clicked_text: readLabel(fallback) || null,\n    };\n  }\n  if (activeForm instanceof HTMLFormElement) {\n    activeForm.requestSubmit();\n    return {\n      ok: true,\n      strategy: \"request-submit\",\n      clicked_text: null,\n    };\n  }\n  return {\n    ok: false,\n    error: \"primary-continue-not-found\",\n  };\n});\nif (result.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn {\n  ...result,\n  current_url: page.url(),\n};\n"
    click_retryable_try_again:
      metadata:
        description: "Click the visible Try again control on a retryable OpenAI error page."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: "const result = await page.evaluate(() => {\n  const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n  const isVisible = (node) => {\n    if (!(node instanceof Element)) {\n      return false;\n    }\n    const style = window.getComputedStyle(node);\n    if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n      return false;\n    }\n    const rect = node.getBoundingClientRect();\n    return rect.width > 0 && rect.height > 0;\n  };\n  const candidates = Array.from(document.querySelectorAll(\"button, a, [role='button'], input[type='submit']\"))\n    .filter((node) => isVisible(node));\n  const target = candidates.find((node) => {\n    const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || \"\"));\n    return /^try again$/i.test(text) || /try again/i.test(text);\n  });\n  if (!target) {\n    return { ok: false, error: \"retryable-try-again-not-found\" };\n  }\n  target.click();\n  return {\n    ok: true,\n    clicked_text: normalize(target instanceof HTMLInputElement ? target.value : (target.innerText || target.textContent || \"\")) || null,\n  };\n});\nif (result.ok) {\n  await page.waitForTimeout(1200);\n}\nreturn {\n  ...result,\n  current_url: page.url(),\n};\n"
    click_one_time_code_button:
      metadata:
        description: "Choose the OpenAI one-time-code recovery path when password login fails."
        mode: headless_ok
        targetRef: primary
      call: afn.driver.browser.exec_script
      with:
        body:
          script: |
            const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
            const detectStage = async () => await page.evaluate(() => {
              const normalize = (value) => String(value || "").replace(/\s+/g, " ").trim();
              const hasVisible = (selector) => Array.from(document.querySelectorAll(selector)).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0;
              });
              const bodyText = normalize(document.body ? (document.body.innerText || document.body.textContent || "") : "");
              const title = normalize(document.title || "");
              const path = location.pathname;
              const host = location.hostname;
              const verificationInput = hasVisible('input[name*="code" i], input[name*="otp" i], input[autocomplete="one-time-code"], input[aria-label*="code" i], input[aria-label*="otp" i], input[placeholder*="code" i], input[placeholder*="otp" i], input[inputmode="numeric"][maxlength="1"], input[inputmode="numeric"][maxlength="6"]');
              const oauthConsentCopy = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(bodyText)
                || /sign in to codex/i.test(title);
              const oauthContinueVisible = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']")).some((node) => {
                if (!(node instanceof Element)) {
                  return false;
                }
                const style = window.getComputedStyle(node);
                if (!style || style.display === "none" || style.visibility === "hidden") {
                  return false;
                }
                const rect = node.getBoundingClientRect();
                if (!(rect.width > 0 && rect.height > 0)) {
                  return false;
                }
                const text = normalize(node instanceof HTMLInputElement ? node.value : (node.innerText || node.textContent || ""));
                return /continue to codex|continue to openai|authorize|allow|accept/i.test(text)
                  || (oauthConsentCopy && /^continue$/i.test(text));
              });
              const incorrectCredentials = /incorrect email address or password|incorrect password|wrong password|invalid email or password/i.test(bodyText);
              const retryableTimeout = /oops, an error occurred|an error occurred during authentication|operation timed out|try again/i.test(bodyText);
              const needsEmailVerification = (!oauthConsentCopy && verificationInput)
                || (!oauthConsentCopy && /check your inbox|check your email|verify your email|verification code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))
                || (!oauthConsentCopy && /email-verification/i.test(path));
              let stage = "unknown";
              if (/^(localhost|127\.0\.0\.1)$/i.test(host)) {
                stage = "callback_complete";
              } else if (oauthConsentCopy && oauthContinueVisible) {
                stage = "oauth_consent";
              } else if (retryableTimeout) {
                stage = "retryable_timeout";
              } else if (needsEmailVerification) {
                stage = "email_verification";
              } else if (/\/log-in(?:\/|$)/i.test(path) && hasVisible('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]')) {
                stage = "login_password";
              } else if (/\/log-in(?:\/|$)/i.test(path) && hasVisible('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]')) {
                stage = "login_email";
              }
              return {
                stage,
                current_url: location.href,
                incorrect_credentials: incorrectCredentials,
                retryable_timeout: retryableTimeout,
              };
            });
            const waitForTransition = async (currentStage, timeoutMs = 1800) => {
              const startedAt = Date.now();
              let latest = await detectStage();
              while (Date.now() - startedAt < timeoutMs) {
                if (latest.stage !== currentStage && latest.stage !== "unknown") {
                  return latest;
                }
                await page.waitForTimeout(250).catch(() => {});
                latest = await detectStage();
              }
              return latest;
            };
            const clickMatching = async (requestedMode) => {
              const patterns =
                requestedMode === "retryable"
                  ? [/^try again$/i, /try again/i]
                  : requestedMode === "chooser"
