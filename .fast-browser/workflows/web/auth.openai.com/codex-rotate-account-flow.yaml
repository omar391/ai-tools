              const host = location.hostname;
              const emailInput = hasVisible('input[type="email"], input[name="email"], input[autocomplete="email"], input[autocomplete="username"]');
              const passwordInput = hasVisible('input[type="password"], input[name="password"], input[name="new-password"], input[autocomplete="current-password"], input[autocomplete="new-password"]');
              const verificationInput = hasVisible('input[name*="code" i], input[name*="otp" i], input[autocomplete="one-time-code"], input[aria-label*="code" i], input[aria-label*="otp" i], input[placeholder*="code" i], input[placeholder*="otp" i], input[inputmode="numeric"][maxlength="1"], input[inputmode="numeric"][maxlength="6"]');
