  - classify_after_oauth_consent:
      if: "${(state.steps.accept_oauth_consent?.action?.ok === true && state.steps.accept_oauth_consent?.action?.skipped !== true) || (state.steps.reopen_existing_account_auth_url?.action?.ok === true && state.steps.reopen_existing_account_auth_url?.action?.skipped !== true) || (state.steps.reopen_captured_auth_url?.action?.ok === true && state.steps.reopen_captured_auth_url?.action?.skipped !== true) || state.vars.effective_before_consent_surface?.stage === 'oauth_consent' || /\\/sign-in-with-chatgpt\\/codex\\/consent(?:[/?#]|$)/i.test(String(state.vars.effective_before_consent_surface?.current_url || ''))}"
      metadata:
