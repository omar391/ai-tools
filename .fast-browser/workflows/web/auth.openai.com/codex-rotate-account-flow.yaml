on code|enter the verification code|enter your code|temporary verification code|resend email/i.test(bodyText))\n    || (!oauthConsentCopy && /email-verification/i.test(path));\n\n  let stage = \"unknown\";\n  if (/^(localhost|127\\.0\\.0\\.1)$/i.test(host)) {\n    stage = \"callback_complete\";\n  } else if (antiBotGate) {\n    stage = \"security_verification\";\n  } else if (rateLimitExceeded) {\n    stage = \"rate_limit\";\n  } else if (sessionEnded) {\n    stage = \"session_ended\";\n  } else if (retryableTimeout) {\n    stage = \"retryable_timeout\";\n  } else if (addPhonePrompt) {\n    stage = \"add_phone\";\n  } else if (oauthConsentCopy && oauthContinueVisible) {\n    stage = \"oauth_consent\";\n  } else if (followUpStep) {\n    stage = \"about_you\";\n  } else if (needsEmailVerification) {\n    stage = \"email_verification\";\n  } else if (/\\/log-in(?:\\/|$)/i.test(path) && passwordInput) {\n    stage = \"login_password\";\n  } else if (/\\/log-in(?:\\/|$)/i.test(path) && emailInput) {\n    stage = \"login_email\";\n  } else if (emailInput || passwordInput || verificationInput) {\n    stage = \"auth_prompt\";\n  }\n\n  return {\n    stage,\n    current_url: location.href,\n    headline: bodyText.split(\"\\n\").map((value) => value.trim()).filter(Boolean)[0] || title || null,\n    incorrect_code: /incorrect code/i.test(bodyText),\n  };\n});\n\nconst input = page.locator(verificationSelector).first();\nawait input.waitFor({ state: \"visible\", timeout: 8000 }).catch(() => {});\nif ((await input.count().catch(() => 0)) === 0 || !(await input.isVisible().catch(() => false))) {\n  const before = await detectStage();\n  throw new Error(\"login-verification-input-not-ready:\" + String(before.stage || \"unknown\") + \":\" + String(before.current_url || page.url()));\n}\n\nawait input.click().catch(() => {});\nawait input.press(\"Meta+A\").catch(() => {});\nawait input.press(\"Control+A\").catch(() => {});\nawait input.press(\"Backspace\").catch(() => {});\nawait input.pressSequentially(code, { delay: 45 }).catch(() => {});\nawait page.waitForTimeout(150).catch(() => {});\n\nconst value = String(await input.inputValue().catch(() => \"\")).replace(/\\D+/g, \"\").slice(0, 6);\nif (value.length < 6 || value !== code) {\n  throw new Error(\"login-verification-input-mismatch:\" + (value || \"empty\"));\n}\n\nconst allowedStages = new Set([\n  \"about_you\",\n  \"add_phone\",\n  \"oauth_consent\",\n  \"security_verification\",\n  \"retryable_timeout\",\n  \"rate_limit\",\n  \"session_ended\",\n  \"callback_complete\",\n]);\n\nconst clickVisibleContinue = async () => {\n  const result = await input.evaluate((field) => {\n    const normalize = (value) => String(value || \"\").replace(/\\s+/g, \" \").trim();\n    const isVisible = (node) => {\n      if (!(node instanceof Element)) {\n        return false;\n      }\n      const style = window.getComputedStyle(node);\n      if (!style || style.display === \"none\" || style.visibility === \"hidden\") {\n        return false;\n      }\n      const rect = node.getBoundingClientRect();\n      return rect.width > 0 && rect.height > 0;\n    };\n    const readLabel = (node) => {\n      if (!(node instanceof Element)) {\n        return \"\";\n      }\n      if (node instanceof HTMLInputElement) {\n        return normalize(node.value || node.getAttribute(\"aria-label\") || \"\");\n      }\n      return normalize(node.innerText || node.textContent || node.getAttribute(\"aria-label\") || \"\");\n    };\n    const form = field instanceof Element ? field.closest(\"form\") : null;\n    const scope = form || document;\n    const candidates = Array.from(scope.querySelectorAll(\"button, input[type='submit'], [role='button']\"))\n      .filter((node) => isVisible(node) && node.getAttribute(\"aria-disabled\") !== \"true\" && !node.hasAttribute(\"disabled\"));\n    const preferred = candidates.find((node) => {\n      const label = readLabel(node);\n      const isSubmitNode = (node instanceof HTMLButtonEleme