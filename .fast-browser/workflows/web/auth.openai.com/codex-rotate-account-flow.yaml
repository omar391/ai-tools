              const rateLimitExceeded = /rate limit exceeded|too many requests|please try again later/i.test(bodyText);
              const addPhonePrompt = /add-phone/i.test(path)
                || /phone number required|add your phone number|verify your phone number|enter your phone number/i.test(bodyText);
              const followUpStep = /confirm your age|full name|birthday|finish creating account|what should we call you|tell us about yourself|about you/i.test(bodyText)
                || /about-you/i.test(path);
              const oauthConsentCopy = /sign in to codex with chatgpt|share your name, email, and profile picture with codex|share your name, email, and profile picture|link your account/i.test(bodyText)
                || /sign in to codex/i.test(title);
              const oauthContinueVisible = Array.from(document.querySelectorAll("button, a, [role='button'], input[type='submit']")).some((node) => {
